<style>
/* ---------- tokens ---------- */
:root {

  --shadow:0 1px 2px rgba(15,18,24,.06), 0 4px 16px rgba(15,18,24,.05);
  --cmp-SOFT:#dc2626; --cmp-MEDIUM:#d97706; --cmp-HARD:#6b7280;
  --cmp-INTERMEDIATE:#16a34a; --cmp-WET:#2563eb; --cmp-UNKNOWN:#9ca3af;
}
@media (prefers-color-scheme: dark) { :root {
  --bg:#101216; --surface:#171a20; --surface2:#1e2229; --surface3:#262b33;
  --line:#2a2f38; --line2:#39404b;
  --ink:#e7eaee; --ink2:#98a1ac; --ink3:#69727e;
  --accent:#ff3b30; --accent-soft:rgba(255,59,48,.12);
  --purple:#c084fc; --green:#4ade80; --yellow:#facc15; --red:#f87171;
  --grid:#20242c; --band-sc:rgba(250,204,21,.10); --band-vsc:rgba(250,204,21,.05); --band-red:rgba(248,113,113,.10);
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.25);
  --cmp-SOFT:#ef4444; --cmp-MEDIUM:#fbbf24; --cmp-HARD:#e5e7eb;
  --cmp-INTERMEDIATE:#22c55e; --cmp-WET:#3b82f6; --cmp-UNKNOWN:#6b7280;
} }
:root[data-theme="dark"] {
  --bg:#101216; --surface:#171a20; --surface2:#1e2229; --surface3:#262b33;
  --line:#2a2f38; --line2:#39404b;
  --ink:#e7eaee; --ink2:#98a1ac; --ink3:#69727e;
  --accent:#ff3b30; --accent-soft:rgba(255,59,48,.12);
  --purple:#c084fc; --green:#4ade80; --yellow:#facc15; --red:#f87171;
  --grid:#20242c; --band-sc:rgba(250,204,21,.10); --band-vsc:rgba(250,204,21,.05); --band-red:rgba(248,113,113,.10);
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.25);
  --cmp-SOFT:#ef4444; --cmp-MEDIUM:#fbbf24; --cmp-HARD:#e5e7eb;
  --cmp-INTERMEDIATE:#22c55e; --cmp-WET:#3b82f6; --cmp-UNKNOWN:#6b7280;
}
:root[data-theme="light"] {
  --bg:#f4f5f7; --surface:#ffffff; --surface2:#eef0f3; --surface3:#e4e7eb;
  --line:#dcdfe4; --line2:#c9cdd4;
  --ink:#191c21; --ink2:#5b6470; --ink3:#8b939e;
  --accent:#d60500; --accent-soft:rgba(214,5,0,.09);
  --purple:#8b2fd6; --green:#0f8a3d; --yellow:#b58900; --red:#c62828;
  --grid:#e7e9ed; --band-sc:rgba(181,137,0,.14); --band-vsc:rgba(181,137,0,.08); --band-red:rgba(198,40,40,.12);
  --shadow:0 1px 2px rgba(15,18,24,.06), 0 4px 16px rgba(15,18,24,.05);
  --cmp-SOFT:#dc2626; --cmp-MEDIUM:#d97706; --cmp-HARD:#6b7280;
  --cmp-INTERMEDIATE:#16a34a; --cmp-WET:#2563eb; --cmp-UNKNOWN:#9ca3af;
}

* { box-sizing:border-box; }
html,body { margin:0; padding:0; }
body {
  background:var(--bg); color:var(--ink);
  font:14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  -webkit-font-smoothing:antialiased;
}
.mono, .num { font-family:ui-monospace, "SF Mono", "Cascadia Code", Consolas, Menlo, monospace; font-variant-numeric:tabular-nums; }
svg text.num, svg text.mono { font-family:ui-monospace,"SF Mono","Cascadia Code",Consolas,Menlo,monospace; }
h1,h2,h3 { margin:0; text-wrap:balance; }
button { font:inherit; color:inherit; background:none; border:none; cursor:pointer; padding:0; }
button:focus-visible, .chip:focus-visible, select:focus-visible, input:focus-visible { outline:2px solid var(--accent); outline-offset:2px; border-radius:4px; }

/* ---------- shell ---------- */
#loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:70vh; gap:14px; color:var(--ink2); }
#loading .bar { width:220px; height:3px; background:var(--surface3); overflow:hidden; border-radius:2px; }
#loading .bar i { display:block; height:100%; width:40%; background:var(--accent); animation:load 1.1s ease-in-out infinite; }
@keyframes load { 0%{transform:translateX(-100%)} 100%{transform:translateX(560px)} }
@media (prefers-reduced-motion: reduce) { #loading .bar i { animation:none; width:100%; } }

header.top {
  position:sticky; top:0; z-index:40; background:var(--bg);
  border-bottom:1px solid var(--line);
}
.top-inner { max-width:1440px; margin:0 auto; padding:10px 20px 0; }
.title-row { display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; }
.title-row .gp { font-size:19px; font-weight:700; letter-spacing:-.01em; }
.title-row .picker { display:inline-flex; gap:7px; }
.title-row .picker select { font-size:15px; font-weight:700; padding:4px 8px; border-radius:7px; max-width:46vw; }
.title-row .meta { color:var(--ink3); font-size:12.5px; }
.title-row .brand { margin-left:auto; font-size:11px; letter-spacing:.14em; color:var(--ink3); text-transform:uppercase; font-weight:600; }
.title-row .brand b { color:var(--accent); }
.ctrl-row { display:flex; align-items:flex-end; gap:18px; margin-top:8px; flex-wrap:wrap; }

.seg { display:inline-flex; background:var(--surface2); border:1px solid var(--line); border-radius:7px; padding:2px; gap:2px; }
.seg button { padding:4px 12px; border-radius:5px; font-size:12.5px; font-weight:600; color:var(--ink2); white-space:nowrap; }
.seg button:hover { color:var(--ink); }
.seg button.on { background:var(--surface); color:var(--ink); box-shadow:0 1px 3px rgba(0,0,0,.18); }
.seg.mini button { padding:2px 9px; font-size:11.5px; }

nav.tabs { display:flex; gap:2px; overflow-x:auto; scrollbar-width:none; }
nav.tabs::-webkit-scrollbar { display:none; }
nav.tabs button {
  padding:9px 13px 10px; font-size:13px; font-weight:600; color:var(--ink2);
  border-bottom:2px solid transparent; white-space:nowrap;
}
nav.tabs button:hover { color:var(--ink); }
nav.tabs button.on { color:var(--ink); border-bottom-color:var(--accent); }
nav.tabs .cnt { background:var(--accent); color:#fff; border-radius:9px; font-size:9.5px; padding:1px 5px; vertical-align:1.5px; }

main { max-width:1440px; margin:0 auto; padding:16px 20px 80px; }

/* ---------- driver rail ---------- */
.drv-rail { display:flex; flex-wrap:wrap; gap:5px; align-items:center; margin:0 0 14px; }
.drv-rail .lbl { font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink3); font-weight:600; margin-right:4px; }
.chip {
  display:inline-flex; align-items:center; gap:6px; padding:3px 9px; border-radius:14px;
  background:var(--surface2); border:1px solid var(--line); font-size:12px; font-weight:600;
  color:var(--ink2); cursor:pointer; user-select:none;
}
.chip .dot { width:9px; height:9px; border-radius:2.5px; flex:none; }
.chip.on { color:var(--ink); background:var(--surface); border-color:var(--line2); }
.chip.off .dot { opacity:.25; }
.chip.off { opacity:.62; }
.chip.act { border-color:var(--accent); }
.chip.sm { padding:2px 7px; font-size:11px; }
.rail-btn { font-size:11px; color:var(--ink3); padding:3px 6px; font-weight:600; }
.rail-btn:hover { color:var(--ink); }

/* ---------- cards & layout ---------- */
.card { background:var(--surface); border:1px solid var(--line); border-radius:10px; box-shadow:var(--shadow); padding:14px 16px; margin-bottom:14px; overflow:hidden; }
.card h3 { font-size:11.5px; letter-spacing:.09em; text-transform:uppercase; color:var(--ink2); font-weight:700; margin-bottom:10px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.card h3 .sub { text-transform:none; letter-spacing:0; font-weight:500; color:var(--ink3); font-size:11.5px; }
.card h3 .right { margin-left:auto; display:flex; gap:8px; align-items:center; text-transform:none; letter-spacing:0; }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
@media (max-width:980px) { .grid2,.grid3 { grid-template-columns:1fr; } }
.stat-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; margin-bottom:14px; }
.stat { background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:10px 13px; }
.stat .k { font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink3); font-weight:600; }
.stat .v { font-size:19px; font-weight:700; margin-top:2px; display:flex; align-items:center; gap:7px; }
.stat .v .dot { width:10px; height:10px; border-radius:3px; }
.stat .s { font-size:11.5px; color:var(--ink2); margin-top:1px; }

.note { font-size:12px; color:var(--ink3); margin:6px 0 0; }
.insights { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
.insight { background:var(--surface); border:1px solid var(--line); border-left:3px solid var(--accent); border-radius:7px; padding:6px 11px; font-size:12.5px; color:var(--ink2); }
.insight b { color:var(--ink); }

/* ---------- tables ---------- */
.tblwrap { overflow-x:auto; }
table.t { border-collapse:collapse; width:100%; font-size:12.5px; }
table.t th { text-align:left; font-size:10.5px; letter-spacing:.07em; text-transform:uppercase; color:var(--ink3); font-weight:600; padding:5px 9px; border-bottom:1px solid var(--line); white-space:nowrap; }
table.t th.r, table.t td.r { text-align:right; }
table.t td { padding:4.5px 9px; border-bottom:1px solid var(--grid); white-space:nowrap; }
table.t tr:last-child td { border-bottom:none; }
table.t tbody tr:hover { background:var(--surface2); }
table.t .num { font-size:12px; }
.tag { display:inline-block; padding:1px 6px; border-radius:4px; font-size:10.5px; font-weight:700; letter-spacing:.03em; }
.pos-gain { color:var(--green); } .pos-loss { color:var(--red); } .pos-same { color:var(--ink3); }
td.best { color:var(--purple); font-weight:700; }
td.pb { color:var(--green); font-weight:600; }
.cmp-dot { display:inline-flex; align-items:center; justify-content:center; width:15px; height:15px; border-radius:50%; border:1.6px solid; font-size:9px; font-weight:800; vertical-align:-3px; }
.drv-cell { display:inline-flex; align-items:center; gap:7px; font-weight:600; }
.drv-cell .dot { width:4px; height:14px; border-radius:2px; }
.drv-cell .team { color:var(--ink3); font-weight:400; font-size:11.5px; }

/* ---------- charts ---------- */
.chart { position:relative; width:100%; }
.chart svg { display:block; width:100%; height:auto; }
.chart .xlab, .chart .ylab { font-size:10.5px; fill:var(--ink3); letter-spacing:.05em; text-transform:uppercase; font-weight:600; }
.tip {
  position:fixed; z-index:90; pointer-events:none; background:var(--surface); border:1px solid var(--line2);
  border-radius:8px; box-shadow:var(--shadow); padding:7px 10px; font-size:12px; max-width:320px;
  opacity:0; transition:opacity .08s;
}
.tip.show { opacity:1; }
.tip .t-title { font-weight:700; margin-bottom:3px; }
.tip table { border-collapse:collapse; }
.tip td { padding:1px 5px 1px 0; }
.legend { display:flex; flex-wrap:wrap; gap:4px 12px; font-size:11.5px; color:var(--ink2); margin-top:6px; }
.legend .li { display:inline-flex; align-items:center; gap:5px; }
.legend .sw { width:14px; height:3px; border-radius:2px; }
.legend .swd { width:9px; height:9px; border-radius:3px; }

/* controls */
.toggle { display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--ink2); cursor:pointer; font-weight:500; }
.toggle input { accent-color:var(--accent); margin:0; }
input[type=range] { accent-color:var(--accent); }
select {
  background:var(--surface2); color:var(--ink); border:1px solid var(--line); border-radius:6px;
  padding:3px 7px; font:inherit; font-size:12.5px;
}
.btn { background:var(--surface2); border:1px solid var(--line); border-radius:6px; padding:4px 11px; font-size:12px; font-weight:600; color:var(--ink2); }
.btn:hover { color:var(--ink); border-color:var(--line2); }
.btn.pri { background:var(--accent-soft); color:var(--accent); border-color:transparent; }
.hint { font-size:11.5px; color:var(--ink3); }
kbd.k { background:var(--surface3); border-radius:3px; padding:0 4px; font-size:10.5px; font-family:inherit; }

/* telemetry compare */
.cmp-bar { display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin-bottom:10px; }
.lapchip { display:inline-flex; align-items:center; gap:7px; padding:4px 8px 4px 10px; border-radius:8px; background:var(--surface); border:1px solid var(--line2); font-size:12px; font-weight:600; }
.lapchip .sw { width:12px; height:12px; border-radius:4px; }
.lapchip .x { color:var(--ink3); font-size:13px; padding:0 2px; }
.lapchip .x:hover { color:var(--red); }
.lapchip.ref { border-color:var(--accent); }
.lapchip .refmark { font-size:9.5px; letter-spacing:.06em; color:var(--accent); font-weight:800; }
.addlap { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.empty { padding:40px 20px; text-align:center; color:var(--ink3); font-size:13px; }
.empty b { color:var(--ink2); }

footer { max-width:1440px; margin:30px auto 0; padding:0 20px 30px; font-size:11.5px; color:var(--ink3); }
footer a { color:var(--ink2); }

/* ---------- long run sheet ---------- */
.lr-sheet th { border-radius:3px; }
.lr-sheet td { border:1px solid var(--grid); }
.lr-sheet .lr-end { background:var(--ink); }
.lr-sheet .lr-avg td { background:rgba(74,222,128,.22); text-align:center; font-weight:800; font-size:10.5px; letter-spacing:.08em; }

/* ---------- weekend chooser ---------- */
.pick-screen { max-width:1100px; margin:0 auto; padding:38px 18px 60px; }
.pick-brand { font-size:26px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; }
.pick-brand b { color:var(--accent); }
.pick-sub { color:var(--ink2); margin:4px 0 26px; font-size:13.5px; }
.pick-year { font-size:13px; font-weight:700; letter-spacing:.09em; text-transform:uppercase; color:var(--ink2); margin:20px 0 10px; display:flex; align-items:baseline; gap:10px; }
.pick-year span { font-weight:500; color:var(--ink3); font-size:11.5px; letter-spacing:0; text-transform:none; }
.pick-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:10px; }
.pick-card {
  display:flex; flex-direction:column; align-items:flex-start; gap:4px; text-align:left;
  background:var(--surface); border:1px solid var(--line); border-radius:10px; box-shadow:var(--shadow);
  padding:12px 14px; cursor:pointer;
}
.pick-card:hover { border-color:var(--accent); }
.pc-top { display:flex; gap:8px; align-items:center; width:100%; }
.pc-round { font-size:10.5px; font-weight:700; letter-spacing:.07em; color:var(--ink3); }
.pc-sprint { font-size:9px; font-weight:800; letter-spacing:.08em; color:var(--accent); background:var(--accent-soft); border-radius:4px; padding:1px 5px; }
.pc-name { font-size:14.5px; font-weight:700; }
.pc-meta { font-size:11.5px; color:var(--ink2); }
.pc-sess { display:flex; flex-wrap:wrap; gap:4px; margin-top:5px; }
.pc-sess i { font-style:normal; font-size:9.5px; font-weight:700; letter-spacing:.04em; color:var(--ink2); background:var(--surface2); border:1px solid var(--line); border-radius:4px; padding:1px 5px; }
.pick-foot { color:var(--ink3); font-size:11.5px; margin-top:34px; }
#homeBtn { font-size:15px; padding:4px 10px; }

/* ---------- mobile ---------- */
@media (max-width:640px) {
  main { padding:10px 8px 60px; }
  .top-inner { padding:8px 10px 0; }
  .title-row { gap:8px; }
  .title-row .meta { display:none; }
  .title-row .brand { font-size:9.5px; }
  .title-row .picker select { font-size:13.5px; max-width:56vw; }
  .ctrl-row { gap:8px; margin-top:6px; }
  .seg { overflow-x:auto; scrollbar-width:none; max-width:100%; }
  .seg button { padding:6px 10px; }
  nav.tabs button { padding:10px 10px 11px; font-size:12.5px; }
  .card { padding:10px 11px; margin-bottom:10px; border-radius:9px; }
  .card h3 .right { width:100%; margin-left:0; }
  .stat-row { grid-template-columns:repeat(2,1fr); gap:7px; }
  .stat .v { font-size:16px; }
  .chip { padding:5px 10px; }
  .rail-btn { padding:6px 7px; }
  table.t { font-size:11.5px; }
  table.t td { padding:4px 6px; }
  table.t th { padding:4px 6px; }
  .addlap select { max-width:34vw; }
  .btn { padding:6px 11px; }
  .insights { gap:5px; }
  .insight { font-size:11.5px; padding:5px 9px; }
}

</style>

<script>
/* ============ core: data decode, state, helpers ============ */
"use strict";
const HUB = window.HUB = {};

/* ---- gzip decoding (embedded base64 or fetched .json.gz) ---- */
async function gunzipJSON(bytes) {
  const ds = new DecompressionStream("gzip");
  const stream = new Blob([bytes]).stream().pipeThrough(ds);
  const text = await new Response(stream).text();
  return JSON.parse(text);
}
async function decodeBundle() {
  const b64 = document.getElementById("data").textContent.trim();
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return gunzipJSON(bytes);
}
async function fetchSession(url) {
  const r = await fetch(url, { cache: "no-cache" });
  if (!r.ok) throw new Error(`${url}: HTTP ${r.status}`);
  return gunzipJSON(new Uint8Array(await r.arrayBuffer()));
}

/* ---- formatting ---- */
function fmtLap(ms) {
  if (ms == null) return "—";
  const h = Math.floor(ms / 3600000), m = Math.floor(ms % 3600000 / 60000), s = (ms % 60000) / 1000;
  if (h > 0) return `${h}:${String(m).padStart(2, "0")}:${s.toFixed(3).padStart(6, "0")}`;
  return m > 0 ? `${m}:${s.toFixed(3).padStart(6, "0")}` : s.toFixed(3);
}
function fmtSec(ms, dp = 3) { return ms == null ? "—" : (ms / 1000).toFixed(dp); }
function fmtDelta(ms, dp = 3) {
  if (ms == null) return "—";
  const v = ms / 1000;
  return (v >= 0 ? "+" : "−") + Math.abs(v).toFixed(dp);
}
function fmtClock(ms) {
  if (ms == null) return "—";
  const h = Math.floor(ms / 3600000), m = Math.floor(ms % 3600000 / 60000), s = Math.floor(ms % 60000 / 1000);
  return `${h}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
}
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

/* ---- color helpers ---- */
function hexRgb(h) { h = h.replace("#", ""); return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)]; }
function rgbHex(r, g, b) { return "#" + [r, g, b].map(v => Math.round(Math.max(0, Math.min(255, v))).toString(16).padStart(2, "0")).join(""); }
function lum(h) { const [r, g, b] = hexRgb(h).map(v => { v /= 255; return v <= .03928 ? v / 12.92 : ((v + .055) / 1.055) ** 2.4; }); return .2126 * r + .7152 * g + .0722 * b; }
function mix(h, target, k) { const a = hexRgb(h), b = hexRgb(target); return rgbHex(a[0] + (b[0] - a[0]) * k, a[1] + (b[1] - a[1]) * k, a[2] + (b[2] - a[2]) * k); }
function isDark() {
  const t = document.documentElement.getAttribute("data-theme");
  if (t) return t === "dark";
  return matchMedia("(prefers-color-scheme: dark)").matches;
}
/* team colors tuned per theme so they hold contrast on both grounds */
function teamCol(hex) {
  if (!hex) return "#888";
  let h = hex;
  if (isDark()) { let n = 0; while (lum(h) < 0.10 && n++ < 6) h = mix(h, "#ffffff", 0.22); }
  else { let n = 0; while (lum(h) > 0.62 && n++ < 6) h = mix(h, "#0a0d12", 0.18); }
  return h;
}
const CMP_LETTER = { SOFT: "S", MEDIUM: "M", HARD: "H", INTERMEDIATE: "I", WET: "W", UNKNOWN: "?", TEST_UNKNOWN: "T" };
function cmpCol(c) {
  const v = getComputedStyle(document.documentElement).getPropertyValue("--cmp-" + (c || "UNKNOWN"));
  return v.trim() || "#9ca3af";
}
function cmpDot(c, sz) {
  const l = CMP_LETTER[c] || "?";
  return `<span class="cmp-dot" style="border-color:${cmpCol(c)};color:${cmpCol(c)};${sz ? `width:${sz}px;height:${sz}px;` : ""}" title="${esc(c)}">${l}</span>`;
}

/* ---- track status ---- */
function tsFlags(ts) {
  const s = String(ts || "1");
  return { yellow: s.includes("2"), sc: s.includes("4"), red: s.includes("5"), vsc: s.includes("6") || s.includes("7"), green: !/[24567]/.test(s) };
}

/* ---- session helpers ---- */
const SNAMES = { FP1: "FP1", FP2: "FP2", FP3: "FP3", SQ: "Sprint Quali", S: "Sprint", Q: "Qualifying", R: "Race" };
HUB.session = id => HUB.data.sessions.find(s => s.id === (id ?? HUB.S.sid));
HUB.driver = (abbr, sid) => (HUB.session(sid) || {}).drivers.find(d => d.abbr === abbr) || HUB.session("R")?.drivers.find(d => d.abbr === abbr);
function drvColor(abbr, sid) { const d = HUB.driver(abbr, sid); return teamCol(d ? d.color : "#888"); }
function drvDash(abbr, sid) { const d = HUB.driver(abbr, sid); return d && d.style === 1 ? "6 3" : null; }
function lapsOf(sid, drv) {
  const s = HUB.session(sid);
  if (!s) return [];
  return drv ? s.laps.filter(l => l.drv === drv) : s.laps;
}
/* clean = representative racing lap */
function isClean(l) {
  return l.t != null && !l.in && !l.out && !l.del && tsFlags(l.ts).green && l.acc;
}
function fuelCorr(l, sid) {
  /* fuel-corrected time: remove the advantage of a lighter car late in the race */
  const S = HUB.S, s = HUB.session(sid);
  if (!S.fuelOn || !s || !(s.id === "R" || s.id === "S") || !s.totalLaps) return l.t;
  return l.t - (s.totalLaps - l.lap) * S.fuelK * 1000;
}

/* ---- linear fit (least squares) -> {a intercept, b slope, n} ---- */
function linfit(pts) {
  const n = pts.length;
  if (n < 3) return null;
  let sx = 0, sy = 0, sxx = 0, sxy = 0;
  for (const [x, y] of pts) { sx += x; sy += y; sxx += x * x; sxy += x * y; }
  const den = n * sxx - sx * sx;
  if (Math.abs(den) < 1e-9) return null;
  const b = (n * sxy - sx * sy) / den, a = (sy - b * sx) / n;
  return { a, b, n };
}
function median(arr) {
  if (!arr.length) return null;
  const s = [...arr].sort((a, b) => a - b), m = s.length >> 1;
  return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2;
}
function quantile(arr, q) {
  if (!arr.length) return null;
  const s = [...arr].sort((a, b) => a - b);
  const p = (s.length - 1) * q, lo = Math.floor(p);
  return s[lo] + (s[Math.min(lo + 1, s.length - 1)] - s[lo]) * (p - lo);
}

/* ---- state ---- */
HUB.S = {
  sid: "R",
  tab: "overview",
  sel: new Set(),          // selected driver abbrs (driver rail)
  colorMode: "team",       // team | compound (pace chart)
  fuelOn: false, fuelK: 0.06,
  showOff: false,          // include slow/outlier laps
  compare: [],             // [{sid, drv, lap}] telemetry basket (max 6)
  degCmp: null,            // compound filter on deg tab
  qseg: 3,                 // quali segment
  raceView: "trace",
  mapMode: "dom",
  telZoom: null,           // [r0, r1]
  telPanels: { delta: true, v: true, th: true, b: true, g: true, n: false, d: true },
};
HUB.storeKey = () => `f1hub_${HUB.data.year}_${HUB.data.round}`;
HUB.save = () => { try { localStorage.setItem(HUB.storeKey(), JSON.stringify({ compare: HUB.S.compare, fuelK: HUB.S.fuelK })); } catch (e) { } };
HUB.restore = () => {
  try {
    const s = JSON.parse(localStorage.getItem(HUB.storeKey()) || "{}");
    HUB.S.compare = (s.compare || []).filter(c => HUB.session(c.sid)?.tel[c.drv + "-" + c.lap]);
    if (s.fuelK) HUB.S.fuelK = s.fuelK;
  } catch (e) { }
};

/* ---- toast ---- */
let toastT;
function toast(msg) {
  let el = document.getElementById("toast");
  if (!el) {
    el = document.createElement("div"); el.id = "toast";
    el.style.cssText = "position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:8px 16px;border-radius:8px;font-size:12.5px;font-weight:600;z-index:99;opacity:0;transition:opacity .15s";
    document.body.appendChild(el);
  }
  el.textContent = msg; el.style.opacity = "1";
  clearTimeout(toastT); toastT = setTimeout(() => el.style.opacity = "0", 1900);
}
function addCompare(sid, drv, lap) {
  const S = HUB.S;
  if (S.compare.some(c => c.sid === sid && c.drv === drv && c.lap === lap)) { toast("Already in compare"); return; }
  if (!HUB.session(sid)?.tel[drv + "-" + lap]) { toast("No telemetry for this lap"); return; }
  if (S.compare.length >= 6) { toast("Compare is full (6 laps max)"); return; }
  S.compare.push({ sid, drv, lap });
  HUB.save();
  toast(`Added ${drv} L${lap} (${SNAMES[sid]}) — ${S.compare.length} in Telemetry`);
  if (S.tab === "tel") HUB.render(); else if (typeof renderTabs === "function") renderTabs();
  const b = document.querySelector('nav.tabs button[data-tab="tel"]');
  if (b) { b.style.color = "var(--accent)"; setTimeout(() => b.style.color = "", 1200); }
}

/* ============ charts: minimal SVG toolkit ============ */
"use strict";
const NS = "http://www.w3.org/2000/svg";
function svgEl(tag, attrs, parent) {
  const el = document.createElementNS(NS, tag);
  for (const k in attrs || {}) el.setAttribute(k, attrs[k]);
  if (parent) parent.appendChild(el);
  return el;
}
function cvar(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

function niceTicks(lo, hi, n = 6) {
  if (!(hi > lo)) return [lo];
  const span = hi - lo, step0 = span / n, mag = 10 ** Math.floor(Math.log10(step0));
  const step = [1, 2, 2.5, 5, 10].map(m => m * mag).find(s => span / s <= n) || 10 * mag;
  const t = [];
  for (let v = Math.ceil(lo / step) * step; v <= hi + 1e-9; v += step) t.push(+v.toFixed(10));
  return t;
}

/*
 * Chart(container, opts):
 *   h, mt/mr/mb/ml margins, xd [lo,hi], yd [lo,hi], xfmt/yfmt tick formatters,
 *   xlab/ylab axis labels, yflip (true => smaller at top), xticks/yticks counts
 * Returns { svg, plot, x(), y(), W, H, iw, ih, hover(), bands(), clip }
 */
let CLIP_ID = 0;
function Chart(container, o) {
  const W = o.w || Math.max(320, container.clientWidth || 800);
  const H = o.h || 300;
  const mt = o.mt ?? 12, mr = o.mr ?? 14, mb = o.mb ?? (o.xlab ? 40 : 26), ml = o.ml ?? 58;
  const iw = W - ml - mr, ih = H - mt - mb;
  const svg = svgEl("svg", { viewBox: `0 0 ${W} ${H}`, role: "img" }, null);
  if (o.label) svg.setAttribute("aria-label", o.label);
  container.appendChild(svg);
  const [x0, x1] = o.xd, [y0, y1] = o.yd;
  const x = v => ml + (v - x0) / (x1 - x0 || 1) * iw;
  const y = o.yflip
    ? v => mt + (v - y0) / (y1 - y0 || 1) * ih
    : v => mt + ih - (v - y0) / (y1 - y0 || 1) * ih;

  const gGrid = svgEl("g", {}, svg);
  const clipId = "clip" + (++CLIP_ID);
  const defs = svgEl("defs", {}, svg);
  const cp = svgEl("clipPath", { id: clipId }, defs);
  svgEl("rect", { x: ml, y: mt, width: iw, height: ih }, cp);
  const plot = svgEl("g", { "clip-path": `url(#${clipId})` }, svg);
  const gAxis = svgEl("g", {}, svg);

  // gridlines + ticks
  const yt = o.yticksArr || niceTicks(Math.min(y0, y1), Math.max(y0, y1), o.yticks || 6);
  for (const v of yt) {
    if (v < Math.min(y0, y1) - 1e-9 || v > Math.max(y0, y1) + 1e-9) continue;
    svgEl("line", { x1: ml, x2: ml + iw, y1: y(v), y2: y(v), stroke: cvar("--grid"), "stroke-width": 1 }, gGrid);
    svgEl("text", { x: ml - 7, y: y(v) + 3.5, "text-anchor": "end", "font-size": 10.5, fill: cvar("--ink3"), class: "num" }, gAxis).textContent = o.yfmt ? o.yfmt(v) : v;
  }
  const xt = o.xticksArr || niceTicks(x0, x1, o.xticks || 8);
  for (const v of xt) {
    if (v < x0 - 1e-9 || v > x1 + 1e-9) continue;
    if (o.xgrid !== false) svgEl("line", { x1: x(v), x2: x(v), y1: mt, y2: mt + ih, stroke: cvar("--grid"), "stroke-width": 1 }, gGrid);
    svgEl("text", { x: x(v), y: mt + ih + 15, "text-anchor": "middle", "font-size": 10.5, fill: cvar("--ink3"), class: "num" }, gAxis).textContent = o.xfmt ? o.xfmt(v) : v;
  }
  // frame baseline
  svgEl("line", { x1: ml, x2: ml + iw, y1: mt + ih, y2: mt + ih, stroke: cvar("--line"), "stroke-width": 1 }, gAxis);
  if (o.xlab) svgEl("text", { x: ml + iw / 2, y: H - 6, "text-anchor": "middle", class: "xlab" }, gAxis).textContent = o.xlab;
  if (o.ylab) {
    const t = svgEl("text", { x: 0, y: 0, "text-anchor": "middle", class: "ylab", transform: `translate(12,${mt + ih / 2}) rotate(-90)` }, gAxis);
    t.textContent = o.ylab;
  }
  return { svg, plot, defs, x, y, W, H, iw, ih, ml, mt, mr, mb, xd: o.xd, yd: o.yd };
}

function linePath(pts, x, y) {
  let d = "";
  for (let i = 0; i < pts.length; i++) {
    const p = pts[i];
    if (p == null || p[1] == null) { continue; }
    d += (d && pts[i - 1] && pts[i - 1][1] != null ? "L" : "M") + x(p[0]).toFixed(1) + "," + y(p[1]).toFixed(1);
  }
  return d;
}
function stepPath(pts, x, y) {
  let d = "", prev = null;
  for (const p of pts) {
    if (p == null || p[1] == null) { prev = null; continue; }
    const px = x(p[0]).toFixed(1), py = y(p[1]).toFixed(1);
    d += prev == null ? `M${px},${py}` : `H${px}V${py}`;
    prev = p;
  }
  return d;
}

/* spread label y-positions so they don't collide; items: [{y,...}] mutated in place */
function spreadLabels(items, gap, lo, hi) {
  if (!items.length) return items;
  items.sort((a, b) => a.y - b.y);
  for (let i = 1; i < items.length; i++) if (items[i].y < items[i - 1].y + gap) items[i].y = items[i - 1].y + gap;
  if (hi != null && items.at(-1).y > hi) {
    items.at(-1).y = hi;
    for (let i = items.length - 2; i >= 0; i--) if (items[i].y > items[i + 1].y - gap) items[i].y = items[i + 1].y - gap;
  }
  if (lo != null) {
    if (items[0].y < lo) items[0].y = lo;
    for (let i = 1; i < items.length; i++) if (items[i].y < items[i - 1].y + gap) items[i].y = items[i - 1].y + gap;
  }
  return items;
}

/* shared tooltip */
let TIP;
function tip() {
  if (!TIP) { TIP = document.createElement("div"); TIP.className = "tip"; document.body.appendChild(TIP); }
  return TIP;
}
function tipShow(html, ev) {
  const t = tip(); t.innerHTML = html; t.classList.add("show");
  const pad = 14, w = t.offsetWidth, h = t.offsetHeight;
  let X = ev.clientX + pad, Y = ev.clientY + pad;
  if (X + w > innerWidth - 8) X = ev.clientX - w - pad;
  if (Y + h > innerHeight - 8) Y = ev.clientY - h - pad;
  t.style.left = X + "px"; t.style.top = Y + "px";
}
function tipHide() { if (TIP) TIP.classList.remove("show"); }

/* attach per-mark hover to a set of svg nodes */
function hoverMarks(nodes, html) {
  nodes.forEach((n, i) => {
    n.addEventListener("pointerenter", ev => tipShow(html(i), ev));
    n.addEventListener("pointermove", ev => tipShow(html(i), ev));
    n.addEventListener("pointerleave", tipHide);
  });
}

/* legend */
function legend(container, items) {
  const el = document.createElement("div"); el.className = "legend";
  el.innerHTML = items.map(it =>
    `<span class="li"><span class="${it.dot ? "swd" : "sw"}" style="background:${it.color};${it.dash ? "background:repeating-linear-gradient(90deg," + it.color + " 0 4px,transparent 4px 7px);" : ""}"></span>${esc(it.label)}</span>`).join("");
  container.appendChild(el);
  return el;
}

/* horizontal drag-zoom on a chart; cb([v0,v1]) in x-domain units, cb(null) on reset */
function dragZoom(ch, cb) {
  const { svg, ml, mt, iw, ih } = ch;
  let sx = null, rect = null;
  const toVal = px => ch.xd[0] + (px - ml) / iw * (ch.xd[1] - ch.xd[0]);
  svg.style.cursor = "crosshair";
  svg.style.touchAction = "pan-y";  // vertical swipe scrolls the page, horizontal drag zooms
  svg.addEventListener("pointerdown", e => {
    const p = pt(e); if (p.x < ml || p.x > ml + iw) return;
    sx = p.x; svg.setPointerCapture(e.pointerId);
    rect = svgEl("rect", { x: sx, y: mt, width: 0, height: ih, fill: "var(--accent)", opacity: .12 }, svg);
  });
  svg.addEventListener("pointermove", e => {
    if (sx == null || !rect) return;
    const p = pt(e), a = Math.min(sx, p.x), w = Math.abs(p.x - sx);
    rect.setAttribute("x", a); rect.setAttribute("width", w);
  });
  svg.addEventListener("pointerup", e => {
    if (sx == null) return;
    const p = pt(e), a = Math.min(sx, p.x), b = Math.max(sx, p.x);
    if (rect) rect.remove(); rect = null;
    const s0 = sx; sx = null;
    if (b - a > 12) cb([toVal(a), toVal(b)]);
  });
  svg.addEventListener("dblclick", () => cb(null));
  function pt(e) {
    const r = svg.getBoundingClientRect();
    return { x: (e.clientX - r.left) / r.width * ch.W, y: (e.clientY - r.top) / r.height * ch.H };
  }
  ch.toVal = toVal; ch.pt = pt;
}

/* ============ views A: driver rail, overview, pace ============ */
"use strict";

/* ---------- driver rail ---------- */
function driverRail(root, opts = {}) {
  const s = HUB.session();
  const wrap = document.createElement("div");
  wrap.className = "drv-rail";
  wrap.innerHTML = `<span class="lbl">Drivers</span>`;
  const order = [...s.drivers].sort((a, b) => (a.pos ?? 99) - (b.pos ?? 99));
  for (const d of order) {
    const on = HUB.S.sel.has(d.abbr);
    const c = document.createElement("button");
    c.className = "chip " + (on ? "on" : "off");
    c.innerHTML = `<span class="dot" style="background:${teamCol(d.color)}"></span>${d.abbr}`;
    c.title = `${d.name} — ${d.team} (double-click to solo)`;
    c.addEventListener("click", () => { HUB.S.sel.has(d.abbr) ? HUB.S.sel.delete(d.abbr) : HUB.S.sel.add(d.abbr); HUB.render(); });
    c.addEventListener("dblclick", () => { HUB.S.sel = new Set([d.abbr]); HUB.render(); });
    wrap.appendChild(c);
  }
  const mk = (label, fn) => {
    const b = document.createElement("button"); b.className = "rail-btn"; b.textContent = label;
    b.addEventListener("click", fn); wrap.appendChild(b);
  };
  mk("All", () => { HUB.S.sel = new Set(s.drivers.map(d => d.abbr)); HUB.render(); });
  mk("None", () => { HUB.S.sel = new Set(); HUB.render(); });
  mk("Top 10", () => { HUB.S.sel = new Set(order.slice(0, 10).map(d => d.abbr)); HUB.render(); });
  mk("Leaders", () => {
    const seen = new Set(), pick = [];
    for (const d of order) { if (!seen.has(d.team)) { seen.add(d.team); pick.push(d.abbr); } }
    HUB.S.sel = new Set(pick); HUB.render();
  });
  root.appendChild(wrap);
}
function selDrivers() {
  const s = HUB.session();
  return [...s.drivers].sort((a, b) => (a.pos ?? 99) - (b.pos ?? 99)).filter(d => HUB.S.sel.has(d.abbr));
}
function card(root, title, subtitle) {
  const c = document.createElement("div"); c.className = "card";
  if (title) {
    const h = document.createElement("h3");
    h.innerHTML = esc(title) + (subtitle ? ` <span class="sub">${esc(subtitle)}</span>` : "") + `<span class="right"></span>`;
    c.appendChild(h);
  }
  root.appendChild(c);
  return c;
}
function drvCell(d) {
  return `<span class="drv-cell"><span class="dot" style="background:${teamCol(d.color)}"></span>${esc(d.abbr)} <span class="team">${esc(d.team)}</span></span>`;
}
function insights(root, arr) {
  if (!arr.length) return;
  const el = document.createElement("div"); el.className = "insights";
  el.innerHTML = arr.map(t => `<div class="insight">${t}</div>`).join("");
  root.appendChild(el);
}

/* ---------- practice standings (computed from laps) ---------- */
function practiceStandings(s) {
  const rows = [];
  for (const d of s.drivers) {
    const laps = s.laps.filter(l => l.drv === d.abbr);
    const timed = laps.filter(l => l.t != null && !l.del);
    const best = timed.length ? timed.reduce((a, b) => a.t < b.t ? a : b) : null;
    rows.push({ d, best, n: laps.length });
  }
  rows.sort((a, b) => (a.best ? a.best.t : 1e12) - (b.best ? b.best.t : 1e12));
  return rows;
}

/* ---------- OVERVIEW ---------- */
function viewOverview(root) {
  const s = HUB.session();
  const isRace = s.id === "R" || s.id === "S";
  const isQ = s.id === "Q" || s.id === "SQ";

  // ---- headline stats ----
  const stats = [];
  const timed = s.laps.filter(l => l.t != null && !l.del);
  const fl = timed.length ? timed.reduce((a, b) => a.t < b.t ? a : b) : null;
  const flD = fl && HUB.driver(fl.drv);
  if (isRace) {
    const p1 = s.drivers.find(d => d.pos === 1), p2 = s.drivers.find(d => d.pos === 2);
    if (p1) stats.push({ k: s.id === "R" ? "Winner" : "Sprint winner", v: p1.abbr, c: teamCol(p1.color), s: p1.team });
    if (p2 && p2.time != null) stats.push({ k: "Margin", v: fmtDelta(p2.time) + "s", s: "to " + p2.abbr });
    if (fl) stats.push({ k: "Fastest lap", v: fmtLap(fl.t), c: flD && teamCol(flD.color), s: `${fl.drv} · lap ${fl.lap}` });
    const movers = s.drivers.filter(d => d.grid && d.pos).map(d => ({ d, g: d.grid - d.pos })).sort((a, b) => b.g - a.g);
    if (movers.length && movers[0].g > 0) stats.push({ k: "Biggest mover", v: `+${movers[0].g}`, c: teamCol(movers[0].d.color), s: `${movers[0].d.abbr} · P${movers[0].d.grid}→P${movers[0].d.pos}` });
    const scLaps = new Set(), vscLaps = new Set();
    for (const l of s.laps) { const f = tsFlags(l.ts); if (f.sc) scLaps.add(l.lap); else if (f.vsc) vscLaps.add(l.lap); }
    stats.push({ k: "SC / VSC laps", v: `${scLaps.size} / ${vscLaps.size}`, s: scLaps.size ? "laps " + [...scLaps].sort((a, b) => a - b).join(", ").slice(0, 24) : "clean race" });
    const dnf = s.drivers.filter(d => d.status && !/Finished|\+/.test(d.status));
    stats.push({ k: "Retirements", v: String(dnf.length), s: dnf.map(d => d.abbr).join(", ") || "none" });
  } else if (isQ) {
    const p1 = s.drivers.find(d => d.pos === 1);
    if (p1) stats.push({ k: s.id === "Q" ? "Pole" : "Sprint pole", v: p1.abbr, c: teamCol(p1.color), s: fmtLap(p1.q3 ?? p1.q2 ?? p1.q1) });
    const p2 = s.drivers.find(d => d.pos === 2);
    if (p1 && p2) { const t1 = p1.q3 ?? p1.q2, t2 = p2.q3 ?? p2.q2; if (t1 && t2) stats.push({ k: "Gap to P2", v: fmtDelta(t2 - t1) + "s", s: p2.abbr }); }
    if (fl) stats.push({ k: "Best lap", v: fmtLap(fl.t), s: `${fl.drv} · ${fl.cmp || ""}` });
  } else {
    const st = practiceStandings(s)[0];
    if (st && st.best) stats.push({ k: "P1", v: st.d.abbr, c: teamCol(st.d.color), s: fmtLap(st.best.t) });
    if (fl) stats.push({ k: "Best lap", v: fmtLap(fl.t), s: `${fl.drv} · ${fl.cmp || ""}` });
    stats.push({ k: "Laps run", v: String(s.laps.length), s: "all drivers" });
  }
  if (s.weather.length) {
    const air = s.weather.map(w => w[1]).filter(v => v != null), trk = s.weather.map(w => w[2]).filter(v => v != null);
    const rain = s.weather.some(w => w[6]);
    stats.push({ k: "Air / Track", v: `${Math.min(...air).toFixed(0)}–${Math.max(...air).toFixed(0)}° / ${Math.min(...trk).toFixed(0)}–${Math.max(...trk).toFixed(0)}°`, s: rain ? "rain during session" : "dry" });
  }
  const sr = document.createElement("div"); sr.className = "stat-row";
  sr.innerHTML = stats.map(st => `<div class="stat"><div class="k">${esc(st.k)}</div><div class="v">${st.c ? `<span class="dot" style="background:${st.c}"></span>` : ""}<span class="num">${esc(st.v)}</span></div><div class="s num">${esc(st.s || "")}</div></div>`).join("");
  root.appendChild(sr);

  // ---- results table ----
  const c1 = card(root, SNAMES[s.id] + " classification");
  const wrap = document.createElement("div"); wrap.className = "tblwrap"; c1.appendChild(wrap);
  let html = "";
  if (isRace) {
    html = `<table class="t"><thead><tr><th class="r">P</th><th>Driver</th><th class="r">Grid</th><th class="r">+/−</th><th class="r">Time / Gap</th><th class="r">Best lap</th><th>Stops</th><th class="r">Pts</th><th>Status</th></tr></thead><tbody>` +
      s.drivers.filter(d => d.pos).sort((a, b) => a.pos - b.pos).map(d => {
        const laps = s.laps.filter(l => l.drv === d.abbr);
        const best = laps.filter(l => l.t != null && !l.del).reduce((a, b) => !a || b.t < a.t ? b : a, null);
        const stops = laps.filter(l => l.in).length;
        const stints = [...new Map(laps.filter(l => l.cmp).map(l => [l.stint, l.cmp])).values()];
        const diff = d.grid ? d.grid - d.pos : null;
        const diffH = diff == null ? "" : diff > 0 ? `<span class="pos-gain">▲${diff}</span>` : diff < 0 ? `<span class="pos-loss">▼${-diff}</span>` : `<span class="pos-same">•</span>`;
        const t = d.pos === 1 ? fmtLap(d.time) : (d.time != null ? fmtDelta(d.time) : (d.status || ""));
        return `<tr><td class="r num">${d.pos}</td><td>${drvCell(d)}</td><td class="r num">${d.grid ?? "—"}</td><td class="r">${diffH}</td><td class="r num">${t}</td><td class="r num ${best && fl && best.t === fl.t ? "best" : ""}">${best ? fmtLap(best.t) : "—"}</td><td>${stints.map(c => cmpDot(c)).join(" ")}</td><td class="r num">${d.points || ""}</td><td class="num" style="color:var(--ink3)">${esc(d.status || "")}</td></tr>`;
      }).join("") + "</tbody></table>";
  } else if (isQ) {
    const seg = s.id === "SQ" ? "SQ" : "Q";
    const best = { 1: null, 2: null, 3: null };
    for (const d of s.drivers) { for (const i of [1, 2, 3]) { const v = d["q" + i]; if (v != null && (!best[i] || v < best[i])) best[i] = v; } }
    html = `<table class="t"><thead><tr><th class="r">P</th><th>Driver</th><th class="r">${seg}1</th><th class="r">${seg}2</th><th class="r">${seg}3</th><th class="r">Gap</th></tr></thead><tbody>` +
      s.drivers.filter(d => d.pos).sort((a, b) => a.pos - b.pos).map(d => {
        const bt = d.q3 ?? d.q2 ?? d.q1, p1 = s.drivers.find(x => x.pos === 1), p1t = p1 && (p1.q3 ?? p1.q2 ?? p1.q1);
        const cell = i => { const v = d["q" + i]; return `<td class="r num ${v != null && v === best[i] ? "best" : ""}">${fmtLap(v)}</td>`; };
        const cut = (s.id === "Q" || s.id === "SQ") && (d.pos === 15 || d.pos === 10) ? ' style="border-bottom:2px solid var(--line2)"' : "";
        return `<tr${cut}><td class="r num">${d.pos}</td><td>${drvCell(d)}</td>${cell(1)}${cell(2)}${cell(3)}<td class="r num">${d.pos === 1 ? "—" : (bt != null && p1t != null && d.q3 != null ? fmtDelta(bt - p1t) : "")}</td></tr>`;
      }).join("") + "</tbody></table>";
  } else {
    const rows = practiceStandings(s);
    const p1t = rows[0] && rows[0].best ? rows[0].best.t : null;
    html = `<table class="t"><thead><tr><th class="r">P</th><th>Driver</th><th class="r">Best</th><th class="r">Gap</th><th>Tyre</th><th class="r">Laps</th></tr></thead><tbody>` +
      rows.map((r, i) => `<tr><td class="r num">${i + 1}</td><td>${drvCell(r.d)}</td><td class="r num ${i === 0 ? "best" : ""}">${r.best ? fmtLap(r.best.t) : "—"}</td><td class="r num">${r.best && p1t != null && i > 0 ? fmtDelta(r.best.t - p1t) : ""}</td><td>${r.best && r.best.cmp ? cmpDot(r.best.cmp) : ""}</td><td class="r num">${r.n}</td></tr>`).join("") + "</tbody></table>";
  }
  wrap.innerHTML = html;

  // ---- race control ----
  if (s.rcm.length) {
    const c2 = card(root, "Race control", s.rcm.length + " messages");
    const seg = document.createElement("div"); seg.className = "seg mini";
    const cats = [["All", () => true], ["Flags", m => m.flag], ["SC/VSC", m => /SAFETY|VSC/i.test(m.msg || "")], ["Penalties", m => /PENALTY|INVESTIGATION|WARNING/i.test(m.msg || "")], ["Deleted laps", m => /DELETED/i.test(m.msg || "")]];
    let cur = 0;
    const wrap2 = document.createElement("div"); wrap2.className = "tblwrap"; wrap2.style.maxHeight = "340px"; wrap2.style.overflowY = "auto";
    const draw = () => {
      const rows = s.rcm.filter(cats[cur][1]);
      wrap2.innerHTML = `<table class="t"><thead><tr><th>Time</th><th class="r">Lap</th><th>Flag</th><th>Message</th></tr></thead><tbody>` +
        rows.map(m => `<tr><td class="num" style="color:var(--ink3)">${esc((m.time || "").slice(11, 19))}</td><td class="r num">${m.lap ?? ""}</td><td>${m.flag ? `<span class="tag" style="background:var(--surface3)">${esc(m.flag)}</span>` : ""}</td><td style="white-space:normal">${esc(m.msg)}</td></tr>`).join("") + "</tbody></table>";
      seg.querySelectorAll("button").forEach((b, i) => b.classList.toggle("on", i === cur));
    };
    cats.forEach(([label], i) => {
      const b = document.createElement("button"); b.textContent = label;
      b.addEventListener("click", () => { cur = i; draw(); });
      seg.appendChild(b);
    });
    c2.querySelector(".right").appendChild(seg);
    c2.appendChild(wrap2);
    draw();
  }
}

/* ---------- PACE ---------- */
function paceFilter(l, medByDrv) {
  const S = HUB.S;
  if (l.t == null) return false;
  if (S.showOff) return true;
  if (l.in || l.out || l.del) return false;
  const med = medByDrv[l.drv];
  return !(med && l.t > med * 1.07);
}
function viewPace(root) {
  const s = HUB.session(), S = HUB.S;
  const isRace = s.id === "R" || s.id === "S";
  driverRail(root);

  const c = card(root, "Lap times", "click any lap to add it to Telemetry compare");
  const right = c.querySelector(".right");
  right.innerHTML = `
    <div class="seg mini" id="cmode"><button ${S.colorMode === "team" ? 'class="on"' : ""}>Team</button><button ${S.colorMode === "compound" ? 'class="on"' : ""}>Compound</button></div>
    ${isRace ? `<label class="toggle"><input type="checkbox" id="fuel" ${S.fuelOn ? "checked" : ""}>fuel-corr</label>
    <input type="range" id="fuelk" min="0" max="0.12" step="0.005" value="${S.fuelK}" style="width:70px" title="fuel effect s/lap">
    <span class="hint num" id="fuelv">${S.fuelK.toFixed(3)} s/lap</span>` : ""}
    <label class="toggle"><input type="checkbox" id="outl" ${S.showOff ? "checked" : ""}>all laps</label>`;
  const [bTeam, bCmp] = right.querySelectorAll("#cmode button");
  bTeam.addEventListener("click", () => { S.colorMode = "team"; HUB.render(); });
  bCmp.addEventListener("click", () => { S.colorMode = "compound"; HUB.render(); });
  right.querySelector("#outl").addEventListener("change", e => { S.showOff = e.target.checked; HUB.render(); });
  if (isRace) {
    right.querySelector("#fuel").addEventListener("change", e => { S.fuelOn = e.target.checked; HUB.render(); });
    right.querySelector("#fuelk").addEventListener("input", e => { S.fuelK = +e.target.value; right.querySelector("#fuelv").textContent = S.fuelK.toFixed(3) + " s/lap"; });
    right.querySelector("#fuelk").addEventListener("change", () => { HUB.save(); if (S.fuelOn) HUB.render(); });
  }

  const drvs = selDrivers();
  if (!drvs.length) { c.insertAdjacentHTML("beforeend", `<div class="empty">No drivers selected — pick some above.</div>`); return; }

  const medByDrv = {};
  for (const d of s.drivers) {
    const v = s.laps.filter(l => l.drv === d.abbr && isClean(l)).map(l => l.t);
    medByDrv[d.abbr] = median(v);
  }
  const pts = [];
  for (const d of drvs) for (const l of s.laps) if (l.drv === d.abbr && paceFilter(l, medByDrv)) pts.push(l);
  if (!pts.length) { c.insertAdjacentHTML("beforeend", `<div class="empty">No representative laps.</div>`); return; }

  const fc = l => fuelCorr(l, s.id);
  const vals = pts.map(fc);
  const maxLap = Math.max(...pts.map(l => l.lap));
  const lo = Math.min(...vals) - 400;
  const hi = S.showOff ? Math.max(...vals) + 400 : quantile(vals, 0.94) + 900;

  const div = document.createElement("div"); div.className = "chart"; c.appendChild(div);
  const ch = Chart(div, {
    h: 380, mr: 42, xd: [0.5, maxLap + 0.5], yd: [lo, hi],
    xfmt: v => Number.isInteger(v) ? v : "", yfmt: v => fmtLap(Math.round(v)),
    xlab: "Lap", ylab: S.fuelOn && isRace ? "fuel-corrected lap time" : "lap time", label: "Lap time chart"
  });

  // SC / VSC bands
  if (isRace) {
    const worst = {};
    for (const l of s.laps) {
      const f = tsFlags(l.ts);
      const w = f.red ? 3 : f.sc ? 2 : f.vsc ? 1 : 0;
      worst[l.lap] = Math.max(worst[l.lap] || 0, w);
    }
    for (const lap in worst) {
      if (!worst[lap]) continue;
      const fill = worst[lap] === 3 ? "var(--band-red)" : worst[lap] === 2 ? "var(--band-sc)" : "var(--band-vsc)";
      svgEl("rect", { x: ch.x(lap - 0.5), y: ch.mt, width: ch.x(+lap + 0.5) - ch.x(lap - 0.5), height: ch.ih, fill }, ch.plot);
    }
  }
  // lines + dots
  const dotNodes = [], dotLaps = [];
  for (const d of drvs) {
    const laps = pts.filter(l => l.drv === d.abbr).sort((a, b) => a.lap - b.lap);
    const lp = [];
    let prev = null;
    for (const l of laps) { if (prev != null && l.lap - prev > 1) lp.push(null); lp.push([l.lap, fc(l)]); prev = l.lap; }
    const col = teamCol(d.color);
    const path = svgEl("path", { d: linePath(lp, ch.x, ch.y), fill: "none", stroke: col, "stroke-width": 1.6, opacity: .85 }, ch.plot);
    if (drvDash(d.abbr)) path.setAttribute("stroke-dasharray", drvDash(d.abbr));
    for (const l of laps) {
      const fillc = S.colorMode === "compound" ? cmpCol(l.cmp) : col;
      const cx = ch.x(l.lap), cy = ch.y(fc(l));
      const vis = svgEl("circle", { cx, cy, r: pts.length > 400 ? 2.6 : 3.4, fill: fillc, stroke: "var(--surface)", "stroke-width": 1.2, "pointer-events": "none" }, ch.plot);
      if (l.pb) vis.setAttribute("stroke", "var(--green)");
      // generous invisible hit target so laps are tappable on touch screens
      const hit = svgEl("circle", { cx, cy, r: 9, fill: "transparent", cursor: "pointer" }, ch.plot);
      dotNodes.push(hit); dotLaps.push(l);
      hit.addEventListener("click", () => addCompare(s.id, l.drv, l.lap));
    }
  }
  // direct labels at line ends, de-collided
  const endLabels = [];
  for (const d of drvs) {
    const laps = pts.filter(l => l.drv === d.abbr).sort((a, b) => a.lap - b.lap);
    if (!laps.length) continue;
    const last = laps.at(-1);
    endLabels.push({ y: ch.y(fc(last)), x: ch.x(last.lap) + 6, txt: d.abbr, col: teamCol(d.color) });
  }
  spreadLabels(endLabels, 11, ch.mt + 4, ch.mt + ch.ih - 2);
  for (const L of endLabels)
    svgEl("text", { x: Math.min(L.x, ch.ml + ch.iw + 4), y: L.y + 3.5, "font-size": 10, "font-weight": 700, fill: L.col, class: "num" }, ch.svg).textContent = L.txt;
  hoverMarks(dotNodes, i => {
    const l = dotLaps[i], d = HUB.driver(l.drv), f = tsFlags(l.ts);
    return `<div class="t-title">${esc(l.drv)} — lap ${l.lap}${l.pb ? " · PB" : ""}${l.del ? " · DELETED" : ""}</div>
      <table><tr><td>Time</td><td class="num"><b>${fmtLap(l.t)}</b>${S.fuelOn && isRace ? ` <span style="color:var(--ink3)">(fc ${fmtLap(Math.round(fc(l)))})</span>` : ""}</td></tr>
      <tr><td>Sectors</td><td class="num">${fmtSec(l.s1)} / ${fmtSec(l.s2)} / ${fmtSec(l.s3)}</td></tr>
      <tr><td>Tyre</td><td>${l.cmp ? `${esc(l.cmp)} · ${l.life} laps` : "—"}</td></tr>
      ${l.pos ? `<tr><td>Position</td><td class="num">P${l.pos}</td></tr>` : ""}
      ${!f.green ? `<tr><td>Track</td><td>${f.sc ? "Safety Car" : f.vsc ? "VSC" : f.red ? "Red flag" : "Yellow"}</td></tr>` : ""}
      <tr><td colspan="2" style="color:var(--ink3)">click to add to Telemetry</td></tr></table>`;
  });
  legend(div.parentElement, S.colorMode === "compound"
    ? ["SOFT", "MEDIUM", "HARD", "INTERMEDIATE", "WET"].filter(cc => pts.some(l => l.cmp === cc)).map(cc => ({ color: cmpCol(cc), label: cc, dot: true }))
    : [...new Map(drvs.map(d => [d.team, d])).values()].map(d => ({ color: teamCol(d.color), label: d.team, dot: true })));
  if (isRace) legend(div.parentElement, [{ color: "var(--band-sc)", label: "SC band", dot: true }, { color: "var(--band-vsc)", label: "VSC band", dot: true }]);

  // ---- pace distribution ----
  const c2 = card(root, "Race pace distribution", "clean green-flag laps only" + (S.fuelOn && isRace ? " · fuel-corrected" : ""));
  const rows = [];
  for (const d of drvs) {
    const v = s.laps.filter(l => l.drv === d.abbr && isClean(l)).map(l => fuelCorr(l, s.id));
    if (v.length >= 3) rows.push({ d, v, med: median(v), q1: quantile(v, .25), q3: quantile(v, .75), p5: quantile(v, .05), p95: quantile(v, .95) });
  }
  rows.sort((a, b) => a.med - b.med);
  if (rows.length < 2) { c2.insertAdjacentHTML("beforeend", `<div class="empty">Not enough clean laps.</div>`); }
  else {
    const div2 = document.createElement("div"); div2.className = "chart"; c2.appendChild(div2);
    const xlo = Math.min(...rows.map(r => r.p5)) - 250, xhi = Math.max(...rows.map(r => r.p95)) + 250;
    const rh = 26, H = rows.length * rh + 46;
    const ch2 = Chart(div2, { h: H, xd: [xlo, xhi], yd: [0, rows.length], ml: 100, mb: 30, yticksArr: [], xfmt: v => fmtLap(Math.round(v)), xlab: "lap time", label: "Pace distribution box plot" });
    const boxes = [];
    rows.forEach((r, i) => {
      const cy = ch2.mt + (i + .5) * (ch2.ih / rows.length), col = teamCol(r.d.color);
      svgEl("text", { x: ch2.ml - 10, y: cy + 4, "text-anchor": "end", "font-size": 11.5, "font-weight": 700, fill: col, class: "num" }, ch2.svg).textContent = r.d.abbr;
      svgEl("line", { x1: ch2.x(r.p5), x2: ch2.x(r.p95), y1: cy, y2: cy, stroke: col, "stroke-width": 1.4, opacity: .7 }, ch2.plot);
      const bx = svgEl("rect", { x: ch2.x(r.q1), y: cy - 7, width: Math.max(2, ch2.x(r.q3) - ch2.x(r.q1)), height: 14, fill: col, opacity: .38, rx: 3, stroke: col, "stroke-width": 1 }, ch2.plot);
      svgEl("line", { x1: ch2.x(r.med), x2: ch2.x(r.med), y1: cy - 8, y2: cy + 8, stroke: col, "stroke-width": 2.4 }, ch2.plot);
      svgEl("text", { x: Math.min(ch2.x(r.p95) + 7, ch2.ml + ch2.iw - 108), y: cy + 3.5, "font-size": 10, fill: "var(--ink3)", class: "num" }, ch2.svg).textContent = `${fmtLap(Math.round(r.med))} · n=${r.v.length}`;
      boxes.push(bx);
    });
    hoverMarks(boxes, i => {
      const r = rows[i];
      return `<div class="t-title">${esc(r.d.abbr)} — ${esc(r.d.team)}</div><table>
        <tr><td>Median</td><td class="num"><b>${fmtLap(Math.round(r.med))}</b></td></tr>
        <tr><td>IQR</td><td class="num">${fmtSec(r.q3 - r.q1, 3)}s</td></tr>
        <tr><td>P5–P95</td><td class="num">${fmtLap(Math.round(r.p5))} – ${fmtLap(Math.round(r.p95))}</td></tr>
        <tr><td>Clean laps</td><td class="num">${r.v.length}</td></tr></table>`;
    });
  }

  // insights
  const ins = [];
  const bestL = pts.reduce((a, b) => fc(b) < fc(a) ? b : a);
  ins.push(`Fastest: <b>${bestL.drv}</b> ${fmtLap(bestL.t)} (lap ${bestL.lap}${bestL.cmp ? ", " + bestL.cmp : ""})`);
  if (rows && rows.length >= 2) {
    const cons = [...rows].filter(r => r.v.length >= 8).sort((a, b) => (a.q3 - a.q1) - (b.q3 - b.q1))[0];
    if (cons) ins.push(`Most consistent: <b>${cons.d.abbr}</b> (IQR ${fmtSec(cons.q3 - cons.q1, 2)}s over ${cons.v.length} laps)`);
    ins.push(`Pace spread P1→P${rows.length}: <b>${fmtSec(rows.at(-1).med - rows[0].med, 2)}s</b>/lap on median`);
  }
  insights(root, ins);
  root.insertBefore(root.lastChild, root.children[1]);
}

/* ============ views B: tyres & degradation, long runs ============ */
"use strict";

function stintsOf(s) {
  const map = new Map();
  for (const l of s.laps) {
    if (l.stint == null) continue;
    const k = l.drv + "#" + l.stint;
    if (!map.has(k)) map.set(k, { drv: l.drv, stint: l.stint, laps: [] });
    map.get(k).laps.push(l);
  }
  for (const st of map.values()) {
    st.laps.sort((a, b) => a.lap - b.lap);
    st.from = st.laps[0].lap; st.to = st.laps.at(-1).lap;
    st.cmp = (st.laps.find(l => l.cmp) || {}).cmp || "UNKNOWN";
    st.startLife = Math.min(...st.laps.map(l => l.life ?? 99));
    st.fresh = st.laps[0].fresh;
  }
  return [...map.values()];
}

/* robust linear fit of (tyre life, fuel-corrected ms) for one stint */
function stintFit(st, sid) {
  const pts0 = st.laps.filter(l => isClean(l) && l.life != null)
    .filter((l, i, arr) => l.lap > st.from)             // drop first lap of stint
    .map(l => [l.life, fuelCorrWith(l, sid)]);
  if (pts0.length < 4) return null;
  let fit = linfit(pts0);
  if (!fit) return null;
  const pts = pts0.filter(([x, y]) => Math.abs(y - (fit.a + fit.b * x)) < 1200);
  if (pts.length >= 4) fit = linfit(pts) || fit;
  fit.pts = pts;
  return fit;
}
/* fuel correction that is always on for deg analysis of race sessions */
function fuelCorrWith(l, sid) {
  const s = HUB.session(sid);
  if (!s || !(s.id === "R" || s.id === "S") || !s.totalLaps) return l.t;
  return l.t - (s.totalLaps - l.lap) * HUB.S.fuelK * 1000;
}

function degSessionId() {
  return ["R", "S", "FP1", "FP2", "FP3"].includes(HUB.S.sid) ? HUB.S.sid : "R";
}

function viewDeg(root) {
  const sid = degSessionId(), s = HUB.session(sid);
  const isRace = sid === "R" || sid === "S";
  if (sid !== HUB.S.sid) root.insertAdjacentHTML("beforeend", `<p class="note">Showing <b>${SNAMES[sid]}</b> — degradation needs long running (Race, Sprint or practice).</p>`);

  const stints = stintsOf(s);

  /* ---- strategy timeline ---- */
  if (isRace) {
    const c = card(root, "Strategy", "stint compound + length; hover pit markers for pit-lane time");
    const drivers = s.drivers.filter(d => d.pos).sort((a, b) => a.pos - b.pos);
    const total = s.totalLaps || Math.max(...s.laps.map(l => l.lap));
    const div = document.createElement("div"); div.className = "chart"; c.appendChild(div);
    const rh = 21, H = drivers.length * rh + 40;
    const ch = Chart(div, { h: H, xd: [0, total], yd: [0, 1], ml: 88, mb: 28, yticksArr: [], xlab: "lap", label: "Strategy timeline" });
    const stNodes = [], stData = [];
    drivers.forEach((d, i) => {
      const cy = ch.mt + i * (ch.ih / drivers.length) + (ch.ih / drivers.length) / 2;
      svgEl("text", { x: ch.ml - 8, y: cy + 3.5, "text-anchor": "end", "font-size": 10.5, "font-weight": 700, fill: teamCol(d.color), class: "num" }, ch.svg).textContent = `P${d.pos} ${d.abbr}`;
      const dst = stints.filter(t => t.drv === d.abbr).sort((a, b) => a.from - b.from);
      for (const t of dst) {
        const x0 = ch.x(t.from - 1), x1 = ch.x(t.to);
        const r = svgEl("rect", { x: x0 + 1, y: cy - 7, width: Math.max(1, x1 - x0 - 2), height: 14, rx: 3.5, fill: cmpCol(t.cmp), opacity: .88, stroke: "var(--surface)", "stroke-width": 1 }, ch.plot);
        if (x1 - x0 > 26) svgEl("text", { x: (x0 + x1) / 2, y: cy + 3.2, "text-anchor": "middle", "font-size": 9, "font-weight": 800, fill: "#0b0d10" }, ch.plot).textContent = (CMP_LETTER[t.cmp] || "?") + (t.startLife > 1 ? "•" : "") + (t.to - t.from + 1);
        stNodes.push(r); stData.push({ t, d });
      }
      // pit markers
      const inLaps = s.laps.filter(l => l.drv === d.abbr && l.in);
      for (const l of inLaps) {
        const nx = s.laps.find(n => n.drv === d.abbr && n.lap === l.lap + 1 && n.pitOut != null);
        const dur = nx && l.pitIn != null ? nx.pitOut - l.pitIn : null;
        const m = svgEl("path", { d: `M${ch.x(l.lap)},${cy - 10} l4,-5 l-8,0 Z`, fill: "var(--ink2)" }, ch.plot);
        m.style.cursor = "default";
        m.addEventListener("pointermove", ev => tipShow(`<div class="t-title">${d.abbr} — pit lap ${l.lap}</div>pit lane: <b class="num">${dur ? fmtSec(dur, 1) + "s" : "?"}</b>`, ev));
        m.addEventListener("pointerleave", tipHide);
      }
    });
    hoverMarks(stNodes, i => {
      const { t, d } = stData[i];
      const clean = t.laps.filter(isClean).map(l => l.t);
      const fit = stintFit(t, sid);
      return `<div class="t-title">${d.abbr} stint ${t.stint} — ${esc(t.cmp)}${t.startLife > 1 ? " (used, " + t.startLife + " laps old)" : " (new)"}</div><table>
        <tr><td>Laps</td><td class="num">${t.from}–${t.to} (${t.to - t.from + 1})</td></tr>
        <tr><td>Median pace</td><td class="num">${clean.length ? fmtLap(Math.round(median(clean))) : "—"}</td></tr>
        <tr><td>Deg (fuel-corr)</td><td class="num">${fit ? "+" + (fit.b / 1000).toFixed(3) + " s/lap" : "—"}</td></tr></table>`;
    });
    legend(div, ["SOFT", "MEDIUM", "HARD", "INTERMEDIATE", "WET"].filter(cc => stints.some(t => t.cmp === cc)).map(cc => ({ color: cmpCol(cc), label: cc, dot: true })).concat([{ color: "var(--ink2)", label: "▲ pit stop", dot: true }]));
  }

  /* ---- degradation model ---- */
  const cmps = [...new Set(stints.map(t => t.cmp))].filter(cc => cc !== "UNKNOWN" && stints.filter(t => t.cmp === cc).some(t => stintFit(t, sid)));
  if (!cmps.length) { card(root, "Tyre degradation").insertAdjacentHTML("beforeend", `<div class="empty">Not enough clean stint running to fit degradation.</div>`); return; }
  if (!HUB.S.degCmp || !cmps.includes(HUB.S.degCmp)) HUB.S.degCmp = cmps.includes("MEDIUM") ? "MEDIUM" : cmps[0];

  const c2 = card(root, "Tyre degradation", `per-stint baseline removed · first lap of stint dropped · traffic/SC laps excluded${isRace ? ` · fuel-corrected at ${HUB.S.fuelK.toFixed(3)} s/lap` : ""}`);
  const segEl = document.createElement("div"); segEl.className = "seg mini";
  for (const cc of cmps) {
    const b = document.createElement("button");
    b.innerHTML = cmpDot(cc) + " " + cc;
    if (cc === HUB.S.degCmp) b.classList.add("on");
    b.addEventListener("click", () => { HUB.S.degCmp = cc; HUB.render(); });
    segEl.appendChild(b);
  }
  c2.querySelector(".right").appendChild(segEl);

  // pooled normalized points per team
  const teams = new Map(); // team -> {col, pts:[[life, dMs]], drvs:Set}
  for (const t of stints.filter(t => t.cmp === HUB.S.degCmp)) {
    const fit = stintFit(t, sid);
    if (!fit) continue;
    const d = HUB.driver(t.drv, sid);
    if (!d) continue;
    if (!teams.has(d.team)) teams.set(d.team, { col: teamCol(d.color), pts: [], drvs: new Set(), stints: 0 });
    const T = teams.get(d.team);
    T.stints++;
    T.drvs.add(t.drv);
    for (const [x, y] of fit.pts) T.pts.push([x, y - fit.a, t.drv, t.stint]);
  }
  const rows = [...teams.entries()].map(([team, T]) => ({ team, ...T, fit: linfit(T.pts.map(p => [p[0], p[1]])) }))
    .filter(r => r.fit && r.pts.length >= 6).sort((a, b) => a.fit.b - b.fit.b);

  if (!rows.length) { c2.insertAdjacentHTML("beforeend", `<div class="empty">Not enough data on this compound.</div>`); }
  else {
    const div2 = document.createElement("div"); div2.className = "chart"; c2.appendChild(div2);
    const allPts = rows.flatMap(r => r.pts);
    const xmax = Math.max(...allPts.map(p => p[0])) + 1;
    const ylo = Math.min(quantile(allPts.map(p => p[1]), 0.02), -200), yhi = Math.max(quantile(allPts.map(p => p[1]), 0.985) + 300, 800);
    const ch2 = Chart(div2, { h: 360, xd: [0, xmax], yd: [ylo, yhi], yfmt: v => (v / 1000).toFixed(1), xlab: "tyre life (laps)", ylab: "Δ pace vs stint baseline (s)", label: "Degradation scatter" });
    const nodes = [], data = [];
    const labels = [];
    for (const r of rows) {
      for (const p of r.pts) {
        const n = svgEl("circle", { cx: ch2.x(p[0]), cy: ch2.y(p[1]), r: 2.8, fill: r.col, opacity: .5 }, ch2.plot);
        nodes.push(n); data.push({ p, r });
      }
      const f = r.fit;
      svgEl("line", { x1: ch2.x(0), y1: ch2.y(f.a), x2: ch2.x(xmax), y2: ch2.y(f.a + f.b * xmax), stroke: r.col, "stroke-width": 2.4 }, ch2.plot);
      const yEnd = Math.min(Math.max(f.a + f.b * xmax, ylo + 100), yhi - 100);
      labels.push({ y: ch2.y(yEnd) - 6, txt: r.team, col: r.col });
    }
    spreadLabels(labels, 12, ch2.mt + 8, ch2.mt + ch2.ih - 4);
    for (const L of labels)
      svgEl("text", { x: ch2.ml + ch2.iw - 4, y: L.y, "text-anchor": "end", "font-size": 10, "font-weight": 700, fill: L.col }, ch2.svg).textContent = L.txt;
    hoverMarks(nodes, i => {
      const { p, r } = data[i];
      return `<div class="t-title">${esc(p[2])} stint ${p[3]} — ${esc(r.team)}</div>tyre life ${p[0]} · Δ <b class="num">${(p[1] / 1000).toFixed(3)}s</b> vs stint baseline`;
    });
    legend(div2, rows.map(r => ({ color: r.col, label: r.team })));

    const wrap = document.createElement("div"); wrap.className = "tblwrap"; c2.appendChild(wrap);
    wrap.innerHTML = `<table class="t"><thead><tr><th>Team</th><th class="r">Deg (s/lap)</th><th class="r">±10 laps costs</th><th class="r">Stints</th><th class="r">Laps</th><th>Drivers</th></tr></thead><tbody>` +
      rows.map((r, i) => `<tr><td><span class="drv-cell"><span class="dot" style="background:${r.col}"></span>${esc(r.team)}</span></td>
        <td class="r num" style="${i === 0 ? "color:var(--green);font-weight:700" : i === rows.length - 1 ? "color:var(--red);font-weight:700" : ""}">+${(r.fit.b / 1000).toFixed(3)}</td>
        <td class="r num">${(r.fit.b / 100).toFixed(2)}s</td>
        <td class="r num">${r.stints}</td><td class="r num">${r.pts.length}</td><td>${[...r.drvs].join(" ")}</td></tr>`).join("") + "</tbody></table>";

    insights(root, [
      `Kindest to the ${HUB.S.degCmp.toLowerCase()}: <b>${rows[0].team}</b> at +${(rows[0].fit.b / 1000).toFixed(3)} s/lap`,
      rows.length > 1 ? `Highest deg: <b>${rows.at(-1).team}</b> (+${(rows.at(-1).fit.b / 1000).toFixed(3)} s/lap) — ${((rows.at(-1).fit.b - rows[0].fit.b) / 100).toFixed(2)}s more over a 10-lap stint` : "",
    ].filter(Boolean));
  }

  /* ---- stint explorer ---- */
  const c3 = card(root, "All stints", "every stint with a fit; sorted by pace");
  const srows = stints.map(t => {
    const clean = t.laps.filter(isClean);
    const fit = stintFit(t, sid);
    const d = HUB.driver(t.drv, sid);
    return { t, d, fit, med: clean.length ? median(clean.map(l => fuelCorrWith(l, sid))) : null, best: clean.length ? Math.min(...clean.map(l => l.t)) : null, n: clean.length };
  }).filter(r => r.n >= 3 && r.med != null && r.d).sort((a, b) => a.med - b.med);
  const w3 = document.createElement("div"); w3.className = "tblwrap"; w3.style.maxHeight = "420px"; w3.style.overflowY = "auto"; c3.appendChild(w3);
  w3.innerHTML = `<table class="t"><thead><tr><th>Driver</th><th>Tyre</th><th class="r">Laps</th><th class="r">Stint len</th><th class="r">Median${isRace ? " (fc)" : ""}</th><th class="r">Best</th><th class="r">Deg s/lap</th></tr></thead><tbody>` +
    srows.map(r => `<tr><td>${drvCell(r.d)}</td><td>${cmpDot(r.t.cmp)} ${r.t.startLife > 1 ? `<span class="hint">+${r.t.startLife - 1} old</span>` : ""}</td>
      <td class="r num">${r.t.from}–${r.t.to}</td><td class="r num">${r.t.to - r.t.from + 1}</td>
      <td class="r num">${fmtLap(Math.round(r.med))}</td><td class="r num">${fmtLap(r.best)}</td>
      <td class="r num">${r.fit ? "+" + (r.fit.b / 1000).toFixed(3) : "—"}</td></tr>`).join("") + "</tbody></table>";
}

/* ---------- LONG RUNS (practice) ---------- */
function viewLongRuns(root) {
  const practiceIds = HUB.data.sessions.filter(s => s.id.startsWith("FP")).map(s => s.id);
  if (!practiceIds.length) { root.innerHTML = `<div class="empty">No practice session in this weekend.</div>`; return; }
  // FP2 is where representative long running happens on a conventional
  // weekend; sprint weekends only have FP1
  const pref = practiceIds.includes("FP2") ? "FP2" : practiceIds[0];
  const sid = practiceIds.includes(HUB.S.sid) ? HUB.S.sid : pref;
  const s = HUB.session(sid);
  if (sid !== HUB.S.sid) root.insertAdjacentHTML("beforeend", `<p class="note">Showing <b>${SNAMES[sid]}</b> — the representative long-run session${practiceIds.length > 1 ? "; use the session picker for other practice sessions" : ""}.</p>`);

  // detect runs
  const runs = [];
  for (const t of stintsOf(s)) {
    const laps = t.laps.filter(l => l.t != null && !l.in && !l.out && !l.del);
    if (laps.length < 5) continue;
    const med = median(laps.map(l => l.t));
    const run = laps.filter(l => l.t < med * 1.035);   // strip cool-down / traffic laps
    if (run.length < 5) continue;
    const d = HUB.driver(t.drv, sid);
    if (!d) continue;
    const fit = linfit(run.map((l, i) => [i, l.t]));
    runs.push({ t, d, run, med: median(run.map(l => l.t)), best: Math.min(...run.map(l => l.t)), fit, key: t.drv + "#" + t.stint });
  }
  runs.sort((a, b) => a.med - b.med);
  // drop junk "runs" (constant-speed running, aero rakes, traffic sims) far off genuine long-run pace
  if (runs.length > 1) {
    const ref = runs[0].med;
    for (let i = runs.length - 1; i >= 0; i--) if (runs[i].med > ref * 1.12) runs.splice(i, 1);
  }
  if (!runs.length) { root.insertAdjacentHTML("beforeend", `<div class="empty">No stint of 5+ representative laps found — nobody did race sims here.</div>`); return; }

  // tag how representative each run is: length ≈ fuel ≈ trust
  for (const r of runs) {
    const valid = r.t.laps.filter(l => !l.in && !l.out && l.t != null).length;
    r.pushCool = valid > 0 && r.run.length / valid < 0.62;   // lots of stripped laps = push-cool program
    r.tag = r.pushCool ? "push-cool?" : r.run.length >= 9 ? "race sim" : r.run.length <= 6 ? "short run" : "";
  }
  if (!HUB.S.lrSel) {
    // default: each team's most representative run (longest, then fastest),
    // top 4 teams — the midfield "glory runs" on low fuel stay off by default
    const perTeam = new Map();
    for (const r of runs) {
      const cur = perTeam.get(r.d.team);
      if (!cur || r.run.length > cur.run.length || (r.run.length === cur.run.length && r.med < cur.med)) perTeam.set(r.d.team, r);
    }
    HUB.S.lrSel = new Set([...perTeam.values()].sort((a, b) => a.med - b.med).slice(0, 4).map(r => r.key));
  }

  const c = card(root, "Long runs", `stints of 5+ laps in ${SNAMES[sid]} · out/in and cool-down laps stripped · fuel loads unknown`);
  const chips = document.createElement("div"); chips.className = "drv-rail"; c.appendChild(chips);
  for (const r of runs) {
    const on = HUB.S.lrSel.has(r.key);
    const b = document.createElement("button");
    b.className = "chip sm " + (on ? "on" : "off");
    b.innerHTML = `<span class="dot" style="background:${teamCol(r.d.color)}"></span>${r.d.abbr} ${cmpDot(r.t.cmp, 13)} <span class="num">${r.run.length}L</span>`;
    b.addEventListener("click", () => { on ? HUB.S.lrSel.delete(r.key) : HUB.S.lrSel.add(r.key); HUB.render(); });
    chips.appendChild(b);
  }
  const sel = runs.filter(r => HUB.S.lrSel.has(r.key));
  if (sel.length) {
    const div = document.createElement("div"); div.className = "chart"; c.appendChild(div);
    const allT = sel.flatMap(r => r.run.map(l => l.t));
    const maxN = Math.max(...sel.map(r => r.run.length));
    const ch = Chart(div, {
      h: 340, xd: [0.6, maxN + 0.4], yd: [Math.min(...allT) - 300, quantile(allT, 0.97) + 500],
      yfmt: v => fmtLap(Math.round(v)), xfmt: v => Number.isInteger(v) ? v : "", xlab: "lap in run", ylab: "lap time", label: "Long run comparison"
    });
    const nodes = [], data = [];
    for (const r of sel) {
      const col = teamCol(r.d.color);
      const pts = r.run.map((l, i) => [i + 1, l.t]);
      const p = svgEl("path", { d: linePath(pts, ch.x, ch.y), fill: "none", stroke: col, "stroke-width": 1.8, opacity: .9 }, ch.plot);
      if (drvDash(r.d.abbr, sid)) p.setAttribute("stroke-dasharray", "6 3");
      pts.forEach(([xx, yy], i) => {
        const n = svgEl("circle", { cx: ch.x(xx), cy: ch.y(yy), r: 3.4, fill: cmpCol(r.t.cmp), stroke: col, "stroke-width": 1.4 }, ch.plot);
        nodes.push(n); data.push({ r, i });
      });
      const last = pts.at(-1);
      svgEl("text", { x: ch.x(last[0]) + 6, y: ch.y(last[1]) + 3.5, "font-size": 10, "font-weight": 700, fill: col, class: "num" }, ch.svg).textContent = r.d.abbr;
    }
    hoverMarks(nodes, i => {
      const { r, i: li } = data[i];
      const l = r.run[li];
      return `<div class="t-title">${r.d.abbr} — ${esc(r.t.cmp)} run, lap ${li + 1}/${r.run.length}</div>
        <b class="num">${fmtLap(l.t)}</b> · tyre life ${l.life} · session lap ${l.lap}<br><span style="color:var(--ink3)">click dot in Pace view to add to telemetry</span>`;
    });
    legend(div, [...new Map(sel.map(r => [r.d.team, r])).values()].map(r => ({ color: teamCol(r.d.color), label: r.d.team })));
  }

  /* ---- deg gradient: the fuel-proof comparison ---- */
  const grads = runs.filter(r => r.fit && r.run.length >= 7 && !r.pushCool).sort((a, b) => a.fit.b - b.fit.b);
  if (grads.length >= 2) {
    const cg = card(root, "Deg gradient", "time lost per lap within each run — fuel load cancels out of the slope, so this IS comparable across cars");
    const div = document.createElement("div"); div.className = "chart"; cg.appendChild(div);
    const mx = Math.max(...grads.map(r => Math.abs(r.fit.b)), 100);
    const rh2 = 24, H2 = grads.length * rh2 + 40;
    const chg = Chart(div, { h: H2, xd: [Math.min(0, ...grads.map(r => r.fit.b)) - 20, mx * 1.25], yd: [0, 1], ml: 100, mb: 26, yticksArr: [], xfmt: v => "+" + (v / 1000).toFixed(2), xlab: "deg (s/lap)", label: "Deg gradient ranking" });
    const bars2 = [];
    grads.forEach((r, i) => {
      const cy = chg.mt + (i + .5) * (chg.ih / grads.length), col = teamCol(r.d.color);
      svgEl("text", { x: chg.ml - 8, y: cy + 3.5, "text-anchor": "end", "font-size": 11, "font-weight": 700, fill: col, class: "num" }, chg.svg).textContent = `${r.d.abbr} ${CMP_LETTER[r.t.cmp] || ""}`;
      const x0 = chg.x(Math.min(0, r.fit.b)), x1 = chg.x(Math.max(0, r.fit.b));
      const bar = svgEl("rect", { x: x0, y: cy - 8, width: Math.max(2, x1 - x0), height: 16, rx: 3.5, fill: col, opacity: .85 }, chg.plot);
      svgEl("text", { x: x1 + 6, y: cy + 3.5, "font-size": 10, fill: "var(--ink2)", class: "num" }, chg.plot).textContent = `+${(r.fit.b / 1000).toFixed(3)} · ${r.run.length}L`;
      bars2.push(bar);
    });
    hoverMarks(bars2, i => {
      const r = grads[i];
      return `<div class="t-title">${r.d.abbr} — ${esc(r.t.cmp)} run, ${r.run.length} laps</div>deg <b class="num">+${(r.fit.b / 1000).toFixed(3)} s/lap</b> · over 20 laps that compounds to <b class="num">${(r.fit.b * 20 / 1000).toFixed(1)}s</b>`;
    });
    cg.insertAdjacentHTML("beforeend", `<p class="note">Race sims only (7+ clean laps, no push-cool programs). A car burning fuel gets ~0.06 s/lap faster, so true tyre deg is roughly the shown slope <b>+ 0.06</b> — but that offset is the same for everyone, so the order stands.</p>`);
  }

  const c2 = card(root, "Run ranking", "⚠ fuel unknown — two 10-lap runs can differ by 40 kg. Absolute pace here proves nothing; the gradient above is the honest signal");
  const w = document.createElement("div"); w.className = "tblwrap"; c2.appendChild(w);
  w.innerHTML = `<table class="t"><thead><tr><th class="r">#</th><th>Driver</th><th>Tyre</th><th class="r">Laps</th><th></th><th class="r">Median</th><th class="r">Best</th><th class="r">Trend s/lap</th><th class="r">Gap</th></tr></thead><tbody>` +
    runs.map((r, i) => `<tr${r.tag === "race sim" ? "" : ' style="opacity:.82"'}><td class="r num">${i + 1}</td><td>${drvCell(r.d)}</td><td>${cmpDot(r.t.cmp)}${r.t.startLife > 1 ? ` <span class="hint">used</span>` : ""}</td>
      <td class="r num">${r.run.length}</td>
      <td>${r.tag ? `<span class="tag" style="${r.tag === "race sim" ? "background:rgba(74,222,128,.18);color:var(--green)" : "background:var(--surface3);color:var(--ink3)"}">${r.tag}</span>` : ""}</td>
      <td class="r num ${i === 0 ? "best" : ""}">${fmtLap(Math.round(r.med))}</td><td class="r num">${fmtLap(r.best)}</td>
      <td class="r num">${r.fit ? (r.fit.b >= 0 ? "+" : "") + (r.fit.b / 1000).toFixed(3) : "—"}</td>
      <td class="r num">${i === 0 ? "—" : fmtDelta(r.med - runs[0].med)}</td></tr>`).join("") + "</tbody></table>";
  c2.insertAdjacentHTML("beforeend", `<p class="note">Longer runs carry more fuel and mean more; <b>race sim</b> ≥ 9 laps, <b>short run</b> ≤ 6 laps, <b>push-cool?</b> = many stripped laps between pushes. Trends within a run are real; gaps across teams are indicative only.</p>`);

  // headline goes to the most representative running, not the fastest light-fuel glory run
  const rep = runs.filter(r => r.run.length >= 7 && !r.pushCool);
  const head = rep[0] || runs[0];
  insights(root, [
    `Best representative long run: <b>${head.d.abbr}</b> ${fmtLap(Math.round(head.med))} on ${head.t.cmp.toLowerCase()}s (${head.run.length} laps)${rep.length ? "" : " — no true race sims this session, treat with care"}`,
    head !== runs[0] ? `<b>${runs[0].d.abbr}</b> tops the raw ranking (${fmtLap(Math.round(runs[0].med))}) but only over ${runs[0].run.length} laps — likely light fuel` : "",
    rep.find(r => r.fit && r.fit.b < 20) ? `Flattest race sim: <b>${[...rep].filter(r => r.fit).sort((a, b) => a.fit.b - b.fit.b)[0].d.abbr}</b> — barely any drop-off` : "",
  ].filter(Boolean));

  lrSheet(root, s, runs);
}

/* ---- shareable long-run sheet (lap-by-lap grid + PNG export) ---- */
function lrSheet(root, s, runs) {
  // one column per driver — their best run; columns ordered by average pace
  const best = new Map();
  for (const r of runs) if (!best.has(r.d.abbr) || r.med < best.get(r.d.abbr).med) best.set(r.d.abbr, r);
  const cols = [...best.values()];
  for (const c of cols) {
    const laps = c.t.laps.filter(l => !l.in && !l.out && l.t != null);
    const inRun = new Set(c.run.map(l => l.lap));
    c.cells = laps.map(l => ({ t: l.t, x: !inRun.has(l.lap) || l.del }));
    c.avg = c.run.reduce((a, l) => a + l.t, 0) / c.run.length;
  }
  cols.sort((a, b) => a.avg - b.avg);
  if (!cols.length) return;
  const maxRows = Math.max(...cols.map(c => c.cells.length));
  const baseSec = Math.floor(Math.min(...cols.map(c => c.avg)) / 60000) * 60;
  const cell = t => (t / 1000 - baseSec).toFixed(3);
  const surname = d => (d.name || d.abbr).split(" ").at(-1);
  const headTxt = c => `${surname(c.d)} (${CMP_LETTER[c.t.cmp] || "?"})`;

  const card2 = card(root, "Long run sheet", "lap-by-lap, X = stripped (traffic / cool-down / deleted) · sorted by average pace");
  const right = card2.querySelector(".right");
  const dl = document.createElement("button"); dl.className = "btn pri"; dl.textContent = "Download PNG";
  right.appendChild(dl);
  const w = document.createElement("div"); w.className = "tblwrap"; card2.appendChild(w);
  let html = `<table class="t lr-sheet"><thead><tr>` + cols.map(c => {
    const col = teamCol(c.d.color), dark = lum(col) < 0.4;
    return `<th style="background:${col};color:${dark ? "#fff" : "#111"};text-align:center">${esc(headTxt(c))}</th>`;
  }).join("") + `</tr></thead><tbody>`;
  for (let i = 0; i < maxRows; i++) {
    html += "<tr>" + cols.map(c => {
      const cc = c.cells[i];
      if (!cc) return i === c.cells.length ? `<td class="lr-end"></td>` : `<td></td>`;
      return `<td class="r num" style="text-align:center${cc.x ? ";color:var(--ink3)" : ""}">${cc.x ? "X" : cell(cc.t)}</td>`;
    }).join("") + "</tr>";
  }
  html += `<tr class="lr-avg"><td colspan="${cols.length}">AVERAGE STINT PACE</td></tr><tr>` +
    cols.map(c => `<td class="num" style="text-align:center;font-weight:700">${cell(c.avg)}</td>`).join("") + `</tr></tbody></table>`;
  w.innerHTML = html;
  card2.insertAdjacentHTML("beforeend", `<p class="note">Times shown minus ${baseSec / 60} min (e.g. ${cell(cols[0].avg)} = ${fmtLap(Math.round(cols[0].avg))}).</p>`);

  dl.addEventListener("click", () => sheetPNG(
    `Long Runs ${HUB.data.location} ${SNAMES[s.id] || s.id} ${HUB.data.year}`, cols, cell, headTxt, maxRows));
}

function sheetPNG(title, cols, cell, headTxt, maxRows) {
  const cw = 122, rh = 27, hh = 34, pad = 24, titleH = 52, footH = 30;
  const W = pad * 2 + cw * cols.length;
  const H = titleH + hh + maxRows * rh + 12 + rh * 2 + footH + pad;
  const cv = document.createElement("canvas");
  const k = 2; cv.width = W * k; cv.height = H * k;
  const x0 = pad, ctx = cv.getContext("2d");
  ctx.scale(k, k);
  ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = "#111"; ctx.font = "700 21px -apple-system,Segoe UI,Arial"; ctx.textAlign = "center";
  ctx.fillText(title, W / 2, 34);
  const mono = '13px ui-monospace,Consolas,Menlo,monospace';
  // headers
  cols.forEach((c, i) => {
    const col = teamCol(c.d.color);
    ctx.fillStyle = col; ctx.fillRect(x0 + i * cw, titleH, cw - 2, hh - 4);
    ctx.fillStyle = lum(col) < 0.4 ? "#fff" : "#111";
    ctx.font = "700 12.5px -apple-system,Segoe UI,Arial";
    ctx.fillText(headTxt(c), x0 + i * cw + cw / 2 - 1, titleH + 21);
  });
  // cells
  for (let rIdx = 0; rIdx < maxRows; rIdx++) {
    const y = titleH + hh + rIdx * rh;
    cols.forEach((c, i) => {
      const cx = x0 + i * cw;
      const cc = c.cells[rIdx];
      if (!cc && rIdx === c.cells.length) { ctx.fillStyle = "#111"; ctx.fillRect(cx, y, cw - 2, rh - 3); return; }
      ctx.strokeStyle = "#c9cdd4"; ctx.lineWidth = 1; ctx.strokeRect(cx + .5, y + .5, cw - 3, rh - 4);
      if (!cc) return;
      ctx.fillStyle = cc.x ? "#9aa0a8" : "#111"; ctx.font = cc.x ? "700 13px Arial" : mono;
      ctx.fillText(cc.x ? "X" : cell(cc.t), cx + cw / 2 - 1, y + 18);
    });
  }
  // average band
  const yA = titleH + hh + maxRows * rh + 12;
  ctx.fillStyle = "#bfe3ad"; ctx.fillRect(x0, yA, cw * cols.length - 2, rh - 3);
  ctx.fillStyle = "#111"; ctx.font = "700 13px -apple-system,Segoe UI,Arial";
  ctx.fillText("AVERAGE STINT PACE", x0 + (cw * cols.length) / 2, yA + 18);
  cols.forEach((c, i) => {
    const cx = x0 + i * cw, y = yA + rh;
    ctx.strokeStyle = "#c9cdd4"; ctx.strokeRect(cx + .5, y + .5, cw - 3, rh - 4);
    ctx.fillStyle = "#111"; ctx.font = "700 " + mono;
    ctx.fillText(cell(c.avg), cx + cw / 2 - 1, y + 18);
  });
  ctx.fillStyle = "#9aa0a8"; ctx.font = "11px -apple-system,Segoe UI,Arial";
  ctx.fillText("minisector · data via FastF1 · out/in laps removed, X = stripped lap", W / 2, H - 14);
  cv.toBlob(b => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(b);
    a.download = title.toLowerCase().replace(/[^a-z0-9]+/g, "-") + ".png";
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  }, "image/png");
}

/* ============ views C: qualifying, race ============ */
"use strict";

function viewQuali(root) {
  const qids = HUB.data.sessions.filter(s => s.id === "Q" || s.id === "SQ").map(s => s.id);
  if (!qids.length) { root.innerHTML = `<div class="empty">No qualifying session.</div>`; return; }
  const sid = qids.includes(HUB.S.sid) ? HUB.S.sid : "Q";
