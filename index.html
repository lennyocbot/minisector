/* ============ view E: straights — end-of-straight speeds & ERS clipping ============ */
"use strict";

/* find the straights on the reference lap: stretches ending at a braking onset,
   long and fast enough to matter */
function detectStraights(tel, map) {
  const N = tel.v.length, L = tel.len;
  const out = [];
  let from = 0;
  const ends = [];
  for (let i = 2; i < N; i++) if (tel.b[i] && !tel.b[i - 1] && !tel.b[i - 2]) ends.push(i);
  ends.push(N - 1); // start/finish straight ends at the line
  for (const i of ends) {
    let vmax = -1, imax = from;
    for (let j = from; j <= i; j++) if (tel.v[j] > vmax) { vmax = tel.v[j]; imax = j; }
    const len = (i - from) / (N - 1) * L;
    if (len >= 400 && vmax >= 210) {
      let name = "";
      if (map && map.corners.length) {
        const dEnd = i / (N - 1) * map.len;
        const next = map.corners.find(c => c.d >= dEnd - 40) || map.corners[0];
        name = "→ T" + next.n + (next.l || "");
      }
      out.push({ from, iEnd: i, iPeak: imax, vmax, len, name });
    }
    from = i;
  }
  const best = Math.max(...out.map(s => s.vmax));
  return out.filter(s => s.vmax >= best * 0.82).slice(0, 7);
}

/* km/h lost to clipping on one lap, per straight: peak speed minus speed at
   the braking point, counted only while the driver stays flat out — a lift
   (throttle off, lift-and-coast) is not clipping and returns null there */
/* which telemetry grid points sit on a dead-straight piece of track —
   speed falling there at full throttle cannot be cornering scrub */
function straightLineMask(map, N) {
  const M = map.x.length;
  const h = new Array(M).fill(0);
  for (let i = 1; i < M; i++) h[i] = Math.atan2(map.y[i] - map.y[i - 1], map.x[i] - map.x[i - 1]);
  h[0] = h[1];
  const segLen = map.len / (M - 1);
  const mask = new Array(N).fill(false);
  for (let j = 0; j < N; j++) {
    const i = Math.max(2, Math.min(M - 3, Math.round(j / (N - 1) * (M - 1))));
    let dh = 0;
    for (let k = i - 2; k <= i + 1; k++) {
      let a = h[k + 1] - h[k];
      while (a > Math.PI) a -= 2 * Math.PI;
      while (a < -Math.PI) a += 2 * Math.PI;
      dh += Math.abs(a);
    }
    mask[j] = dh / (4 * segLen) < 0.0016;   // curve radius beyond ~600 m ≈ straight line
  }
  return mask;
}

/* per straight: km/h given back while flat on the throttle before this lap's
   own braking point. Lifts simply don't contribute (they're lift-and-coast,
   not clipping) instead of invalidating the whole zone. slLoss counts only
   the part lost on dead-straight track — the superclipping signature. */
function clipLossPer(tel, straights, slMask) {
  const N = tel.v.length;
  // light smoothing so ±1 km/h quantisation wiggle doesn't sum into fake loss
  const vs = tel.v.map((v, i) => i > 0 && i < N - 1 ? (tel.v[i - 1] + v + tel.v[i + 1]) / 3 : v);
  return straights.map(s => {
    const hiRef = Math.min(s.iEnd + 6, N - 1);
    // this lap may still be braking / feeding throttle out of the previous
    // corner past the reference lap's exit point — skip the whole corner-exit
    // zone (up to the first quarter of the window) before looking for the
    // braking onset that ends the straight
    let lo = s.from;
    const lead = Math.min(hiRef - 6, s.from + Math.max(6, Math.round((hiRef - s.from) * 0.25)));
    while (lo < lead && (tel.b[lo] || tel.th[lo] < 90)) lo++;
    let end = hiRef;
    for (let j = lo + 2; j <= hiRef; j++) if (tel.b[j]) { end = j; break; }
    if (end - lo < 6) return null;
    let loss = 0, slLoss = 0, any = false;
    for (let j = lo + 1; j < end - 1; j++) {
      if (tel.b[j] || tel.th[j] < 95 || tel.th[j - 1] < 95) continue;
      any = true;
      const dv = vs[j - 1] - vs[j];
      if (dv > 0.4) {
        loss += dv;
        if (slMask && slMask[j] && slMask[j - 1]) slLoss += dv;
      }
    }
    return any ? { loss, slLoss } : null;
  });
}

/* the circuit with its straights highlighted and labelled */
function straightsMap(cardEl, map, straights, best) {
  const rot = (map.rot || 0) * Math.PI / 180;
  const cos = Math.cos(rot), sin = Math.sin(rot);
  const M = map.x.length;
  const X = map.x.map((x, i) => x * cos - map.y[i] * sin);
  const Y = map.y.map((y, i) => -(map.x[i] * sin + y * cos));
  const pad = 1500;
  const x0 = Math.min(...X) - pad, x1 = Math.max(...X) + pad, y0 = Math.min(...Y) - pad, y1 = Math.max(...Y) + pad;
  const cx0 = (Math.min(...X) + Math.max(...X)) / 2, cy0 = (Math.min(...Y) + Math.max(...Y)) / 2;
  const div = document.createElement("div"); div.className = "chart"; cardEl.appendChild(div);
  const svg = svgEl("svg", { viewBox: `${x0.toFixed(0)} ${y0.toFixed(0)} ${(x1 - x0).toFixed(0)} ${(y1 - y0).toFixed(0)}`, role: "img", "aria-label": "Straights map" }, div);
  svg.style.maxHeight = "460px";
  const sw = (x1 - x0) / 95;
  svgEl("path", { d: X.map((x, i) => (i ? "L" : "M") + x.toFixed(0) + "," + Y[i].toFixed(0)).join("") + "Z", fill: "none", stroke: "var(--surface3)", "stroke-width": sw * 1.5, "stroke-linejoin": "round", "stroke-linecap": "round" }, svg);

  const N = 280; // telemetry grid
  const vmaxAll = Math.max(...straights.map(s => s.vmax));
  straights.forEach((s, si) => {
    const i0 = Math.round(s.from / (N - 1) * (M - 1)), i1 = Math.round(s.iEnd / (N - 1) * (M - 1));
    let d = "";
    for (let i = i0; i <= Math.min(i1, M - 1); i++) d += (d ? "L" : "M") + X[i].toFixed(0) + "," + Y[i].toFixed(0);
    const hot = s.vmax === vmaxAll;
    svgEl("path", { d, fill: "none", stroke: hot ? "var(--accent)" : "var(--ink2)", "stroke-width": sw, "stroke-linecap": "round", opacity: hot ? 1 : .8 }, svg);
    // arrowhead at the braking point
    const ie = Math.min(i1, M - 2);
    const dx = X[ie + 1] - X[ie], dy = Y[ie + 1] - Y[ie], n = Math.hypot(dx, dy) || 1;
    const ax = X[ie], ay = Y[ie], ux = dx / n, uy = dy / n;
    svgEl("path", { d: `M${ax + ux * sw * 2},${ay + uy * sw * 2} L${ax - uy * sw},${ay + ux * sw} L${ax + uy * sw},${ay - ux * sw} Z`, fill: hot ? "var(--accent)" : "var(--ink2)" }, svg);
    // label pushed outward from the circuit centre at the straight's midpoint
    const im = Math.round((i0 + Math.min(i1, M - 1)) / 2);
    const vx = X[im] - cx0, vy = Y[im] - cy0, vn = Math.hypot(vx, vy) || 1;
    const lx = X[im] + vx / vn * sw * 7, ly = Y[im] + vy / vn * sw * 7;
    const b = best[si];
    const t1 = svgEl("text", { x: lx, y: ly - sw * 0.9, "text-anchor": "middle", "font-size": sw * 1.7, "font-weight": 800, fill: hot ? "var(--accent)" : "var(--ink)" }, svg);
    t1.textContent = s.name || "S" + (si + 1);
    const t2 = svgEl("text", { x: lx, y: ly + sw * 1.2, "text-anchor": "middle", "font-size": sw * 1.35, fill: "var(--ink2)", class: "num" }, svg);
    t2.textContent = b ? `${b.v} km/h · ${b.abbr}` : "";
  });
  cardEl.insertAdjacentHTML("beforeend", `<p class="note">Highlighted stretches are the detected straights; arrowheads mark the braking points. Labels show the session's top speed there and who set it — <span style="color:var(--accent)">red</span> is the fastest straight.</p>`);
}

/* best minimum speed per corner per driver — downforce & balance in numbers */
function cornerSpeeds(root, s, map, drivers) {
  if (!map || !map.corners.length) return;
  const N = 280, win = 90; // metres searched around the apex
  const rows = [];
  for (const d of drivers) {
    const tels = s.laps.filter(l => l.drv === d.abbr && !l.del && s.tel[l.drv + "-" + l.lap])
      .sort((a, b) => a.t - b.t).slice(0, 8).map(l => s.tel[l.drv + "-" + l.lap]);
    if (!tels.length) continue;
    const mins = map.corners.map(c => {
      const j0 = Math.max(0, Math.floor((c.d - win) / map.len * (N - 1)));
      const j1 = Math.min(N - 1, Math.ceil((c.d + win) / map.len * (N - 1)));
      let best = 0;
      for (const tel of tels) {
        let m = 1e9;
        for (let j = j0; j <= j1 && j < tel.v.length; j++) m = Math.min(m, tel.v[j]);
        if (m < 1e9) best = Math.max(best, m);
      }
      return best || null;
    });
    rows.push({ d, mins });
  }
  if (rows.length < 2) return;
  const colBest = map.corners.map((_, i) => Math.max(...rows.map(r => r.mins[i] || 0)));
  // corner classes from the session-best minimum
  const cls = colBest.map(v => v < 150 ? 0 : v < 230 ? 1 : 2);
  const clsName = ["Slow", "Med", "Fast"];
  for (const r of rows) {
    r.avg = [0, 1, 2].map(k => {
      const vals = r.mins.filter((v, i) => v != null && cls[i] === k);
      return vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
    });
  }
  rows.sort((a, b) => (b.avg[2] ?? 0) - (a.avg[2] ?? 0));
  const avgBest = [0, 1, 2].map(k => Math.max(...rows.map(r => r.avg[k] ?? 0)));

  const c = card(root, "Corner minimum speeds", "best apex speed per corner across each driver's 8 fastest laps · Slow < 150 · Med < 230 · Fast ≥ 230 km/h at the session-best apex");
  const w = document.createElement("div"); w.className = "tblwrap"; c.appendChild(w);
  w.innerHTML = `<table class="t"><thead><tr><th>Driver</th>` +
    [0, 1, 2].map(k => `<th class="r" style="border-right:${k === 2 ? "2px solid var(--line2)" : "none"}">${clsName[k]} avg</th>`).join("") +
    map.corners.map(cn => `<th class="r">T${cn.n}${cn.l || ""}</th>`).join("") +
    `</tr></thead><tbody>` +
    rows.map(r => `<tr><td>${drvCell(r.d)}</td>` +
      [0, 1, 2].map(k => `<td class="r num" style="font-weight:700;border-right:${k === 2 ? "2px solid var(--line2)" : "none"};${r.avg[k] != null && Math.round(r.avg[k]) >= Math.round(avgBest[k]) ? "color:var(--purple)" : ""}">${r.avg[k] != null ? Math.round(r.avg[k]) : "—"}</td>`).join("") +
      r.mins.map((v, i) => `<td class="r num ${v === colBest[i] ? "best" : ""}">${v ?? "—"}</td>`).join("") + `</tr>`).join("") +
    `</tbody></table>`;
  c.insertAdjacentHTML("beforeend", `<p class="note">Sorted by fast-corner average — the purest read on downforce${HUB.data.year >= 2026 ? " (Z-mode grip)" : ""}. Slow corners lean on mechanical grip and traction. Purple = best of the field. Apex windows are ±${win} m around each corner, so chicanes share readings.</p>`);
}

function viewStraights(root) {
  const s = HUB.session();
  if (telHolder(root, s, `downloading ${SNAMES[s.id] || s.id} telemetry for straight-line analysis…`)) return;
  const isRace = s.id === "R" || s.id === "S";
  const map = s.map;
  const refTel = map && s.tel[map.refLap];
  if (!refTel) { root.innerHTML = `<div class="empty">No telemetry in this session.</div>`; return; }
  const straights = detectStraights(refTel, map);
  if (!straights.length) { root.innerHTML = `<div class="empty">Could not identify straights here.</div>`; return; }
  const mainIdx = straights.indexOf(straights.reduce((a, b) => b.vmax > a.vmax ? b : a));
  const slMask = straightLineMask(map, refTel.v.length);

  const rows = [];
  for (const d of s.drivers) {
    const lapRecs = s.laps.filter(l => l.drv === d.abbr && s.tel[l.drv + "-" + l.lap] && !l.del);
    if (!lapRecs.length) continue;
    const tels = lapRecs.map(l => ({ l, tel: s.tel[l.drv + "-" + l.lap] }));
    const tops = straights.map(st => {
      let v = 0;
      for (const { tel } of tels)
        for (let j = st.from; j <= Math.min(st.iEnd, tel.v.length - 1); j++) if (tel.v[j] > v) v = tel.v[j];
      return Math.round(v);
    });
    // clipping: races -> per-straight average over clean laps;
    // quali/practice -> per-straight loss on the fastest lap
    let per, clipN;
    if (isRace) {
      const clean = tels.filter(x => isClean(x.l));
      const use = clean.length ? clean : tels;
      const sums = straights.map(() => 0), sl = straights.map(() => 0), ns = straights.map(() => 0);
      for (const x of use) {
        clipLossPer(x.tel, straights, slMask).forEach((v, i) => { if (v) { sums[i] += v.loss; sl[i] += v.slLoss; ns[i]++; } });
      }
      per = sums.map((v, i) => ns[i] ? { loss: v / ns[i], slLoss: sl[i] / ns[i] } : null);
      clipN = use.length;
    } else {
      const fastest = [...tels].sort((a, b) => a.l.t - b.l.t)[0];
      per = clipLossPer(fastest.tel, straights, slMask);
      clipN = 1;
    }
    const clip = per.reduce((a, v) => a + (v ? v.loss : 0), 0);
    const slClip = per.reduce((a, v) => a + (v ? v.slLoss : 0), 0);
    rows.push({ d, tops, per, clip, slClip, clipN });
  }
  if (!rows.length) { root.innerHTML = `<div class="empty">No usable laps.</div>`; return; }
  rows.sort((a, b) => b.tops[mainIdx] - a.tops[mainIdx]);
  const colBest = straights.map((_, i) => Math.max(...rows.map(r => r.tops[i])));
  const bestBy = straights.map((_, i) => {
    const r = rows.find(r => r.tops[i] === colBest[i]);
    return { v: colBest[i], abbr: r ? r.d.abbr : "" };
  });
  const clipMax = Math.max(...rows.map(r => r.clip), 1);

  const cm = card(root, "Where the straights are");
  straightsMap(cm, map, straights, bestBy);

  const c = card(root, "End-of-straight top speeds", `${SNAMES[s.id] || s.id} · session maximum per straight (best tow / engine mode across all laps)`);
  const w = document.createElement("div"); w.className = "tblwrap"; c.appendChild(w);
  w.innerHTML = `<table class="t"><thead><tr><th>Driver</th>` +
    straights.map((st, i) => `<th class="r" title="${Math.round(st.len)} m straight">${esc(st.name || "S" + (i + 1))}${i === mainIdx ? " ★" : ""}</th>`).join("") +
    `</tr></thead><tbody>` +
    rows.map(r => `<tr><td>${drvCell(r.d)}</td>` +
      r.tops.map((v, i) => `<td class="r num ${v === colBest[i] ? "best" : ""}">${v}</td>`).join("") + `</tr>`).join("") +
    `</tbody></table>`;
  c.insertAdjacentHTML("beforeend", `<p class="note"><b>★</b> = fastest straight (rows sorted by it) · speeds in km/h · top speeds mix engine modes, tows and wing levels, so treat single-lap outliers with care.</p>`);

  /* ---- clipping ranking: per straight + overall ---- */
  const crows = [...rows].sort((a, b) => b.clip - a.clip);
  const cellMax = Math.max(...rows.flatMap(r => r.per.map(v => v ? v.loss : 0)), 1);
  const c2 = card(root, "Clipping ranking",
    `km/h given back while flat on the throttle, per straight · ${isRace ? "average per clean race lap" : "on each driver's fastest lap"} · ‡ = superclipping signature`);
  const w2 = document.createElement("div"); w2.className = "tblwrap"; c2.appendChild(w2);
  const heat = v => v == null ? "" : `background:rgba(250,204,21,${Math.min(0.5, v.loss / cellMax * 0.5).toFixed(2)});`;
  const cellTxt = v => {
    if (v == null) return "—";
    if (v.loss < 1.5) return "0";
    const sup = v.slLoss >= 12;
    return `−${v.loss.toFixed(1)}${sup ? '<span title="speed falling on dead-straight track at full throttle — harvesting against the engine (superclipping) likely" style="color:var(--red);font-weight:800">‡</span>' : ""}`;
  };
  w2.innerHTML = `<table class="t"><thead><tr><th class="r">#</th><th>Driver</th>` +
    straights.map((st, i) => `<th class="r">${esc(st.name || "S" + (i + 1))}${i === mainIdx ? " ★" : ""}</th>`).join("") +
    `<th class="r">Total /lap</th><th class="r">on straights</th>${isRace ? '<th class="r">Laps</th>' : ""}</tr></thead><tbody>` +
    crows.map((r, i) => `<tr><td class="r num">${i + 1}</td><td>${drvCell(r.d)}</td>` +
      r.per.map(v => `<td class="r num" style="${heat(v)}">${cellTxt(v)}</td>`).join("") +
      `<td class="r num" style="font-weight:700${i === 0 ? ";color:var(--yellow)" : ""}">−${r.clip.toFixed(1)}</td>
       <td class="r num" style="color:var(--ink2)">−${r.slClip.toFixed(1)}</td>${isRace ? `<td class="r num" style="color:var(--ink3)">${r.clipN}</td>` : ""}</tr>`).join("") +
    `</tbody></table>`;
  c2.insertAdjacentHTML("beforeend", `<p class="note">Ranked worst-first. <b>Total /lap</b> sums every km/h lost at full throttle before the braking points; <b>on straights</b> counts only the part lost on dead-straight track (curve radius &gt; ~600 m), where cornering scrub can't be the explanation — that portion is pure deployment clipping, and <span style="color:var(--red);font-weight:800">‡</span> marks zones where it exceeds 12 km/h: the signature of the MGU-K harvesting against the engine (superclipping). Loss through flat-out esses (e.g. Maggotts–Becketts) mixes clipping with cornering scrub, so compare cars on the same column rather than across circuits. Lifts don't count — that's lift-and-coast, not clipping.</p>`);

  if (HUB.data.year >= 2026) c2.insertAdjacentHTML("beforeend",
    `<p class="note">2026 note: electrical deployment tapers off above ~290 km/h by regulation, so some loss at very high speed is the rulebook, not a weakness — the gaps between cars are still real.</p>`);

  /* ---- corner minimum speeds: the other half of the car-performance story ---- */
  cornerSpeeds(root, s, map, rows.map(r => r.d));

  const most = [...rows].sort((a, b) => b.clip - a.clip)[0];
  const none = rows.filter(r => r.clip < 3).length;
  insights(root, [
    `Overall fastest: <b>${rows[0].d.abbr}</b> ${rows[0].tops[mainIdx]} km/h on the ${esc(straights[mainIdx].name || "main straight")}`,
    most && most.clip > 8 ? `Clipping the most: <b>${most.d.abbr}</b> — giving back ~${most.clip.toFixed(0)} km/h per lap before the braking zones (deployment running dry)` : "",
    none ? `${none} car${none > 1 ? "s" : ""} showing essentially no clipping` : "",
  ].filter(Boolean));
  root.insertBefore(root.lastChild, root.firstChild);
}

/* ============ view F: race replay ============ */
/* Every race lap carries a cumulative-time channel on a distance grid, so a
   car's track position at any session time is reconstructable from data —
   no simulation, just interpolation of what actually happened. */
"use strict";

function replayCard(root, s) {
  if (!(s.id === "R" || s.id === "S") || !s.map) return;
  if (!s.tel) {
    const c = card(root, "Race replay");
    c.insertAdjacentHTML("beforeend", `<div class="empty"><div class="bar" style="margin:0 auto 14px"><i></i></div>replay appears once the telemetry finishes downloading…</div>`);
    ensureTel(s.id);
    return;
  }
  if (!Object.keys(s.tel).length) return;
  const map = s.map, N = 280, M = map.x.length;

  // per-driver lap index
  const cars = [];
  for (const d of s.drivers) {
    const laps = s.laps.filter(l => l.drv === d.abbr && l.st != null && l.t != null).sort((a, b) => a.lap - b.lap);
    if (!laps.length) continue;
    cars.push({ d, laps, lastEnd: laps.at(-1).st + laps.at(-1).t, finPos: d.pos ?? 99 });
  }
  if (cars.length < 2) return;
  const t0 = Math.min(...cars.map(c => c.laps[0].st));
  const t1 = Math.max(...cars.map(c => c.lastEnd));

  const c = card(root, "Race replay", "reconstructed from each lap's telemetry — press play");
  const wrap = document.createElement("div"); wrap.className = "rp-wrap"; c.appendChild(wrap);
  const left = document.createElement("div"); wrap.appendChild(left);
  const right = document.createElement("div"); right.className = "rp-board"; wrap.appendChild(right);

  // controls
  const ctr = document.createElement("div"); ctr.className = "rp-controls";
  ctr.innerHTML = `
    <button class="btn pri" id="rpPlay">▶ Play</button>
    <select id="rpSpeed"><option>2</option><option>5</option><option selected>15</option><option>30</option><option>60</option><option>120</option></select><span class="hint">× speed</span>
    <span class="rp-lap num" id="rpLap"></span><span class="rp-flag" id="rpFlag"></span>
    <input type="range" id="rpScrub" min="0" max="${Math.ceil((t1 - t0) / 1000)}" value="0">`;
  left.appendChild(ctr);

  // map svg
  const rot = (map.rot || 0) * Math.PI / 180, cos = Math.cos(rot), sin = Math.sin(rot);
  const X = map.x.map((x, i) => x * cos - map.y[i] * sin);
  const Y = map.y.map((y, i) => -(map.x[i] * sin + y * cos));
  const pad = 700;
  const x0 = Math.min(...X) - pad, x1 = Math.max(...X) + pad, y0 = Math.min(...Y) - pad, y1 = Math.max(...Y) + pad;
  const div = document.createElement("div"); div.className = "chart"; left.appendChild(div);
  const svg = svgEl("svg", { viewBox: `${x0.toFixed(0)} ${y0.toFixed(0)} ${(x1 - x0).toFixed(0)} ${(y1 - y0).toFixed(0)}`, role: "img", "aria-label": "Race replay" }, div);
  svg.style.maxHeight = "480px";
  const sw = (x1 - x0) / 95;
  svgEl("path", { d: X.map((x, i) => (i ? "L" : "M") + x.toFixed(0) + "," + Y[i].toFixed(0)).join("") + "Z", fill: "none", stroke: "var(--surface3)", "stroke-width": sw * 1.6, "stroke-linejoin": "round", "stroke-linecap": "round" }, svg);
  svgEl("circle", { cx: X[0], cy: Y[0], r: sw * 0.55, fill: "var(--ink3)" }, svg);
  for (const cn of map.corners)
    svgEl("text", { x: X[Math.round(cn.d / map.len * (M - 1)) % M], y: Y[Math.round(cn.d / map.len * (M - 1)) % M] - sw, "text-anchor": "middle", "font-size": sw * 0.95, fill: "var(--ink3)", class: "num" }, svg).textContent = cn.n;
  const dots = new Map();
  for (const car of cars) {
    const g = svgEl("g", {}, svg);
    const dot = svgEl("circle", { r: sw * 0.85, fill: teamCol(car.d.color), stroke: "#fff", "stroke-width": sw * 0.22 }, g);
    dots.set(car.d.abbr, { g, dot });
  }

  /* position of a car at session time T. Progress = laps completed + lap
     fraction, and it FREEZES at the car's last real datapoint — a retired car
     keeps the progress it had and sinks down the order as others pass it. */
  function locate(car, T) {
    if (T >= car.lastEnd) return { done: true, prog: car.laps.at(-1).lap, end: car.lastEnd };
    let lapRec = null, idx = 0;
    for (let i = car.laps.length - 1; i >= 0; i--) {
      if (car.laps[i].st <= T) { lapRec = car.laps[i]; idx = i; break; }
    }
    if (!lapRec) return { pre: true, prog: -((car.d.grid || 30) / 1000), r: 0 };
    const tel = s.tel[car.d.abbr + "-" + lapRec.lap];
    const dtc = Math.max(0, Math.min(T - lapRec.st, lapRec.t));
    let r;
    if (tel) {
      // binary search cumulative time channel
      let lo = 0, hi = N - 1;
      while (hi - lo > 1) { const m = (lo + hi) >> 1; (tel.t[m] <= dtc) ? lo = m : hi = m; }
      const span = tel.t[hi] - tel.t[lo] || 1;
      r = (lo + (dtc - tel.t[lo]) / span) / (N - 1);
    } else r = dtc / (lapRec.t || 1);
    return { r: Math.max(0, Math.min(1, r)), lapRec, prog: lapRec.lap - 1 + r, inPit: lapRec.in || lapRec.out };
  }

  const flagEl = ctr.querySelector("#rpFlag"), lapEl = ctr.querySelector("#rpLap");
  const scrub = ctr.querySelector("#rpScrub"), playBtn = ctr.querySelector("#rpPlay"), spdSel = ctr.querySelector("#rpSpeed");
  const total = s.totalLaps || Math.max(...s.laps.map(l => l.lap));
  let T = t0, playing = false, lastFrame = 0, lastBoard = 0;

  function draw(now) {
    if (!svg.isConnected) { playing = false; return; }   // view left — stop the loop
    if (playing) {
      const dt = lastFrame ? Math.min(now - lastFrame, 200) : 0;
      T = Math.min(T + dt * (+spdSel.value), t1);
      if (T >= t1) { playing = false; playBtn.textContent = "▶ Play"; }
    }
    lastFrame = now;
    const states = cars.map(car => ({ car, st: locate(car, T) }));
    for (const { car, st } of states) {
      const el = dots.get(car.d.abbr);
      if (st.done) { el.g.setAttribute("opacity", 0); continue; }
      const f = (st.r || 0) * (M - 1), i = Math.min(M - 2, Math.floor(f)), k = f - i;
      // pre-start cars wait on the line at half opacity
      el.g.setAttribute("opacity", st.pre ? 0.45 : st.inPit ? 0.35 : 1);
      el.dot.setAttribute("cx", X[i] + (X[i + 1] - X[i]) * k);
      el.dot.setAttribute("cy", Y[i] + (Y[i + 1] - Y[i]) * k);
      el.dot.setAttribute("stroke", st.lapRec && st.lapRec.cmp ? cmpCol(st.lapRec.cmp) : "#fff");
    }
    // leaderboard + lap/flag, throttled
    if (now - lastBoard > 350) {
      lastBoard = now;
      // order: progress, then who reached their final progress first (that IS
      // the finishing order for cars that end on the same lap), then grid
      const sorted = [...states].sort((a, b) => (b.st.prog - a.st.prog)
        || ((a.st.end ?? 9e15) - (b.st.end ?? 9e15))
        || ((a.car.d.grid ?? 99) - (b.car.d.grid ?? 99)));
      const leader = sorted.find(x => !x.st.done && !x.st.pre);
      // until the field is properly away, show the grid — lap-1 start times in
      // the source data are staggered and would invent fake gaps
      const gridPhase = !leader || leader.st.prog < 0.03;
      const board = gridPhase
        ? [...states].sort((a, b) => (a.car.d.grid ?? 99) - (b.car.d.grid ?? 99))
        : sorted;
      const leadLap = leader ? Math.min(total, Math.floor(Math.max(0, leader.st.prog)) + 1) : total;
      lapEl.textContent = `Lap ${leadLap}/${total}`;
      scrub.value = Math.round((T - t0) / 1000);
      // flag from any lap record at the leader's lap
      let w = 0;
      for (const l of s.laps) if (l.lap === leadLap) { const f = tsFlags(l.ts); w = Math.max(w, f.red ? 3 : f.sc ? 2 : f.vsc ? 1 : 0); }
      flagEl.className = "rp-flag" + (w >= 3 ? " red" : w >= 1 ? " sc" : "");
      flagEl.textContent = w >= 3 ? "RED FLAG" : w === 2 ? "SAFETY CAR" : w === 1 ? "VIRTUAL SC" : "";
      const leaderLapTime = leader && leader.st.lapRec ? leader.st.lapRec.t : 95000;
      right.innerHTML = `<table>` + board.map((x, i) => {
        const gapP = i === 0 ? null : Math.max(0, board[0].st.prog - x.st.prog);
        const lappedBy = Math.floor(gapP ?? 0);
        const gapTxt = x.st.done ? (x.car.d.status && !/Finished|\+/.test(x.car.d.status) ? "OUT" : "FIN")
          : gridPhase ? (x.car.d.grid ? `P${x.car.d.grid} grid` : "pit lane")
            : i === 0 ? "Leader"
              : lappedBy >= 1 ? `+${lappedBy}L`
                : `+${(gapP * leaderLapTime / 1000).toFixed(1)}`;
        const cmp = x.st.lapRec && x.st.lapRec.cmp;
        return `<tr class="${x.st.done && gapTxt === "OUT" ? "out" : ""}"><td class="num" style="color:var(--ink3)">${i + 1}</td>
          <td><span class="drv-cell" style="gap:5px"><span class="dot" style="background:${teamCol(x.car.d.color)}"></span>${x.car.d.abbr}</span></td>
          <td>${cmp ? `<span class="rp-tyre" style="border-color:${cmpCol(cmp)}"></span>` : ""}</td>
          <td class="r num">${gapTxt}</td></tr>`;
      }).join("") + `</table><p class="hint" style="margin:6px 0 0">tyre ring = compound · dim = in pits · gaps from track position</p>`;
    }
    requestAnimationFrame(draw);
  }
  playBtn.addEventListener("click", () => {
    playing = !playing;
    playBtn.textContent = playing ? "⏸ Pause" : "▶ Play";
    if (playing && T >= t1) T = t0;
  });
  scrub.addEventListener("input", () => { T = t0 + (+scrub.value) * 1000; });
  requestAnimationFrame(draw);
}

/* ============ views G: Team DNA (season profiles + circuit fit) ============ */
"use strict";

/* Season-level team profiles precomputed by tools/build_profiles.py from every
   archived weekend: measured corner-class speed deficits, straight-line deficit,
   pace gaps, temperature correlation, and a kinematic circuit-fit model whose
   predicted order is checked against real qualifying order (Spearman rho). */

async function loadProfiles() {
  if (HUB._profiles) return HUB._profiles;
  HUB._profiles = await fetchSession("data/profiles.json.gz");
  return HUB._profiles;
}

const TEAM_ABBR = {
  "Red Bull Racing": "RBR", "Racing Bulls": "RB", "AlphaTauri": "AT", "Toro Rosso": "STR",
  "Aston Martin": "AMR", "Racing Point": "RP", "Force India": "FI", "Alfa Romeo": "ALF",
  "Alfa Romeo Racing": "ALF", "Haas F1 Team": "HAA", "McLaren": "MCL", "Ferrari": "FER",
  "Mercedes": "MER", "Williams": "WIL", "Alpine": "ALP", "Renault": "REN", "Sauber": "SAU",
  "Kick Sauber": "SAU", "Audi": "AUD", "Cadillac": "CAD", "Racing Point BWT": "RP",
};
const tAbbr = t => TEAM_ABBR[t] || t.slice(0, 3).toUpperCase();

function showTeams(year) {
  const root = document.getElementById("app");
  root.innerHTML = `<div id="loading"><div style="font-size:15px;font-weight:700;letter-spacing:.12em;text-transform:uppercase">Car <span style="color:var(--accent)">rankings</span></div><div class="bar"><i></i></div><div style="font-size:12px">loading…</div></div>`;
  loadProfiles().then(P => renderTeams(P, year)).catch(err => {
    showError("Team profiles not available yet: " + err.message);
  });
}

function renderTeams(P, year) {
  const years = Object.keys(P.seasons).sort();
  const y = P.seasons[year] ? String(year) : years.at(-1);
  const S = P.seasons[y];
  const root = document.getElementById("app");
  HUB.viewing = "teams/" + y;
  try {
    const target = `#teams/${y}`;
    if (location.hash !== target) {
      if (location.hash.startsWith("#teams")) history.replaceState(null, "", target);
      else history.pushState(null, "", target);
    }
    document.title = `Car rankings ${y} — Minisector`;
  } catch (e) { }

  root.innerHTML = `
  <header class="top"><div class="top-inner">
    <div class="title-row">
      <span class="picker">
        <button id="homeBtn" class="btn" title="All weekends" aria-label="All weekends">≡</button>
        <select id="dnaYear" aria-label="Season">${years.map(yy => `<option ${yy === y ? "selected" : ""}>${yy}</option>`).join("")}</select>
        <span class="gp" style="font-size:16px">Car rankings — ${esc(y)} only</span>
      </span>
      <span class="meta">one season at a time: cars change every year, so no performance data crosses seasons · updates automatically as new weekends land</span>
      <span class="brand">Mini<b>sector</b> · F1 analysis</span>
      <span id="themeSlot"></span>
    </div>
  </div></header>
  <main id="view"></main>
  <footer>All inputs measured (corner minimum speeds, speed traps, dry quali/race gaps); predictions = kinematics + one calibration constant, accuracy checked above. Unofficial, not associated with Formula 1.</footer>`;

  document.getElementById("homeBtn").addEventListener("click", showPicker);
  document.getElementById("dnaYear").addEventListener("change", e => renderTeams(P, e.target.value));
  const slot = document.getElementById("themeSlot");
  if (slot && MODE === "site") slot.appendChild(themeToggleBtn());

  const main = document.getElementById("view");
  const teams = Object.entries(S.teams).filter(([, t]) => t.quali != null)
    .sort((a, b) => a[1].quali - b[1].quali);
  if (!teams.length) { main.innerHTML = `<div class="empty">Not enough dry weekends in ${y} yet.</div>`; return; }
  // gaps are DISPLAYED relative to the leading team (the intuitive reading:
  // the fastest car shows "fastest", everyone else their gap to it). Raw
  // values are medians vs each weekend's best — rebasing shifts all teams
  // equally, so no ordering or margin between teams changes.
  const avgPoleS = (S.avgPole || 90000) / 1000;   // season average pole lap
  const minQuali = Math.min(...teams.map(([, t]) => t.quali));
  const minRace = Math.min(...teams.map(([, t]) => t.race).filter(v => v != null));
  const relQ = t => t.quali - minQuali;
  const relR = t => t.race != null ? t.race - minRace : null;
  const qSec = t => relQ(t) / 100 * avgPoleS;
  const fmtQ = t => relQ(t) < 1e-9 ? "fastest" : "+" + (qSec(t) < 0.05 ? qSec(t).toFixed(3) : qSec(t).toFixed(2)) + "s";
  const fmtR = t => relR(t) == null ? null : relR(t) < 1e-9 ? "fastest" : "+" + (relR(t) < 0.05 ? relR(t).toFixed(3) : relR(t).toFixed(2)) + " s/lap";

  // per team, per element: time lost per lap to the best car, scaled to the
  // season's average circuit (zone-time deficits x corner counts + flat-out
  // pace deficit x flat-out km). Rebased so the best team in each area = 0.
  const AC = S.avgCirc || { counts: { slow: 6, med: 5, fast: 4 }, flatKm: 3 };
  const ELEMS = ["slow", "med", "fast", "sl", "deg"];
  const lapLoss = {};
  for (const [tm, t] of teams) {
    const L = {};
    for (const cls of ["slow", "med", "fast"])
      L[cls] = t.defT && t.defT[cls] != null ? t.defT[cls] * AC.counts[cls] / 1000 : null;
    L.sl = t.slp != null ? t.slp * AC.flatKm / 1000 : null;
    L.deg = t.deg != null ? t.deg / 1000 : null;   // s/lap of extra tyre wear
    lapLoss[tm] = L;
  }
  const minEl = {}, maxEl = {}, rankEl = {};
  let worstRel = 0.4;
  for (const e of ELEMS) {
    const vals = teams.map(([tm]) => lapLoss[tm][e]).filter(v => v != null);
    minEl[e] = vals.length ? Math.min(...vals) : 0;
    maxEl[e] = vals.length ? Math.max(...vals) : 1;
    rankEl[e] = new Map(teams.filter(([tm]) => lapLoss[tm][e] != null)
      .sort((a, b) => lapLoss[a[0]][e] - lapLoss[b[0]][e]).map(([tm], i) => [tm, i + 1]));
    if (e !== "deg") worstRel = Math.max(worstRel, maxEl[e] - minEl[e]);
  }


  /* season pace ranking: who has the fastest car right now */
  {
    const doneN = S.rounds.filter(r => r.circuit).length;
    const cr = card(main, `${y} season pace ranking`,
      `gaps to the fastest car · ${doneN} dry weekend${doneN > 1 ? "s" : ""}, this season only`);
    const wr = document.createElement("div"); wr.className = "tblwrap"; cr.appendChild(wr);
    wr.innerHTML = `<table class="t"><thead><tr><th class="r">#</th><th>Team</th><th class="r" title="median dry qualifying gap, on the season\u2019s average pole lap">Quali gap (s)</th><th class="r">Race pace (s/lap)</th><th class="r" title="extra degradation vs the kindest car · clean race stints, same compound, fuel-corrected">Tyre deg</th><th class="r">Weekends</th></tr></thead><tbody>` +
      teams.map(([tm, t], i) => `<tr><td class="r num">${i + 1}</td>
        <td><span class="drv-cell"><span class="dot" style="background:${teamCol(S.colors[tm] || "#888")}"></span>${esc(tm)}</span></td>
        <td class="r num ${relQ(t) < 1e-9 ? "best" : ""}" style="background:${heatBg(qSec(t), Math.max(...teams.map(([, x]) => qSec(x))))}">${fmtQ(t)}</td>
        <td class="r num ${relR(t) != null && relR(t) < 1e-9 ? "best" : ""}" style="background:${relR(t) == null ? "none" : heatBg(relR(t), Math.max(...teams.map(([, x]) => relR(x) ?? 0)))}">${fmtR(t) ?? "—"}</td>
        <td class="r num" style="background:${t.deg == null ? "none" : heatBg(t.deg / 1000 - minEl.deg, Math.max(maxEl.deg - minEl.deg, 0.001))}">${t.deg == null ? "\u2014" : (t.deg / 1000 - minEl.deg) < 1e-9 ? "kindest" : "+" + (t.deg - minEl.deg * 1000).toFixed(0) + " ms/lap"}</td>
        <td class="r num">${t.n}</td></tr>`).join("") + "</tbody></table>";
  }

  /* pace evolution: gap to each weekend's pole, round by round — upgrades
     (or a car falling behind the development race) show up as the trend */
  {
    const dryRounds = S.rounds.filter(r => !r.wetQ && r.quali && Object.keys(r.quali).length >= 6);
    if (dryRounds.length >= 3) {
      const ce = card(main, "Pace evolution — gap to pole (s), round by round",
        "dry rounds only · trending down = gaining pace (upgrades working)");
      const div = document.createElement("div"); div.className = "chart"; ce.appendChild(div);
      const allV = dryRounds.flatMap(r => teams.map(([tm]) => r.quali[tm] != null ? r.quali[tm] / 100 * ((r.poleMs || S.avgPole || 90000) / 1000) : null).filter(v => v != null));
      const rMin = Math.min(...dryRounds.map(r => r.round)), rMax = Math.max(...dryRounds.map(r => r.round));
      const mob = innerWidth < 700;
      const ch = Chart(div, {
        h: mob ? 300 : 380, mr: 52, xd: [rMin - 0.4, rMax + 0.4], yd: [-0.08, Math.min(Math.max(...allV) + 0.25, quantile(allV, 0.97) + 0.7)],
        yflip: true, xticksArr: dryRounds.map(r => r.round), xfmt: v => "R" + v,
        yfmt: v => "+" + v.toFixed(1) + "s", xlab: "round", ylab: "gap to pole (s)", label: "Pace evolution",
      });
      const endL = [];
      const nodes = [], nData = [];
      for (const [tm] of teams) {
        const col = teamCol(S.colors[tm] || "#888");
        const pts = dryRounds.map(r => r.quali[tm] != null ? [r.round, r.quali[tm] / 100 * ((r.poleMs || S.avgPole || 90000) / 1000)] : null);
        svgEl("path", { d: linePath(pts, ch.x, ch.y), fill: "none", stroke: col, "stroke-width": 1.7, opacity: .85 }, ch.plot);
        for (const p of pts) {
          if (!p) continue;
          const n = svgEl("circle", { cx: ch.x(p[0]), cy: ch.y(p[1]), r: 6, fill: "transparent" }, ch.plot);
          svgEl("circle", { cx: ch.x(p[0]), cy: ch.y(p[1]), r: 2.6, fill: col, "pointer-events": "none" }, ch.plot);
          nodes.push(n); nData.push({ tm, p, col });
        }
        const last = [...pts].reverse().find(Boolean);
        if (last) endL.push({ y: ch.y(last[1]) + 3.5, txt: tAbbr(tm), col });
      }
      spreadLabels(endL, 11, ch.mt + 4, ch.mt + ch.ih);
      for (const L2 of endL)
        svgEl("text", { x: ch.ml + ch.iw + 5, y: L2.y, "font-size": 10, "font-weight": 700, fill: L2.col, class: "num" }, ch.svg).textContent = L2.txt;
      hoverMarks(nodes, i => {
        const { tm, p } = nData[i];
        const rnd = dryRounds.find(r => r.round === p[0]);
        return `<div class="t-title">${esc(tm)} — R${p[0]} ${esc(rnd ? rnd.event : "")}</div>gap to pole: <b class="num">${p[1] < 0.005 ? "fastest" : "+" + p[1].toFixed(2) + "s"}</b>`;
      });
    }
  }

  /* relative calibrated fits: per circuit, gap to the best team's score */
  const k = S.calib || 1;
  const slugsDone = S.rounds.filter(r => r.circuit).map(r => ({ slug: r.slug, event: r.event, round: r.round, done: true }));
  const slugsUp = (S.upcoming || []).filter(u => !u.noData).map(u => ({ slug: u.slug, event: u.event, from: u.from, alt: u.alt, done: false }));
  const circuits = [...slugsDone.sort((a, b) => a.round - b.round), ...slugsUp];
  const rel = {};   // team -> slug -> calibrated gap-to-best (s)
  for (const c of circuits) {
    const vals = teams.map(([tm]) => S.fits[tm]?.[c.slug]).filter(v => v != null);
    if (!vals.length) continue;
    const base = Math.min(...vals);
    for (const [tm] of teams) {
      const f = S.fits[tm]?.[c.slug];
      if (f != null) (rel[tm] = rel[tm] || {})[c.slug] = (f - base) * k;
    }
  }

  /* team cards */
  main.insertAdjacentHTML("beforeend", `<p class="note" style="margin:14px 2px 8px">full bar = best car in that area, shorter = slower · number = time lost per lap to that best car, on an average ${esc(y)} circuit (${AC.counts.slow}/${AC.counts.med}/${AC.counts.fast} slow/med/fast corners + ${AC.flatKm} km flat-out) · ★ = benchmark · ◦ = predicted from the track’s last visit · tyre life = same-compound race-stint degradation · hover any bar for raw numbers</p>`);
  const grid = document.createElement("div"); grid.className = "dna-grid"; main.appendChild(grid);
  const evName = slug => (circuits.find(c => c.slug === slug) || {}).event || slug;

  for (const [tm, t] of teams) {
    const col = teamCol(S.colors[tm] || "#888");
    const el = document.createElement("div"); el.className = "card dna-card"; grid.appendChild(el);
    const rows = [["Slow corners", "slow"], ["Medium corners", "med"], ["Fast corners", "fast"], ["Straights", "sl"], ["Tyre life", "deg"]].map(([lab, e]) => {
      const v = lapLoss[tm][e];
      const rel2 = v != null ? v - minEl[e] : null;
      const rk = rankEl[e].get(tm);
      const tip = e === "deg"
        ? `extra tyre degradation vs the kindest car: +${t.deg ?? "?"} ms/lap (clean race stints, same-compound comparison, fuel-corrected) ≈ +${t.deg != null ? (t.deg * 20 / 1000).toFixed(1) : "?"}s over a 20-lap stint · ${t.degN ?? "?"} races`
        : e === "sl"
        ? `flat-out pace: +${t.slp ?? "?"} ms per km vs the best car`
        : `${t.defT && t.defT[e] != null ? "+" + t.defT[e] + " ms per corner (zone time)" : ""}${t.def && t.def[e] != null ? " · apex speed −" + t.def[e] + " km/h vs per-corner best" : ""}`;
      const span = e === "deg" ? Math.max(maxEl.deg - minEl.deg, 0.01) : worstRel;
      return { lab, e, rel2, w: rel2 != null ? Math.max(5, 100 * (1 - rel2 / span)) : 0, rk, best: rk === 1, tip };
    });
    const myRel = rel[tm] || {};
    const own = median(Object.values(myRel)) ?? 0;
    const ranked = Object.entries(myRel).map(([slug, v]) => [slug, v - own]).sort((a, b) => a[1] - b[1]);
    const best3 = ranked.slice(0, 3), worst3 = ranked.slice(-3).reverse();
    const up = new Set(slugsUp.map(u => u.slug));
    const fmtC = ([slug, v]) => `${esc(evName(slug)).replace(" Grand Prix", "")}${up.has(slug) ? " ◦" : ""} <span class="num" style="color:var(--ink3)">${v >= 0 ? "+" : "−"}${Math.abs(v).toFixed(2)}</span>`;

    let altNote = "";
    if (t.alt && Math.abs(t.alt.r) >= 0.45) {
      const worse = t.alt.slopeKm > 0;
      const secKm = Math.abs(t.alt.slopeKm) / 100 * avgPoleS;
      altNote = `<p class="dna-temp" title="quali gap ${worse ? "grows" : "shrinks"} ${secKm.toFixed(2)}s per 1000 m of track altitude \u2014 correlation over ${t.alt.n} rounds, suggestive not proof">\u26f0 ${worse ? "weaker" : "stronger"} at high-altitude tracks (r = ${t.alt.r})</p>`;
    }
    let tempNote = "";
    if (t.temp && Math.abs(t.temp.r) >= 0.45) {
      const hot = t.temp.slope10 < 0;
      tempNote = `<p class="dna-temp" title="race-pace gap ${hot ? "shrinks" : "grows"} ${Math.abs(t.temp.slope10).toFixed(2)}s per +10 °C track temp over ${t.temp.n} races — suggestive, not proof">${hot ? "🌡 stronger in hot races" : "❄ stronger in cool races"} (r = ${t.temp.r})</p>`;
    }

    el.innerHTML = `
      <div class="dna-head"><span class="dot" style="background:${col};width:12px;height:12px"></span><b>${esc(tm)}</b>
        <span class="dna-gaps num">Quali ${fmtQ(t)}${fmtR(t) != null ? ` · Race ${fmtR(t)}` : ""}</span></div>
      <div class="dna-bars">${rows.map(r => `
        <div class="dna-row" title="${r.tip}"><span class="dna-lab">${r.lab}${r.rk ? ` <b class="num" style="color:${r.rk === 1 ? "var(--green)" : "var(--ink3)"}">P${r.rk}</b>` : ""}</span>
          <span class="dna-track"><i style="width:${r.w.toFixed(1)}%;background:${col}"></i></span>
          <span class="num dna-val" ${r.best ? 'style="color:var(--green);font-weight:700"' : ""}>${r.rel2 == null ? "—" : r.rk === 1 ? (r.e === "deg" ? "kindest ★" : "best ★") : r.e === "deg" ? "+" + (r.rel2 * 1000).toFixed(0) + " ms/lap" : "+" + (r.rel2 < 0.05 ? r.rel2.toFixed(3) : r.rel2.toFixed(2)) + "s"}</span></div>`).join("")}
      </div>
      ${ranked.length ? `<div class="dna-fit" title="±s vs this car's own average circuit — layout sensitivity, not a cross-team ranking"><span><b>Best layouts:</b> ${best3.map(fmtC).join(" · ")}</span>
      <span><b>Worst layouts:</b> ${worst3.map(fmtC).join(" · ")}</span></div>` : ""}
      ${altNote}${tempNote}`;
  }

  /* circuit predictor: pick any track → full predicted order with margins */
  const ownMed0 = {};
  for (const [tm] of teams) ownMed0[tm] = median(Object.values(rel[tm] || {})) ?? 0;
  {
    const cp = card(main, "Circuit predictor",
      `pick a circuit → likely pecking order before the weekend${S.accMean != null ? ` · reliability ρ = ${S.accMean.toFixed(2)} (checked below)` : ""}`);
    const selEl = document.createElement("select");
    const opts = circuits.filter(c => teams.some(([tm]) => rel[tm]?.[c.slug] != null));
    const firstUp = opts.find(c => !c.done);
    if (!renderTeams._pick || !opts.some(c => c.slug === renderTeams._pick)) renderTeams._pick = (firstUp || opts.at(-1) || {}).slug;
    selEl.innerHTML = opts.map(c => `<option value="${esc(c.slug)}" ${c.slug === renderTeams._pick ? "selected" : ""}>${c.done ? "✓" : "◦"} ${esc(c.event)}${c.from ? ` ('${String(c.from).slice(2)} layout)` : ""}${c.alt >= 400 ? ` ⛰ ${c.alt} m` : ""}</option>`).join("");
    cp.querySelector(".right").appendChild(selEl);
    const holder = document.createElement("div"); cp.appendChild(holder);
    const drawPick = () => {
      holder.innerHTML = "";
      const slug = renderTeams._pick;
      const rows = teams.map(([tm, t]) => {
        const r = rel[tm]?.[slug];
        if (r == null) return null;
        const swing = r - ownMed0[tm];
        return { tm, q: t.quali / 100 * avgPoleS + swing, r: t.race != null ? t.race + swing : null, swing };
      }).filter(Boolean).sort((a, b) => a.q - b.q);
      if (!rows.length) { holder.innerHTML = `<div class="empty">No prediction possible here.</div>`; return; }
      const qBase = rows[0].q, rBase = Math.min(...rows.map(x => x.r).filter(v => v != null));
      const wrp = document.createElement("div"); wrp.className = "tblwrap"; holder.appendChild(wrp);
      wrp.innerHTML = `<table class="t"><thead><tr><th class="r">#</th><th>Team</th><th class="r">Predicted quali gap</th><th class="r">Predicted race pace</th><th class="r" title="how much this layout helps (green) or hurts (red) the car vs its own average circuit">Layout swing</th></tr></thead><tbody>` +
        rows.map((x, i) => `<tr><td class="r num">${i + 1}</td>
          <td><span class="drv-cell"><span class="dot" style="background:${teamCol(S.colors[x.tm] || "#888")}"></span>${esc(x.tm)}</span></td>
          <td class="r num ${i === 0 ? "best" : ""}" style="background:${heatBg(x.q - qBase, rows.at(-1).q - qBase)}">${i === 0 ? "fastest" : "+" + (x.q - qBase).toFixed(2) + "s"}</td>
          <td class="r num" style="background:${x.r == null ? "none" : heatBg(x.r - rBase, Math.max(...rows.map(z => (z.r ?? rBase) - rBase)))}">${x.r == null ? "—" : x.r === rBase ? "fastest" : "+" + (x.r - rBase).toFixed(2) + " s/lap"}</td>
          <td class="r num" style="color:${x.swing < -0.03 ? "var(--green)" : x.swing > 0.03 ? "var(--red)" : "var(--ink3)"}">${x.swing >= 0 ? "+" : "−"}${Math.abs(x.swing).toFixed(2)}s</td></tr>`).join("") + "</tbody></table>";
    };
    selEl.addEventListener("change", () => { renderTeams._pick = selEl.value; drawPick(); });
    drawPick();
  }

  /* prediction matrix: each car anchored to its measured season quali pace,
     the model contributes only circuit-to-circuit variation */
  const cm = card(main, "Circuit fit — every team at every circuit",
    `estimated gap (s) to the best car · ✓ raced in ${y} · ◦ predicted`);
  const w = document.createElement("div"); w.className = "tblwrap"; cm.appendChild(w);
  const ownMed = {};
  for (const [tm] of teams) ownMed[tm] = median(Object.values(rel[tm] || {})) ?? 0;
  const pred = (tm, slug) => {
    const r = rel[tm]?.[slug];
    if (r == null) return null;
    return S.teams[tm].quali / 100 * avgPoleS + (r - ownMed[tm]);
  };
  const cells = circuits.filter(c => teams.some(([tm]) => pred(tm, c.slug) != null));
  let vMax = 0.5;
  const relCell = {};
  for (const c of cells) {
    const vals = teams.map(([tm]) => pred(tm, c.slug)).filter(v => v != null);
    const base = Math.min(...vals);
    relCell[c.slug] = {};
    for (const [tm] of teams) {
      const v = pred(tm, c.slug);
      if (v != null) { relCell[c.slug][tm] = v - base; vMax = Math.max(vMax, v - base); }
    }
  }
  w.innerHTML = `<table class="t dna-mat"><thead><tr><th>Circuit</th>${teams.map(([tm]) =>
    `<th class="r"><span class="dot" style="background:${teamCol(S.colors[tm] || "#888")}"></span> ${tAbbr(tm)}</th>`).join("")}</tr></thead><tbody>` +
    cells.map(c => `<tr><td>${c.done ? "✓" : "◦"} ${esc(c.event.replace(" Grand Prix", " GP"))}${c.from ? ` <span class="hint">'${String(c.from).slice(2)}</span>` : ""}</td>` +
      teams.map(([tm]) => {
        const v = relCell[c.slug]?.[tm];
        if (v == null) return `<td class="r num">—</td>`;
        return `<td class="r num" style="background:${heatBg(v, vMax)}">${v < 1e-9 ? "best" : "+" + v.toFixed(2)}</td>`;
      }).join("") + "</tr>").join("") + "</tbody></table>";

  /* honesty table */
  if (S.acc && S.acc.length) {
    const ca = card(main, "Prediction accuracy, checked",
      "each weekend predicted by a model that never saw it (leave-one-out), then compared with the real quali order");
    const wa = document.createElement("div"); wa.className = "tblwrap"; ca.appendChild(wa);
    wa.innerHTML = `<table class="t"><thead><tr><th>Round</th><th>Grand Prix</th><th class="r">ρ predicted vs actual</th><th style="min-width:130px"></th></tr></thead><tbody>` +
      S.acc.map(a => `<tr><td class="num">R${a.round}</td><td>${esc(a.event)}</td><td class="r num">${a.rho.toFixed(2)}</td>
        <td><div style="height:6px;border-radius:3px;background:var(--surface3);overflow:hidden"><div style="height:100%;width:${Math.max(0, a.rho * 100).toFixed(0)}%;background:${a.rho > 0.6 ? "var(--green)" : a.rho > 0.3 ? "var(--yellow)" : "var(--red)"}"></div></div></td></tr>`).join("") +
      `</tbody></table>`;
    ca.insertAdjacentHTML("beforeend", `<p class="note">average ρ = <b class="num">${S.accMean.toFixed(2)}</b> · 1 = exact order, 0 = random</p>`);
  }
}

/* ============ app shell & boot ============ */
"use strict";

/* tabs are contextual to the ONE selected session: pick Qualifying and you get
   quali tools, pick Race and you get race tools — the tab row never shows a
   tool that belongs to a session you're not looking at */
const TABS = [
  ["overview", "Overview", viewOverview, () => true],
  ["pace", "Pace", viewPace, () => true],
  ["deg", "Tyres & Deg", viewDeg, sid => ["R", "S", "FP1", "FP2", "FP3"].includes(sid)],
  ["longruns", "Long Runs", viewLongRuns, sid => sid.startsWith("FP")],
  ["quali", "Gaps & Sectors", viewQuali, sid => sid === "Q" || sid === "SQ"],
  ["race", "Trace & Replay", viewRace, sid => sid === "R" || sid === "S"],
  ["straights", "Straights", viewStraights, () => true],
  ["tel", "Telemetry", viewTel, () => true],
  ["weather", "Weather", viewWeather, () => true],
];
/* when a session switch removes the current tab, land on its analog */
const TAB_ANALOG = { race: "quali", quali: "race", longruns: "deg", deg: "longruns" };
const MODE = typeof HUB_MODE !== "undefined" ? HUB_MODE : "embedded";

function renderTabs() {
  const S = HUB.S, nav = document.getElementById("tabs");
  if (!nav) return;
  const avail = TABS.filter(t => t[3](S.sid));
  if (!avail.some(t => t[0] === S.tab)) {
    const alt = TAB_ANALOG[S.tab];
    S.tab = avail.some(t => t[0] === alt) ? alt : "overview";
  }
  nav.innerHTML = avail.map(t =>
    `<button data-tab="${t[0]}" class="${t[0] === S.tab ? "on" : ""}">${t[1]}${t[0] === "tel" && S.compare.length ? ` <span class="cnt">${S.compare.length}</span>` : ""}</button>`).join("");
  nav.querySelectorAll("button").forEach(b =>
    b.addEventListener("click", () => { S.tab = b.dataset.tab; HUB.render(); }));
}

function refreshSessionSelect() {
  const el = document.getElementById("psess");
  if (!el || !HUB.data) return;
  const d = HUB.data;
  const order = d.sids || d.sessions.map(s => s.id);
  el.innerHTML = order.map(sid => {
    const loaded = !!HUB.session(sid);
    const failed = (d.failed || []).includes(sid);
    return `<option value="${sid}" ${sid === HUB.S.sid ? "selected" : ""}>${SNAMES[sid] || sid}${failed ? " · retry" : loaded ? "" : " · loading…"}</option>`;
  }).join("");
}

HUB.render = function render(keepScroll) {
  const S = HUB.S;
  const sy = keepScroll ? scrollY : null;
  refreshSessionSelect();
  renderTabs();
  const main = document.getElementById("view");
  if (!main) return;
  main.innerHTML = "";
  tipHide();
  // selected session still downloading (or failed) → holder instead of a view
  if (!HUB.session(S.sid)) {
    if ((HUB.data.pending || []).includes(S.sid)) {
      main.innerHTML = `<div class="empty"><div class="bar" style="margin:0 auto 14px"><i></i></div>loading ${SNAMES[S.sid] || S.sid}…</div>`;
      ensureSession(S.sid);
      return;
    }
    if ((HUB.data.failed || []).includes(S.sid)) {
      main.innerHTML = `<div class="empty"><b>Couldn't load ${SNAMES[S.sid] || S.sid}.</b><br><br><button class="btn pri" id="sessRetry">Retry</button></div>`;
      main.querySelector("#sessRetry").addEventListener("click", () => { retrySession(S.sid); });
      return;
    }
  }
  const tab = TABS.find(t => t[0] === S.tab) || TABS[0];
  try { tab[2](main); }
  catch (err) {
    main.innerHTML = `<div class="empty">Something broke rendering this view: <b>${esc(err.message)}</b></div>`;
    console.error(err);
  }
  if (sy != null) scrollTo(0, sy);
};

function showLoading(msg) {
  const canEscape = MODE === "site" && HUB.manifest;
  document.getElementById("app").innerHTML =
    `<div id="loading"><div style="font-size:15px;font-weight:700;letter-spacing:.12em;text-transform:uppercase">Mini<span style="color:var(--accent)">sector</span></div><div class="bar"><i></i></div><div style="font-size:12px" id="loadmsg">${esc(msg)}</div>${canEscape ? '<button class="btn" id="cancelLoad">← all weekends</button>' : ""}</div>`;
  const c = document.getElementById("cancelLoad");
  if (c) c.addEventListener("click", showPicker);
}
function showError(msg) {
  const canEscape = MODE === "site" && HUB.manifest;
  document.getElementById("app").innerHTML =
    `<div id="loading"><div class="empty"><b>Could not load data.</b><br>${esc(msg)}<br><br>
    ${HUB._last ? '<button class="btn pri" id="retryBtn">Retry</button> ' : ""}${canEscape ? '<button class="btn" id="backBtn">All weekends</button>' : ""}</div></div>`;
  const r = document.getElementById("retryBtn");
  if (r) r.addEventListener("click", () => selectWeekend(HUB._last.y, HUB._last.r));
  const b = document.getElementById("backBtn");
  if (b) b.addEventListener("click", showPicker);
}

function buildShell() {
  const d = HUB.data;
  const root = document.getElementById("app");

  // weekend + session selectors live together, top-left
  let titleHtml;
  if (MODE === "site" && HUB.manifest) {
    const years = Object.keys(HUB.manifest.years).sort();
    titleHtml = `<span class="picker">
      <button id="homeBtn" class="btn" title="All weekends" aria-label="All weekends">≡</button>
      <select id="pyear" aria-label="Season">${years.map(y => `<option ${+y === d.year ? "selected" : ""}>${y}</option>`).join("")}</select>
      <select id="pevent" aria-label="Grand Prix">${HUB.manifest.years[String(d.year)].map(e => `<option value="${e.round}" ${e.round === d.round ? "selected" : ""}>R${e.round} · ${esc(e.event)}</option>`).join("")}</select>
      <select id="psess" aria-label="Session"></select>
    </span>`;
  } else {
    titleHtml = `<span class="gp">${esc(d.event)} ${d.year}</span><span class="picker"><select id="psess" aria-label="Session"></select></span>`;
  }

  root.innerHTML = `
  <header class="top"><div class="top-inner">
    <div class="title-row">
      ${titleHtml}
      <span class="meta" id="wkMeta"></span>
      <span class="brand">Mini<b>sector</b> · F1 analysis</span>
      <span id="themeSlot"></span>
    </div>
    <div class="ctrl-row">
      <nav class="tabs" id="tabs"></nav>
    </div>
  </div></header>
  <main id="view"></main>
  <footer>Data: F1 live timing via <span class="mono">FastF1</span> · lap telemetry resampled to 280 points/lap · times are official classification where available.
  ${MODE === "site" && HUB.manifest ? `Data updated <span class="num">${esc((HUB.manifest.generated || "").slice(0, 16).replace("T", " "))} UTC</span> · ` : ""}Unofficial analysis tool for personal use — not associated with Formula 1.</footer>`;

  refreshMeta();
  const ps = document.getElementById("psess");
  refreshSessionSelect();
  ps.addEventListener("change", () => {
    const v = ps.value;
    if ((d.failed || []).includes(v)) { retrySession(v); }
    HUB.S.sid = v; HUB.S.lrSel = null; HUB.render();
  });

  if (MODE === "site" && HUB.manifest) {
    const py = document.getElementById("pyear"), pe = document.getElementById("pevent");
    py.addEventListener("change", () => {
      const list = HUB.manifest.years[py.value];
      selectWeekend(+py.value, list.at(-1).round);
    });
    pe.addEventListener("change", () => selectWeekend(d.year, +pe.value));
    document.getElementById("homeBtn").addEventListener("click", showPicker);
  }
  const slot = document.getElementById("themeSlot");
  if (slot && MODE === "site") slot.appendChild(themeToggleBtn());
}

function refreshMeta() {
  const el = document.getElementById("wkMeta");
  const d = HUB.data;
  if (!el || !d) return;
  const dts = d.sessions.length ? [d.sessions[0].date, d.sessions.at(-1).date].map(x => new Date(x)) : [];
  const dates = dts.length ? dts[0].toLocaleDateString(undefined, { day: "numeric", month: "short" }) + (d.pending?.length ? "" : " – " + dts[1].toLocaleDateString(undefined, { day: "numeric", month: "short", year: "numeric" })) : "";
  el.textContent = `Round ${d.round} · ${d.location}, ${d.country}${dates ? " · " + dates : ""}${String(d.format).includes("sprint") ? " · Sprint weekend" : ""}`;
}

/* landing screen: choose a weekend */
function showPicker() {
  const m = HUB.manifest;
  const root = document.getElementById("app");
  const years = Object.keys(m.years).sort().reverse();
  root.innerHTML = `<div class="pick-screen">
    <div class="pick-brand">Mini<b>sector</b><span id="pickTheme"></span></div>
    <div class="pick-sub">F1 race-weekend analysis — pick a Grand Prix</div>
    <button class="btn dna-launch" id="dnaLaunch">🏁 Car rankings — who has the fastest car, what it's good at, and which circuits should suit it</button>
    ${years.map(y => `<div class="pick-year">${y} <span>${m.years[y].length} weekend${m.years[y].length > 1 ? "s" : ""}</span></div>
      <div class="pick-grid">${[...m.years[y]].reverse().map(e => `
        <button class="pick-card" data-y="${y}" data-r="${e.round}">
          <span class="pc-top"><span class="pc-round">R${e.round}</span>${String(e.format).includes("sprint") ? '<span class="pc-sprint">SPRINT</span>' : ""}</span>
          <span class="pc-name">${esc(e.event)}</span>
          <span class="pc-meta">${esc(e.location)}, ${esc(e.country)}${e.date ? " · " + new Date(e.date).toLocaleDateString(undefined, { day: "numeric", month: "short" }) : ""}</span>
          <span class="pc-sess">${Object.keys(e.sessions).map(sid => `<i>${SNAMES[sid] || sid}</i>`).join("")}</span>
        </button>`).join("")}</div>`).join("")}
    <div class="pick-foot">Data via FastF1 · new sessions appear automatically ~1–3 h after they end · unofficial, not associated with Formula 1</div>
  </div>`;
  root.querySelectorAll(".pick-card").forEach(b =>
    b.addEventListener("click", () => selectWeekend(+b.dataset.y, +b.dataset.r)));
  const dna = root.querySelector("#dnaLaunch");
  if (dna) dna.addEventListener("click", () => showTeams(years[0]));
  const ts = root.querySelector("#pickTheme");
  if (ts && MODE === "site") ts.appendChild(themeToggleBtn());
  HUB.viewing = null;
  try {
    if (location.hash) history.pushState(null, "", location.pathname + location.search);
    document.title = "Minisector — F1 analysis";
  } catch (e) { }
}

function initState() {
  const S = HUB.S;
  const last = HUB.data.sessions.at(-1);
  S.sid = last ? last.id : HUB.data.sessions[0].id;
  // phones start with the top 5 selected — 22 lines on a small screen is soup;
  // desktop gets the union of every session's roster so FP-only rookies show up too
  const order = [...HUB.session().drivers].sort((a, b) => (a.pos ?? 99) - (b.pos ?? 99));
  if (innerWidth < 700) S.sel = new Set(order.slice(0, 5).map(dd => dd.abbr));
  else S.sel = new Set(HUB.data.sessions.flatMap(ss => ss.drivers.map(dd => dd.abbr)));
  S.compare = []; S.telZoom = null; S.lrSel = null; S.degCmp = null; S.qseg = 3;
  S.telSid = null; S.telDrv = null; S.tpOpen = undefined;
  S.lrMark = {}; S.lrOpen = null;
  HUB._selCustom = false;
  HUB.restore();
}

/* first paint waits only for the newest session; the rest of the weekend
   streams in behind it and views refresh in place as sessions arrive */
async function selectWeekend(year, round) {
  const entry = (HUB.manifest.years[String(year)] || []).find(e => e.round === round);
  if (!entry) return;
  HUB._last = { y: year, r: round };
  const sids = Object.keys(entry.sessions);
  const firstSid = sids.at(-1);   // the session the page lands on
  showLoading(`fetching ${entry.event} ${year}…`);
  // cores (lap tables, results, map, weather — no telemetry) are ~3% of the
  // bytes; paint from those and stream telemetry behind
  const srcOf = e => e.core || e.file;
  let first;
  try {
    const fe = entry.sessions[firstSid];
    const total = (fe.core ? fe.coreSize : fe.size) || 0;
    let got = 0;
    first = await fetchSession(srcOf(fe), n => {
      got = Math.max(0, got + n);
      const el = document.getElementById("loadmsg");
      if (el && total) el.textContent = `fetching ${entry.event} ${year} — ${Math.min(100, got / total * 100).toFixed(0)}%`;
    });
  } catch (err) {
    showError(err.message);
    return;
  }
  if (!first.tel) first.tel = null;   // telemetry arrives separately
  HUB.data = {
    year: +year, round: entry.round, event: entry.event, location: entry.location,
    country: entry.country, format: entry.format, sessions: [first],
    sids, pending: sids.filter(s => s !== firstSid), failed: [], entry,
  };
  initState();
  buildShell();
  HUB.render();
  HUB.viewing = `${year}/${round}`;
  try {
    const target = `#${year}/${round}`;
    // push a history entry when actually navigating so the phone back button
    // walks weekend -> picker; replace when it's the same weekend (reload etc.)
    if (location.hash !== target) history.pushState(null, "", target);
    else history.replaceState(null, "", target);
    document.title = `${entry.event} ${year} — Minisector`;
  } catch (e) { }
  for (const sid of [...HUB.data.pending]) ensureSession(sid);
  ensureTel(firstSid);
  pumpTels(HUB.data);
}

const SESS_INFLIGHT = new Set();
async function ensureSession(sid) {
  const d = HUB.data;
  if (!d || !d.entry || !(d.pending || []).includes(sid) || SESS_INFLIGHT.has(sid)) return;
  const token = `${d.year}/${d.round}`;
  SESS_INFLIGHT.add(sid);
  try {
    const ent = d.entry.sessions[sid];
    const s = await fetchSession(ent.core || ent.file);
    if (HUB.data !== d || HUB.viewing !== token) return;   // user moved on
    if (!s.tel) s.tel = null;
    const idx = i => d.sids.indexOf(i);
    d.sessions.push(s);
    d.sessions.sort((a, b) => idx(a.id) - idx(b.id));
    d.pending = d.pending.filter(x => x !== sid);
    // desktop keeps "everyone" selected as new rosters arrive (unless the user
    // has already customised the rail); basket laps re-validate when tel lands
    if (innerWidth >= 700 && !HUB._selCustom) for (const dd of s.drivers) HUB.S.sel.add(dd.abbr);
    if (s.tel) HUB.S.compare = HUB.S.compare.filter(c => c.sid !== sid || s.tel[c.drv + "-" + c.lap]);
    refreshMeta();
    HUB.render(true);   // keep scroll position — this is a background refresh
  } catch (e) {
    if (HUB.data !== d || HUB.viewing !== token) return;
    d.pending = d.pending.filter(x => x !== sid);
    d.failed = [...(d.failed || []), sid];
    refreshSessionSelect();
    if (HUB.S.sid === sid) HUB.render(true);
  } finally {
    SESS_INFLIGHT.delete(sid);
  }
}

/* telemetry stage: the full session file (the heavy one) fetched behind the
   scenes; merged into the already-rendered core session */
const TEL_INFLIGHT = new Set();
async function ensureTel(sid, force) {
  const d = HUB.data;
  const s = d && HUB.session(sid);
  if (!d || !d.entry || !s || s.tel || TEL_INFLIGHT.has(sid)) return;
  if (!force && (s._telFail || 0) >= 3) return;
  const ent = d.entry.sessions[sid];
  if (!ent || !ent.core) return;     // full file was fetched directly — nothing to do
  const token = `${d.year}/${d.round}`;
  TEL_INFLIGHT.add(sid);
  try {
    const full = await fetchSession(ent.file);
    if (HUB.data !== d || HUB.viewing !== token) return;
    s.tel = full.tel || {};
    HUB.S.compare = HUB.S.compare.filter(c => c.sid !== sid || s.tel[c.drv + "-" + c.lap]);
    const S = HUB.S;
    // refresh only the views that were actually waiting on this telemetry
    if (S.tab === "tel" || (S.tab === "straights" && S.sid === sid)
      || (S.tab === "race" && (sid === "R" || sid === "S"))) HUB.render(true);
    else renderTabs();
  } catch (e) {
    if (HUB.data === d) s._telFail = (s._telFail || 0) + 1;
  } finally {
    TEL_INFLIGHT.delete(sid);
  }
}

/* background loop: current session's telemetry first, then the rest of the
   weekend in order; waits politely for cores that are still arriving */
async function pumpTels(d) {
  while (HUB.data === d && HUB.viewing === `${d.year}/${d.round}`) {
    const next = [HUB.S.sid, ...d.sids].find(x => {
      const s = HUB.session(x);
      return s && !s.tel && (s._telFail || 0) < 3 && d.entry.sessions[x]?.core && !TEL_INFLIGHT.has(x);
    });
    if (next) { await ensureTel(next); continue; }
    if (!d.pending.length && !TEL_INFLIGHT.size) return;   // everything settled
    await new Promise(r => setTimeout(r, 350));            // a core is still on its way
  }
}
function retrySession(sid) {
  const d = HUB.data;
  if (!d || !(d.failed || []).includes(sid)) return;
  d.failed = d.failed.filter(x => x !== sid);
  d.pending.push(sid);
  ensureSession(sid);
  HUB.render(true);
}

let listenersArmed = false;
function armGlobalListeners() {
  if (listenersArmed) return;
  listenersArmed = true;
  // re-render on width change only — mobile URL-bar show/hide fires height-only
  // resizes on every scroll, and re-rendering there yanks the page back to the top
  let rT, lastW = innerWidth;
  addEventListener("resize", () => {
    clearTimeout(rT);
    rT = setTimeout(() => {
      if (innerWidth === lastW) return;
      lastW = innerWidth;
      if (HUB.data) HUB.render();
    }, 220);
  });
  addEventListener("hashchange", () => {
    if (MODE !== "site" || !HUB.manifest) return;
    const tm = location.hash.match(/^#teams(?:\/(\d{4}))?$/);
    if (tm) {
      if (!String(HUB.viewing || "").startsWith("teams") || (tm[1] && HUB.viewing !== "teams/" + tm[1])) showTeams(tm[1]);
      return;
    }
    const m = location.hash.match(/^#(\d{4})\/(\d+)$/);
    const want = m ? `${+m[1]}/${+m[2]}` : null;
    if (want === HUB.viewing) return;
    if (!want) { showPicker(); return; }
    if ((HUB.manifest.years[m[1]] || []).some(e => e.round === +m[2])) selectWeekend(+m[1], +m[2]);
  });
  new MutationObserver(() => HUB.data && HUB.render()).observe(document.documentElement, { attributes: true, attributeFilter: ["data-theme"] });
  matchMedia("(prefers-color-scheme: dark)").addEventListener?.("change", () => HUB.data && HUB.render());
}

/* theme: standalone site defaults to light; a header toggle persists choice.
   (embedded artifact leaves theme to its host, which stamps data-theme.) */
function applyTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  try { localStorage.setItem("f1hub_theme", t); } catch (e) { }
}
function initTheme() {
  if (MODE !== "site") return;
  let t = "light";
  try { t = localStorage.getItem("f1hub_theme") || "light"; } catch (e) { }
  document.documentElement.setAttribute("data-theme", t);
}
function themeToggleBtn() {
  const cur = document.documentElement.getAttribute("data-theme") || "light";
  const b = document.createElement("button");
  b.className = "btn theme-btn";
  b.setAttribute("aria-label", "Toggle light/dark theme");
  b.textContent = cur === "dark" ? "☀" : "☾";
  b.addEventListener("click", () => {
    const next = (document.documentElement.getAttribute("data-theme") || "light") === "dark" ? "light" : "dark";
    applyTheme(next);   // MutationObserver re-renders
  });
  return b;
}

(async function boot() {
  initTheme();
  if (typeof DecompressionStream === "undefined") {
    showError("This browser is too old for Minisector (it lacks built-in gzip support). Any browser from 2023 onward works — Chrome 80+, Safari 16.4+, Firefox 113+.");
    return;
  }
  armGlobalListeners();
  if (MODE === "site") {
    let manifest;
    try {
      const r = await fetch("manifest.json", { cache: "no-cache" });
      if (!r.ok) throw new Error("manifest.json: HTTP " + r.status);
      manifest = await r.json();
    } catch (err) { showError(err.message); return; }
    HUB.manifest = manifest;
    const years = Object.keys(manifest.years).sort();
    if (!years.length) { showError("No weekends in the data set yet — run the data updater."); return; }
    // deep link #year/round or #teams goes straight in; otherwise the chooser
    const tmm = location.hash.match(/^#teams(?:\/(\d{4}))?$/);
    const m = location.hash.match(/^#(\d{4})\/(\d+)$/);
    if (tmm)
      showTeams(tmm[1]);
    else if (m && manifest.years[m[1]] && manifest.years[m[1]].some(e => e.round === +m[2]))
      await selectWeekend(+m[1], +m[2]);
    else
      showPicker();
  } else {
    try { HUB.data = await decodeBundle(); }
    catch (err) { showError("Failed to decode data bundle: " + err.message); return; }
    initState();
    buildShell();
    HUB.render();
  }
})();

</script>

</body>
</html>
