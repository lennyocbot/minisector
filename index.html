  const s = HUB.session(sid), pfx = sid === "SQ" ? "SQ" : "Q";
  if (sid !== HUB.S.sid) root.insertAdjacentHTML("beforeend", `<p class="note">Showing <b>${SNAMES[sid]}</b> — switch the session picker to ${qids.filter(q => q !== sid).map(q => SNAMES[q]).join("/") || "…"} for the other one.</p>`);

  const seg = HUB.S.qseg;
  const c = card(root, "Gap ladder");
  const segEl = document.createElement("div"); segEl.className = "seg mini";
  [1, 2, 3].forEach(i => {
    const b = document.createElement("button"); b.textContent = pfx + i;
    if (i === seg) b.classList.add("on");
    b.addEventListener("click", () => { HUB.S.qseg = i; HUB.render(); });
    segEl.appendChild(b);
  });
  c.querySelector(".right").appendChild(segEl);

  // best lap per driver in segment (laps table; fall back to results q1/q2/q3)
  const rows = [];
  for (const d of s.drivers) {
    const laps = s.laps.filter(l => l.drv === d.abbr && l.q === seg && l.t != null && !l.del);
    const best = laps.length ? laps.reduce((a, b) => a.t < b.t ? a : b) : null;
    const t = best ? best.t : d["q" + seg];
    if (t != null) rows.push({ d, t, best });
  }
  rows.sort((a, b) => a.t - b.t);
  if (!rows.length) { c.insertAdjacentHTML("beforeend", `<div class="empty">No laps in this segment.</div>`); }
  else {
    const p1 = rows[0].t;
    const div = document.createElement("div"); div.className = "chart"; c.appendChild(div);
    const gmax = Math.max(...rows.map(r => r.t - p1), 800);
    const rh = 23, H = rows.length * rh + 40;
    const ch = Chart(div, { h: H, xd: [0, gmax * 1.15], yd: [0, 1], ml: 96, mb: 26, yticksArr: [], xfmt: v => "+" + (v / 1000).toFixed(2), xlab: "gap (s)", label: "Qualifying gap ladder" });
    const bars = [];
    rows.forEach((r, i) => {
      const cy = ch.mt + i * (ch.ih / rows.length) + (ch.ih / rows.length) / 2, col = teamCol(r.d.color);
      svgEl("text", { x: ch.ml - 8, y: cy + 3.5, "text-anchor": "end", "font-size": 11, "font-weight": 700, fill: col, class: "num" }, ch.svg).textContent = `${i + 1}. ${r.d.abbr}`;
      const w = Math.max(2, ch.x(r.t - p1) - ch.x(0));
      const bar = svgEl("rect", { x: ch.x(0), y: cy - 7.5, width: w, height: 15, rx: 3, fill: col, opacity: i === 0 ? 1 : .75 }, ch.plot);
      svgEl("text", { x: ch.x(0) + w + 6, y: cy + 3.5, "font-size": 10.5, fill: "var(--ink2)", class: "num" }, ch.plot).textContent = i === 0 ? fmtLap(r.t) : "+" + ((r.t - p1) / 1000).toFixed(3);
      bars.push(bar);
      const cutN = pfx === "Q" || pfx === "SQ" ? (seg === 1 ? 15 : seg === 2 ? 10 : null) : null;
      if (cutN && i === cutN - 1 && rows.length > cutN)
        svgEl("line", { x1: ch.ml, x2: ch.ml + ch.iw, y1: cy + (ch.ih / rows.length) / 2, y2: cy + (ch.ih / rows.length) / 2, stroke: "var(--red)", "stroke-width": 1, "stroke-dasharray": "5 4" }, ch.plot);
    });
    hoverMarks(bars, i => {
      const r = rows[i];
      return `<div class="t-title">${r.d.abbr} — ${esc(r.d.team)}</div><b class="num">${fmtLap(r.t)}</b>${r.best ? ` · lap ${r.best.lap} · ${esc(r.best.cmp || "")}` : ""}${i > 0 ? `<br>+${((r.t - p1) / 1000).toFixed(3)}s to ${rows[0].d.abbr}` : ""}`;
    });
  }

  /* ---- sectors ---- */
  const c2 = card(root, "Sector analysis", `${pfx}${seg} · best individual sectors · purple = best overall`);
  const secRows = [];
  for (const d of s.drivers) {
    const laps = s.laps.filter(l => l.drv === d.abbr && l.q === seg && !l.del);
    const b1 = Math.min(...laps.map(l => l.s1 ?? 1e12)), b2 = Math.min(...laps.map(l => l.s2 ?? 1e12)), b3 = Math.min(...laps.map(l => l.s3 ?? 1e12));
    const bl = laps.filter(l => l.t != null);
    const best = bl.length ? Math.min(...bl.map(l => l.t)) : null;
    if (b1 < 1e11 && b2 < 1e11 && b3 < 1e11) secRows.push({ d, b1, b2, b3, ideal: b1 + b2 + b3, best });
  }
  if (secRows.length) {
    const m1 = Math.min(...secRows.map(r => r.b1)), m2 = Math.min(...secRows.map(r => r.b2)), m3 = Math.min(...secRows.map(r => r.b3));
    secRows.sort((a, b) => a.ideal - b.ideal);
    const w2 = document.createElement("div"); w2.className = "tblwrap"; c2.appendChild(w2);
    w2.innerHTML = `<table class="t"><thead><tr><th>Driver</th><th class="r">Best S1</th><th class="r">Best S2</th><th class="r">Best S3</th><th class="r">Ideal lap</th><th class="r">Actual best</th><th class="r">Left on table</th></tr></thead><tbody>` +
      secRows.map(r => `<tr><td>${drvCell(r.d)}</td>
        <td class="r num ${r.b1 === m1 ? "best" : ""}">${fmtSec(r.b1)}</td>
        <td class="r num ${r.b2 === m2 ? "best" : ""}">${fmtSec(r.b2)}</td>
        <td class="r num ${r.b3 === m3 ? "best" : ""}">${fmtSec(r.b3)}</td>
        <td class="r num">${fmtLap(r.ideal)}</td><td class="r num">${fmtLap(r.best)}</td>
        <td class="r num" style="color:${r.best && r.best - r.ideal > 150 ? "var(--yellow)" : "var(--ink3)"}">${r.best ? fmtDelta(r.best - r.ideal) : "—"}</td></tr>`).join("") + "</tbody></table>";
    const theo = secRows[0];
    insights(root, [
      `Theoretical best lap: <b>${theo.d.abbr}</b> ${fmtLap(theo.ideal)} (S1 ${fmtSec(theo.b1)} · S2 ${fmtSec(theo.b2)} · S3 ${fmtSec(theo.b3)})`,
      (() => { const r = [...secRows].filter(r => r.best).sort((a, b) => (b.best - b.ideal) - (a.best - a.ideal))[0]; return r && r.best - r.ideal > 100 ? `Most time left on the table: <b>${r.d.abbr}</b> ${fmtDelta(r.best - r.ideal)}s vs his ideal lap` : ""; })(),
    ].filter(Boolean));
  }

  /* ---- track evolution ---- */
  const c3 = card(root, "Track evolution", "every timed lap vs session clock — watch the track ramp up");
  const evo = s.laps.filter(l => l.t != null && !l.del && !l.in && !l.out);
  if (evo.length > 5) {
    const div3 = document.createElement("div"); div3.className = "chart"; c3.appendChild(div3);
    const t0 = Math.min(...evo.map(l => l.st)), t1 = Math.max(...evo.map(l => l.st));
    const vmin = Math.min(...evo.map(l => l.t));
    const ch3 = Chart(div3, {
      h: 300, xd: [(0), (t1 - t0) / 60000 + 2], yd: [vmin - 300, quantile(evo.map(l => l.t), 0.9) + 600],
      xfmt: v => Math.round(v) + "m", yfmt: v => fmtLap(Math.round(v)), xlab: "session time", ylab: "lap time", label: "Track evolution"
    });
    const segCol = { 1: "var(--ink3)", 2: "var(--yellow)", 3: "var(--purple)" };
    const nodes = [], data = [];
    let bests = [];
    let bmin = 1e12;
    for (const l of [...evo].sort((a, b) => a.st - b.st)) {
      if (l.t < bmin) { bmin = l.t; bests.push([(l.st - t0) / 60000, l.t]); }
    }
    for (const l of evo) {
      const n = svgEl("circle", { cx: ch3.x((l.st - t0) / 60000), cy: ch3.y(l.t), r: 3, fill: segCol[l.q] || "var(--ink3)", opacity: .65 }, ch3.plot);
      nodes.push(n); data.push(l);
    }
    bests.push([(t1 - t0) / 60000 + 2, bmin]);
    svgEl("path", { d: stepPath(bests, ch3.x, ch3.y), fill: "none", stroke: "var(--green)", "stroke-width": 1.6, "stroke-dasharray": "2 3" }, ch3.plot);
    hoverMarks(nodes, i => {
      const l = data[i];
      return `<div class="t-title">${l.drv} — ${pfx}${l.q || "?"} lap ${l.lap}</div><b class="num">${fmtLap(l.t)}</b> · ${esc(l.cmp || "")} ${l.life ? "(" + l.life + " laps)" : ""}`;
    });
    legend(div3, [{ color: "var(--ink3)", label: pfx + "1", dot: true }, { color: "var(--yellow)", label: pfx + "2", dot: true }, { color: "var(--purple)", label: pfx + "3", dot: true }, { color: "var(--green)", label: "session best so far" }]);
  }

  /* ---- speed traps ---- */
  const c4 = card(root, "Speed traps", "session maximums per driver");
  const sp = [];
  for (const d of s.drivers) {
    const laps = s.laps.filter(l => l.drv === d.abbr);
    const mx = k => { const v = laps.map(l => l[k]).filter(v => v != null); return v.length ? Math.max(...v) : null; };
    const r = { d, i1: mx("spI1"), i2: mx("spI2"), fl: mx("spFL"), st: mx("spST") };
    if (r.st != null || r.fl != null) sp.push(r);
  }
  sp.sort((a, b) => (b.st ?? 0) - (a.st ?? 0));
  if (sp.length) {
    const bmax = { i1: Math.max(...sp.map(r => r.i1 ?? 0)), i2: Math.max(...sp.map(r => r.i2 ?? 0)), fl: Math.max(...sp.map(r => r.fl ?? 0)), st: Math.max(...sp.map(r => r.st ?? 0)) };
    const w4 = document.createElement("div"); w4.className = "tblwrap"; c4.appendChild(w4);
    const stmin = Math.min(...sp.map(r => r.st ?? 999));
    w4.innerHTML = `<table class="t"><thead><tr><th>Driver</th><th class="r">Speed trap</th><th></th><th class="r">Intermediate 1</th><th class="r">Intermediate 2</th><th class="r">Finish line</th></tr></thead><tbody>` +
      sp.map(r => `<tr><td>${drvCell(r.d)}</td>
        <td class="r num ${r.st === bmax.st ? "best" : ""}">${r.st ?? "—"} km/h</td>
        <td style="min-width:110px"><div style="height:5px;border-radius:3px;background:var(--surface3);overflow:hidden"><div style="height:100%;width:${r.st ? ((r.st - stmin + 3) / (bmax.st - stmin + 3) * 100).toFixed(0) : 0}%;background:${teamCol(r.d.color)}"></div></div></td>
        <td class="r num ${r.i1 === bmax.i1 ? "best" : ""}">${r.i1 ?? "—"}</td>
        <td class="r num ${r.i2 === bmax.i2 ? "best" : ""}">${r.i2 ?? "—"}</td>
        <td class="r num ${r.fl === bmax.fl ? "best" : ""}">${r.fl ?? "—"}</td></tr>`).join("") + "</tbody></table>";
  }
}

/* ---------- RACE ---------- */
function viewRace(root) {
  const rids = HUB.data.sessions.filter(s => s.id === "R" || s.id === "S").map(s => s.id);
  if (!rids.length) { root.innerHTML = `<div class="empty">No race session.</div>`; return; }
  const sid = rids.includes(HUB.S.sid) ? HUB.S.sid : "R";
  const s = HUB.session(sid);
  if (sid !== HUB.S.sid) root.insertAdjacentHTML("beforeend", `<p class="note">Showing <b>${SNAMES[sid]}</b> — use the session picker for the ${rids.filter(r => r !== sid).map(r => SNAMES[r]).join("/")}.</p>`);
  driverRail(root);
  const drvs = selDrivers();
  const total = s.totalLaps || Math.max(...s.laps.map(l => l.lap));

  // end-of-lap session time per driver
  const endOf = {}; // drv -> Map(lap -> sessionTime ms)
  let raceStart = Infinity;
  for (const d of s.drivers) {
    const m = new Map();
    for (const l of s.laps.filter(l => l.drv === d.abbr)) {
      if (l.st != null && l.t != null) m.set(l.lap, l.st + l.t);
      if (l.lap === 1 && l.st != null) raceStart = Math.min(raceStart, l.st);
    }
    endOf[d.abbr] = m;
  }
  const leaderAt = new Map();
  for (let lap = 1; lap <= total; lap++) {
    let best = null;
    for (const d of s.drivers) { const e = endOf[d.abbr].get(lap); if (e != null && (best == null || e < best)) best = e; }
    if (best != null) leaderAt.set(lap, best);
  }
  const winner = s.drivers.find(d => d.pos === 1);
  // reference = winner's clean-lap median, so green-flag running plots flat and
  // SC/VSC phases read as shared dips instead of a session-long upward drift
  const wClean = winner ? s.laps.filter(l => l.drv === winner.abbr && isClean(l)).map(l => l.t) : [];
  const wEnd = winner && [...endOf[winner.abbr].values()].sort((a, b) => b - a)[0];
  const wLaps = winner && Math.max(...[...endOf[winner.abbr].keys()]);
  const refAvg = wClean.length >= 5 ? median(wClean)
    : (winner && wEnd != null ? (wEnd - raceStart) / wLaps : 95000);

  // SC bands helper
  const worst = {};
  for (const l of s.laps) { const f = tsFlags(l.ts); const w = f.red ? 3 : f.sc ? 2 : f.vsc ? 1 : 0; worst[l.lap] = Math.max(worst[l.lap] || 0, w); }
  const drawBands = ch => {
    for (const lap in worst) {
      if (!worst[lap]) continue;
      const fill = worst[lap] === 3 ? "var(--band-red)" : worst[lap] === 2 ? "var(--band-sc)" : "var(--band-vsc)";
      svgEl("rect", { x: ch.x(lap - 1), y: ch.mt, width: ch.x(+lap) - ch.x(lap - 1), height: ch.ih, fill }, ch.plot);
    }
  };

  /* ---- race trace ---- */
  const c1 = card(root, "Race trace", `gap to a constant ${fmtLap(Math.round(refAvg))} reference (winner's clean-lap median) — flat = reference pace, pit stops and SC are the drops`);
  if (drvs.length) {
    const div = document.createElement("div"); div.className = "chart"; c1.appendChild(div);
    const series = drvs.map(d => {
      const pts = [[0, 0]];
      for (let lap = 1; lap <= total; lap++) {
        const e = endOf[d.abbr].get(lap);
        pts.push(e == null ? null : [lap, (refAvg * lap - (e - raceStart)) / 1000]);
      }
      return { d, pts };
    });
    const ys = series.flatMap(sr => sr.pts.filter(Boolean).map(p => p[1]));
    const ch = Chart(div, { h: 420, mr: 46, xd: [0, total], yd: [quantile(ys, 0.01) - 4, Math.max(...ys) + 4], xlab: "lap", ylab: "gap to reference (s)", yfmt: v => v.toFixed(0), label: "Race trace" });
    drawBands(ch);
    const nodes = [], data = [];
    for (const sr of series) {
      const col = teamCol(sr.d.color);
      const p = svgEl("path", { d: linePath(sr.pts, ch.x, v => ch.y(v)), fill: "none", stroke: col, "stroke-width": 1.7, opacity: .9 }, ch.plot);
      if (drvDash(sr.d.abbr)) p.setAttribute("stroke-dasharray", "6 3");
      // pit markers
      for (const l of s.laps.filter(l => l.drv === sr.d.abbr && l.in)) {
        const pt = sr.pts[l.lap];
        if (pt) { const n = svgEl("circle", { cx: ch.x(pt[0]), cy: ch.y(pt[1]), r: 3.6, fill: "var(--surface)", stroke: col, "stroke-width": 2 }, ch.plot); nodes.push(n); data.push({ d: sr.d, l }); }
      }
    }
    const endL = series.map(sr => {
      const last = sr.pts.filter(Boolean).at(-1);
      return last ? { y: ch.y(last[1]) + 3.5, x: ch.x(last[0]) + 5, txt: sr.d.abbr, col: teamCol(sr.d.color) } : null;
    }).filter(Boolean);
    spreadLabels(endL, 11, ch.mt + 6, ch.mt + ch.ih);
    for (const L of endL)
      svgEl("text", { x: Math.min(L.x, ch.ml + ch.iw + 4), y: L.y, "font-size": 10, "font-weight": 700, fill: L.col, class: "num" }, ch.svg).textContent = L.txt;
    hoverMarks(nodes, i => {
      const { d, l } = data[i];
      const nx = s.laps.find(n => n.drv === d.abbr && n.lap === l.lap + 1 && n.pitOut != null);
      const dur = nx && l.pitIn != null ? nx.pitOut - l.pitIn : null;
      return `<div class="t-title">${d.abbr} — pit stop, lap ${l.lap}</div>pit lane: <b class="num">${dur ? fmtSec(dur, 1) + "s" : "?"}</b> · from ${esc(l.cmp || "?")}`;
    });
    // crosshair with gap readout
    raceCross(ch, div, series, s);
    legend(div, [{ color: "var(--band-sc)", label: "SC", dot: true }, { color: "var(--band-vsc)", label: "VSC", dot: true }, { color: "var(--ink2)", label: "○ pit stop", dot: true }]);
  } else c1.insertAdjacentHTML("beforeend", `<div class="empty">Select drivers above.</div>`);

  /* ---- position chart ---- */
  const c2 = card(root, "Position changes");
  if (drvs.length) {
    const div2 = document.createElement("div"); div2.className = "chart"; c2.appendChild(div2);
    const N = s.drivers.filter(d => d.pos).length;
    const ch2 = Chart(div2, { h: Math.max(320, N * 19), xd: [0, total], yd: [0.5, N + 0.5], yflip: true, ml: 64, mr: 64, yticksArr: [], xlab: "lap", label: "Position chart" });
    drawBands(ch2);
    const leftL = [], rightL = [];
    for (const d of drvs) {
      const col = teamCol(d.color);
      const pts = [];
      if (d.grid) pts.push([0, d.grid]);
      for (let lap = 1; lap <= total; lap++) {
        const l = s.laps.find(l => l.drv === d.abbr && l.lap === lap);
        pts.push(l && l.pos ? [lap, l.pos] : null);
      }
      const p = svgEl("path", { d: stepPath(pts, ch2.x, ch2.y), fill: "none", stroke: col, "stroke-width": 2 }, ch2.plot);
      if (drvDash(d.abbr)) p.setAttribute("stroke-dasharray", "6 3");
      const first = pts.find(Boolean), last = pts.filter(Boolean).at(-1);
      if (first) leftL.push({ y: ch2.y(first[1]) + 3.5, txt: `${first[1]}. ${d.abbr}`, col });
      if (last) rightL.push({ y: ch2.y(last[1]) + 3.5, txt: `${d.abbr} ${last[1]}.`, col });
    }
    spreadLabels(leftL, 11, ch2.mt + 4, ch2.mt + ch2.ih);
    spreadLabels(rightL, 11, ch2.mt + 4, ch2.mt + ch2.ih);
    for (const L of leftL) svgEl("text", { x: ch2.ml - 8, y: L.y, "text-anchor": "end", "font-size": 10, "font-weight": 700, fill: L.col, class: "num" }, ch2.svg).textContent = L.txt;
    for (const L of rightL) svgEl("text", { x: ch2.ml + ch2.iw + 6, y: L.y, "font-size": 10, "font-weight": 700, fill: L.col, class: "num" }, ch2.svg).textContent = L.txt;
  }

  const g = document.createElement("div"); g.className = "grid2"; root.appendChild(g);

  /* ---- pit stops ---- */
  const c3 = card(g, "Pit stops", "pit-lane time = pit entry to pit exit (not stationary time)");
  const stops = [];
  for (const l of s.laps.filter(l => l.in)) {
    const nx = s.laps.find(n => n.drv === l.drv && n.lap === l.lap + 1);
    const dur = nx && nx.pitOut != null && l.pitIn != null ? nx.pitOut - l.pitIn : null;
    const d = HUB.driver(l.drv, sid);
    if (d) stops.push({ d, l, dur, to: nx && nx.cmp, from: l.cmp });
  }
  stops.sort((a, b) => (a.dur ?? 9e9) - (b.dur ?? 9e9));
  const medStop = median(stops.map(st => st.dur).filter(Boolean));
  const w3 = document.createElement("div"); w3.className = "tblwrap"; w3.style.maxHeight = "400px"; w3.style.overflowY = "auto"; c3.appendChild(w3);
  w3.innerHTML = `<table class="t"><thead><tr><th>Driver</th><th class="r">Lap</th><th>Change</th><th class="r">Pit lane</th><th class="r">vs median</th></tr></thead><tbody>` +
    stops.map((st, i) => `<tr><td>${drvCell(st.d)}</td><td class="r num">${st.l.lap}</td>
      <td>${st.from ? cmpDot(st.from) : "?"} → ${st.to ? cmpDot(st.to) : "?"}</td>
      <td class="r num ${i === 0 ? "best" : ""}">${st.dur ? fmtSec(st.dur, 1) + "s" : "—"}</td>
      <td class="r num" style="color:${st.dur && medStop && st.dur - medStop > 1500 ? "var(--red)" : "var(--ink3)"}">${st.dur && medStop ? fmtDelta(st.dur - medStop, 1) : ""}</td></tr>`).join("") + "</tbody></table>";
  if (medStop) c3.insertAdjacentHTML("beforeend", `<p class="note">Median pit-lane time: <b class="num">${fmtSec(medStop, 1)}s</b> · ${stops.length} stops</p>`);

  /* ---- start analysis ---- */
  const c4 = card(g, "Lap 1", "positions gained and lost from the grid");
  const l1 = s.drivers.filter(d => d.grid).map(d => {
    const l = s.laps.find(l => l.drv === d.abbr && l.lap === 1);
    return l && l.pos ? { d, delta: d.grid - l.pos, p1: l.pos } : null;
  }).filter(Boolean).sort((a, b) => b.delta - a.delta);
  if (l1.length) {
    const div4 = document.createElement("div"); div4.className = "chart"; c4.appendChild(div4);
    const mx = Math.max(...l1.map(r => Math.abs(r.delta)), 2);
    const rh = 19, H = l1.length * rh + 36;
    const ch4 = Chart(div4, { h: H, xd: [-mx - 0.5, mx + 0.5], yd: [0, 1], ml: 66, mb: 24, yticksArr: [], xfmt: v => (v > 0 ? "+" : "") + v, label: "Lap one gains" });
    const bars = [];
    l1.forEach((r, i) => {
      const cy = ch4.mt + i * (ch4.ih / l1.length) + (ch4.ih / l1.length) / 2, col = teamCol(r.d.color);
      svgEl("text", { x: ch4.ml - 8, y: cy + 3, "text-anchor": "end", "font-size": 10.5, "font-weight": 700, fill: col, class: "num" }, ch4.svg).textContent = r.d.abbr;
      const x0 = ch4.x(0), x1 = ch4.x(r.delta);
      const bar = svgEl("rect", { x: Math.min(x0, x1), y: cy - 6, width: Math.max(2, Math.abs(x1 - x0)), height: 12, rx: 3, fill: r.delta >= 0 ? "var(--green)" : "var(--red)", opacity: .8 }, ch4.plot);
      svgEl("text", { x: r.delta >= 0 ? x1 + 5 : x1 - 5, y: cy + 3, "text-anchor": r.delta >= 0 ? "start" : "end", "font-size": 10, fill: "var(--ink2)", class: "num" }, ch4.plot).textContent = (r.delta > 0 ? "+" : "") + r.delta;
      bars.push(bar);
    });
    svgEl("line", { x1: ch4.x(0), x2: ch4.x(0), y1: ch4.mt, y2: ch4.mt + ch4.ih, stroke: "var(--line2)", "stroke-width": 1 }, ch4.plot);
    hoverMarks(bars, i => { const r = l1[i]; return `<div class="t-title">${r.d.abbr}</div>P${r.d.grid} grid → P${r.p1} after lap 1`; });
  }

  const movers = s.drivers.filter(d => d.grid && d.pos).map(d => ({ d, g: d.grid - d.pos })).sort((a, b) => b.g - a.g);
  insights(root, [
    stops.length && stops[0].dur ? `Fastest stop: <b>${stops[0].d.abbr}</b> ${fmtSec(stops[0].dur, 1)}s pit lane (lap ${stops[0].l.lap})` : "",
    movers.length && movers[0].g > 0 ? `Drive of the day candidate: <b>${movers[0].d.abbr}</b> gained ${movers[0].g} places` : "",
    l1.length ? `Best start: <b>${l1[0].d.abbr}</b> (${l1[0].delta > 0 ? "+" + l1[0].delta : l1[0].delta} on lap 1)` : "",
  ].filter(Boolean));
  root.insertBefore(root.lastChild, root.children[2] || null);
}

/* crosshair for race trace: shows lap + gaps between visible drivers */
function raceCross(ch, container, series, s) {
  const vline = svgEl("line", { y1: ch.mt, y2: ch.mt + ch.ih, stroke: "var(--ink3)", "stroke-width": 1, "stroke-dasharray": "3 3", opacity: 0 }, ch.svg);
  ch.svg.addEventListener("pointermove", e => {
    const p = pt(e);
    if (p.x < ch.ml || p.x > ch.ml + ch.iw) { vline.setAttribute("opacity", 0); tipHide(); return; }
    const lap = Math.round(ch.xd[0] + (p.x - ch.ml) / ch.iw * (ch.xd[1] - ch.xd[0]));
    if (lap < 1) { vline.setAttribute("opacity", 0); return; }
    vline.setAttribute("x1", ch.x(lap)); vline.setAttribute("x2", ch.x(lap)); vline.setAttribute("opacity", .7);
    const at = series.map(sr => ({ sr, v: sr.pts[lap] })).filter(x => x.v).sort((a, b) => b.v[1] - a.v[1]);
    if (!at.length) return;
    tipShow(`<div class="t-title">Lap ${lap}</div><table>` + at.slice(0, 12).map((x, i) =>
      `<tr><td><span class="drv-cell"><span class="dot" style="background:${teamCol(x.sr.d.color)}"></span>${x.sr.d.abbr}</span></td><td class="num">${i === 0 ? "leader" : "+" + (at[0].v[1] - x.v[1]).toFixed(1) + "s"}</td></tr>`).join("") + "</table>", e);
  });
  ch.svg.addEventListener("pointerleave", () => { vline.setAttribute("opacity", 0); tipHide(); });
  function pt(e) { const r = ch.svg.getBoundingClientRect(); return { x: (e.clientX - r.left) / r.width * ch.W, y: (e.clientY - r.top) / r.height * ch.H }; }
}

/* ============ views D: telemetry compare, weather ============ */
"use strict";

const N_TEL = 280;
function telEntries() {
  const ents = [];
  const teamCount = {};
  for (const e of HUB.S.compare) {
    const s = HUB.session(e.sid);
    const tel = s && s.tel[e.drv + "-" + e.lap];
    const lap = s && s.laps.find(l => l.drv === e.drv && l.lap === e.lap);
    const d = HUB.driver(e.drv, e.sid);
    if (!tel || !lap || !d) continue;
    const k = d.team;
    const nth = teamCount[k] = (teamCount[k] || 0) + 1;
    let col = teamCol(d.color);
    if (nth === 2) col = mix(col, isDark() ? "#ffffff" : "#000000", 0.35);
    if (nth >= 3) col = mix(col, isDark() ? "#000000" : "#ffffff", 0.35);
    ents.push({ e, tel, lap, d, col, dash: nth >= 2 ? "6 3" : null, label: `${e.drv} L${e.lap}${e.sid !== HUB.S.sid ? " · " + SNAMES[e.sid] : ""}` });
  }
  return ents;
}
function telAt(arr, r) {
  const f = r * (N_TEL - 1), i = Math.floor(f), k = f - i;
  if (i >= N_TEL - 1) return arr[N_TEL - 1];
  return arr[i] + (arr[i + 1] - arr[i]) * k;
}

function viewTel(root) {
  const S = HUB.S;
  /* ---- basket / picker ---- */
  const c = card(root, "Lap comparison", "up to 6 laps · first chip is the reference — click a chip to make it reference");
  const bar = document.createElement("div"); bar.className = "cmp-bar"; c.appendChild(bar);
  const ents = telEntries();
  ents.forEach((en, i) => {
    const chip = document.createElement("span");
    chip.className = "lapchip" + (i === 0 ? " ref" : "");
    chip.innerHTML = `<span class="sw" style="background:${en.col};${en.dash ? "outline:2px dashed " + en.col + ";outline-offset:1px;" : ""}"></span>
      ${i === 0 ? '<span class="refmark">REF</span>' : ""}<span>${esc(en.label)}</span><span class="num" style="color:var(--ink3)">${fmtLap(en.lap.t)}</span><button class="x" title="remove">✕</button>`;
    chip.querySelector(".x").addEventListener("click", ev => { ev.stopPropagation(); S.compare.splice(i, 1); HUB.save(); HUB.render(); });
    chip.addEventListener("click", () => { if (i > 0) { const [e] = S.compare.splice(i, 1); S.compare.unshift(e); HUB.save(); HUB.render(); } });
    chip.style.cursor = i > 0 ? "pointer" : "default";
    bar.appendChild(chip);
  });

  // add controls — pick any lap from any session of the weekend
  const add = document.createElement("div"); add.className = "addlap"; c.appendChild(add);
  const sessSel = document.createElement("select");
  sessSel.innerHTML = HUB.data.sessions.map(ss => `<option value="${ss.id}" ${ss.id === HUB.S.sid ? "selected" : ""}>${SNAMES[ss.id] || ss.id}</option>`).join("");
  const drvSel = document.createElement("select");
  const lapSel = document.createElement("select");
  const ps = () => HUB.session(sessSel.value);
  const fillDrivers = () => {
    drvSel.innerHTML = [...ps().drivers].sort((a, b) => (a.pos ?? 99) - (b.pos ?? 99)).map(d => `<option value="${d.abbr}">${d.abbr} — ${esc(d.team)}</option>`).join("");
  };
  const fillLaps = () => {
    const s2 = ps();
    const laps = s2.laps.filter(l => l.drv === drvSel.value && s2.tel[l.drv + "-" + l.lap]).sort((a, b) => a.t - b.t);
    lapSel.innerHTML = laps.map(l => `<option value="${l.lap}">L${l.lap} — ${fmtLap(l.t)}${l.pb ? " ·PB" : ""}${l.cmp ? " · " + CMP_LETTER[l.cmp] + (l.life ?? "") : ""}${l.del ? " ·DEL" : ""}</option>`).join("") || `<option value="">no telemetry laps</option>`;
  };
  fillDrivers(); fillLaps();
  sessSel.addEventListener("change", () => { fillDrivers(); fillLaps(); });
  drvSel.addEventListener("change", fillLaps);
  const addBtn = document.createElement("button"); addBtn.className = "btn pri"; addBtn.textContent = "Add lap";
  addBtn.addEventListener("click", () => { if (lapSel.value) addCompare(sessSel.value, drvSel.value, +lapSel.value); });
  const fastBtn = document.createElement("button"); fastBtn.className = "btn"; fastBtn.textContent = "+ session fastest";
  fastBtn.addEventListener("click", () => {
    const s2 = ps();
    const cand = s2.laps.filter(l => l.t != null && !l.del && s2.tel[l.drv + "-" + l.lap]).sort((a, b) => a.t - b.t)[0];
    if (cand) addCompare(s2.id, cand.drv, cand.lap);
  });
  const clrBtn = document.createElement("button"); clrBtn.className = "btn"; clrBtn.textContent = "Clear";
  clrBtn.addEventListener("click", () => { S.compare = []; S.telZoom = null; HUB.save(); HUB.render(); });
  add.append("Add: ", sessSel, drvSel, lapSel, addBtn, fastBtn, clrBtn);
  add.insertAdjacentHTML("beforeend", `<span class="hint">tip: tap any dot in the Pace view · drag on a trace to zoom, double-tap to reset</span>`);

  if (!ents.length) {
    const q = HUB.session("Q");
    const empty = document.createElement("div"); empty.className = "empty";
    empty.innerHTML = `<b>No laps selected yet.</b><br>Pick laps above, click dots in the Pace view, or start with a preset:<br><br>`;
    const b = document.createElement("button"); b.className = "btn pri"; b.textContent = "Compare the qualifying top 3";
    b.addEventListener("click", () => {
      if (!q) return;
      for (const d of q.drivers.filter(d => d.pos <= 3)) {
        const laps = q.laps.filter(l => l.drv === d.abbr && l.t != null && !l.del && q.tel[l.drv + "-" + l.lap]).sort((a, b) => a.t - b.t);
        if (laps.length) addCompare("Q", d.abbr, laps[0].lap);
      }
      HUB.render();
    });
    empty.appendChild(b); c.appendChild(empty);
    return;
  }

  const ref = ents[0];
  const L = ref.tel.len;      // metres, all laps mapped onto reference length
  const map = HUB.session(ref.e.sid).map || HUB.session().map;
  const zoom = S.telZoom || [0, 1];
  const xd = [zoom[0] * L, zoom[1] * L];

  /* ---- lap stats table ---- */
  const w = document.createElement("div"); w.className = "tblwrap"; c.appendChild(w);
  const bs = { s1: Math.min(...ents.map(e => e.lap.s1 ?? 1e12)), s2: Math.min(...ents.map(e => e.lap.s2 ?? 1e12)), s3: Math.min(...ents.map(e => e.lap.s3 ?? 1e12)) };
  w.innerHTML = `<table class="t"><thead><tr><th></th><th>Lap</th><th class="r">Time</th><th class="r">Gap</th><th class="r">S1</th><th class="r">S2</th><th class="r">S3</th><th>Tyre</th><th class="r">Top speed</th><th class="r">Full throttle</th><th class="r">Braking</th></tr></thead><tbody>` +
    ents.map((en, i) => {
      const vmax = Math.max(...en.tel.v);
      const ft = en.tel.th.filter(t => t >= 98).length / N_TEL * 100;
      const br = en.tel.b.filter(b => b > 0).length / N_TEL * 100;
      return `<tr><td><span class="swd" style="display:inline-block;width:10px;height:10px;border-radius:3px;background:${en.col}"></span></td>
      <td><b>${esc(en.label)}</b>${en.lap.del ? ' <span class="tag" style="background:var(--band-red);color:var(--red)">deleted</span>' : ""}</td>
      <td class="r num"><b>${fmtLap(en.lap.t)}</b></td><td class="r num">${i === 0 ? "—" : fmtDelta(en.lap.t - ref.lap.t)}</td>
      <td class="r num ${en.lap.s1 === bs.s1 ? "best" : ""}">${fmtSec(en.lap.s1)}</td>
      <td class="r num ${en.lap.s2 === bs.s2 ? "best" : ""}">${fmtSec(en.lap.s2)}</td>
      <td class="r num ${en.lap.s3 === bs.s3 ? "best" : ""}">${fmtSec(en.lap.s3)}</td>
      <td>${en.lap.cmp ? cmpDot(en.lap.cmp) + ` <span class="hint num">${en.lap.life}L</span>` : "—"}</td>
      <td class="r num">${vmax} km/h</td><td class="r num">${ft.toFixed(0)}%</td><td class="r num">${br.toFixed(0)}%</td></tr>`;
    }).join("") + "</tbody></table>";

  /* ---- dominance + map row ---- */
  const g = document.createElement("div"); g.className = "grid2"; root.appendChild(g);
  const cmap = card(g, "Track map", map ? `${map.corners.length} corners · hover traces to follow the cars` : "");
  const cdom = card(g, ents.length >= 2 ? "Mini-sector dominance" : "Speed on the reference lap", ents.length >= 2 ? "who is fastest in each of 27 track segments" : "");

  let mapAPI = null;
  if (map) mapAPI = drawTrackMap(cmap, map, ents, L);

  /* dominance strip + table */
  const NSEG = 27;
  let domWinner = [];
  if (ents.length >= 2) {
    const counts = ents.map(() => 0);
    for (let k = 0; k < NSEG; k++) {
      const r0 = k / NSEG, r1 = (k + 1) / NSEG;
      let wi = 0, wt = Infinity;
      ents.forEach((en, i) => { const dt = telAt(en.tel.t, r1) - telAt(en.tel.t, r0); if (dt < wt) { wt = dt; wi = i; } });
      domWinner.push(wi); counts[wi]++;
    }
    const div = document.createElement("div"); div.className = "chart"; cdom.appendChild(div);
    const ch = Chart(div, { h: 86, xd: [0, L], yd: [0, 1], ml: 10, mr: 10, mb: 24, mt: 8, yticksArr: [], xticksArr: [], xfmt: () => "", label: "Mini-sector dominance strip" });
    for (let k = 0; k < NSEG; k++) {
      svgEl("rect", { x: ch.x(k / NSEG * L) + 0.6, y: ch.mt, width: ch.x(1 / NSEG * L) - ch.x(0) - 1.2, height: 30, rx: 3, fill: ents[domWinner[k]].col }, ch.plot);
    }
    if (map) for (const cn of map.corners) {
      const xx = ch.x(cn.d / map.len * L);
      svgEl("line", { x1: xx, x2: xx, y1: ch.mt + 32, y2: ch.mt + 38, stroke: "var(--ink3)", "stroke-width": 1 }, ch.plot);
      svgEl("text", { x: xx, y: ch.mt + 50, "text-anchor": "middle", "font-size": 8.5, fill: "var(--ink3)", class: "num" }, ch.plot).textContent = cn.n + (cn.l || "");
    }
    const tbl = document.createElement("div"); tbl.className = "tblwrap"; cdom.appendChild(tbl);
    tbl.innerHTML = `<table class="t"><thead><tr><th>Lap</th><th class="r">Mini-sectors won</th><th class="r">Share</th></tr></thead><tbody>` +
      ents.map((en, i) => `<tr><td><span class="drv-cell"><span class="dot" style="background:${en.col}"></span>${esc(en.label)}</span></td><td class="r num">${counts[i]}</td><td class="r num">${(counts[i] / NSEG * 100).toFixed(0)}%</td></tr>`).join("") + "</tbody></table>";
  } else {
    cdom.insertAdjacentHTML("beforeend", `<p class="note">Add a second lap to see mini-sector dominance and time deltas. The map is coloured by the reference lap's speed.</p>`);
  }

  /* ---- trace panels ---- */
  const c3 = card(root, "Traces", "shared distance axis · drag to zoom all panels · double-click resets");
  const right = c3.querySelector(".right");
  const hasDrs = ents.some(en => en.tel.d.some(v => v));
  const PANELS = [
    ["delta", "Δ time"], ["v", "Speed"], ["th", "Throttle"], ["b", "Brake"], ["g", "Gear"], ["n", "RPM"], ["d", "DRS/OT"],
  ];
  for (const [id, label] of PANELS) {
    if (id === "delta" && ents.length < 2) continue;
    if (id === "d" && !hasDrs) continue;
    const t = document.createElement("label"); t.className = "toggle";
    t.innerHTML = `<input type="checkbox" ${S.telPanels[id] ? "checked" : ""}>${label}`;
    t.querySelector("input").addEventListener("change", e => { S.telPanels[id] = e.target.checked; HUB.render(); });
    right.appendChild(t);
  }
  if (S.telZoom) {
    const b = document.createElement("button"); b.className = "btn"; b.textContent = "Reset zoom";
    b.addEventListener("click", () => { S.telZoom = null; HUB.render(); });
    right.appendChild(b);
  }

  const stack = document.createElement("div"); c3.appendChild(stack);
  const charts = [];
  const inWin = i => { const r = i / (N_TEL - 1); return r >= zoom[0] - 0.02 && r <= zoom[1] + 0.02; };
  const xsOf = () => Array.from({ length: N_TEL }, (_, i) => i / (N_TEL - 1) * L);
  const xs = xsOf();
  const mkPanel = (h, yd, o = {}) => {
    const div = document.createElement("div"); div.className = "chart"; stack.appendChild(div);
    const ch = Chart(div, Object.assign({ h, xd, yd, ml: 64, mr: 14, mt: 8, mb: 4, xticksArr: [], xgrid: false, yticks: o.yticks || 4 }, o));
    charts.push(ch);
    return ch;
  };
  const cornerLines = ch => {
    if (!map) return;
    for (const cn of map.corners) {
      const xm = cn.d / map.len * L;
      if (xm < xd[0] || xm > xd[1]) continue;
      svgEl("line", { x1: ch.x(xm), x2: ch.x(xm), y1: ch.mt, y2: ch.mt + ch.ih, stroke: "var(--line)", "stroke-width": 1, "stroke-dasharray": "2 4" }, ch.plot);
    }
  };

  // corner header ruler (clickable)
  if (map) {
    const div = document.createElement("div"); div.className = "chart"; stack.appendChild(div);
    const ch = Chart(div, { h: 30, xd, yd: [0, 1], ml: 64, mr: 14, mt: 2, mb: 2, yticksArr: [], xticksArr: [], xgrid: false });
    charts.push(ch);
    for (const cn of map.corners) {
      const xm = cn.d / map.len * L;
      if (xm < xd[0] || xm > xd[1]) continue;
      const t = svgEl("text", { x: ch.x(xm), y: 18, "text-anchor": "middle", "font-size": 9.5, "font-weight": 700, fill: "var(--ink2)", class: "num", cursor: "pointer" }, ch.svg);
      t.textContent = "T" + cn.n + (cn.l || "");
      t.addEventListener("click", () => { S.telZoom = [Math.max(0, (xm - 320) / L), Math.min(1, (xm + 320) / L)]; HUB.render(); });
    }
    svgEl("text", { x: 4, y: 18, "font-size": 9, fill: "var(--ink3)" }, ch.svg).textContent = "corners ▸";
  }

  // Delta
  if (S.telPanels.delta && ents.length >= 2) {
    const deltas = ents.slice(1).map(en => xs.map((_, i) => (en.tel.t[i] - ref.tel.t[i]) / 1000));
    const vis = deltas.flatMap(dd => dd.filter((_, i) => inWin(i)));
    const pad = Math.max(0.05, (Math.max(...vis) - Math.min(...vis)) * 0.1);
    const ch = mkPanel(150, [Math.min(...vis) - pad, Math.max(...vis) + pad], { ylab: "Δt (s)", yfmt: v => v.toFixed(2) });
    cornerLines(ch);
    svgEl("line", { x1: ch.ml, x2: ch.ml + ch.iw, y1: ch.y(0), y2: ch.y(0), stroke: ref.col, "stroke-width": 1.6, opacity: .8 }, ch.plot);
    deltas.forEach((dd, j) => {
      const en = ents[j + 1];
      const p = svgEl("path", { d: linePath(xs.map((x, i) => [x, dd[i]]), ch.x, ch.y), fill: "none", stroke: en.col, "stroke-width": 1.8 }, ch.plot);
      if (en.dash) p.setAttribute("stroke-dasharray", en.dash);
    });
    ch.chan = "delta"; ch.get = (en, i) => en === ref ? 0 : (en.tel.t[i] - ref.tel.t[i]) / 1000;
  }
  // Speed
  if (S.telPanels.v) {
    const vis = ents.flatMap(en => en.tel.v.filter((_, i) => inWin(i)));
    const ch = mkPanel(190, [Math.min(...vis) - 12, Math.max(...vis) + 12], { ylab: "km/h" });
    cornerLines(ch);
    for (const en of ents) {
      const p = svgEl("path", { d: linePath(xs.map((x, i) => [x, en.tel.v[i]]), ch.x, ch.y), fill: "none", stroke: en.col, "stroke-width": 1.8 }, ch.plot);
      if (en.dash) p.setAttribute("stroke-dasharray", en.dash);
    }
    ch.chan = "v";
  }
  // Throttle
  if (S.telPanels.th) {
    const ch = mkPanel(90, [-4, 104], { ylab: "thr %", yticksArr: [0, 50, 100] });
    cornerLines(ch);
    for (const en of ents) {
      const p = svgEl("path", { d: linePath(xs.map((x, i) => [x, en.tel.th[i]]), ch.x, ch.y), fill: "none", stroke: en.col, "stroke-width": 1.4 }, ch.plot);
      if (en.dash) p.setAttribute("stroke-dasharray", en.dash);
    }
    ch.chan = "th";
  }
  // Brake
  if (S.telPanels.b) {
    const ch = mkPanel(64, [-0.08, 1.15], { ylab: "brake", yticksArr: [] });
    cornerLines(ch);
    ents.forEach((en, j) => {
      const p = svgEl("path", { d: stepPath(xs.map((x, i) => [x, en.tel.b[i] ? 1 - j * 0.13 : 0]), ch.x, ch.y), fill: "none", stroke: en.col, "stroke-width": 1.6 }, ch.plot);
      if (en.dash) p.setAttribute("stroke-dasharray", en.dash);
    });
    ch.chan = "b";
  }
  // Gear
  if (S.telPanels.g) {
    const ch = mkPanel(100, [0.5, 8.9], { ylab: "gear", yticksArr: [2, 4, 6, 8] });
    cornerLines(ch);
    for (const en of ents) {
      const p = svgEl("path", { d: stepPath(xs.map((x, i) => [x, en.tel.g[i]]), ch.x, ch.y), fill: "none", stroke: en.col, "stroke-width": 1.4 }, ch.plot);
      if (en.dash) p.setAttribute("stroke-dasharray", en.dash);
    }
    ch.chan = "g";
  }
  // RPM
  if (S.telPanels.n) {
    const vis = ents.flatMap(en => en.tel.n.filter((_, i) => inWin(i)));
    const ch = mkPanel(110, [Math.min(...vis) - 300, Math.max(...vis) + 300], { ylab: "rpm", yfmt: v => (v / 1000).toFixed(0) + "k" });
    cornerLines(ch);
    for (const en of ents) {
      const p = svgEl("path", { d: linePath(xs.map((x, i) => [x, en.tel.n[i]]), ch.x, ch.y), fill: "none", stroke: en.col, "stroke-width": 1.4 }, ch.plot);
      if (en.dash) p.setAttribute("stroke-dasharray", en.dash);
    }
    ch.chan = "n";
  }
  // DRS rows
  if (S.telPanels.d && hasDrs) {
    const rh = 15;
    const ch = mkPanel(ents.length * rh + 26, [0, 1], { ylab: "DRS", yticksArr: [], mb: 18 });
    ents.forEach((en, j) => {
      const cy = ch.mt + j * rh + rh / 2;
      svgEl("line", { x1: ch.ml, x2: ch.ml + ch.iw, y1: cy, y2: cy, stroke: "var(--grid)", "stroke-width": 1 }, ch.plot);
      let start = null;
      for (let i = 0; i <= N_TEL; i++) {
        const on = i < N_TEL && en.tel.d[i];
        if (on && start == null) start = i;
        if (!on && start != null) {
          svgEl("rect", { x: ch.x(xs[start]), y: cy - 5, width: Math.max(2, ch.x(xs[i - 1]) - ch.x(xs[start])), height: 10, rx: 2.5, fill: en.col, opacity: .85 }, ch.plot);
          start = null;
        }
      }
      svgEl("text", { x: ch.ml - 8, y: cy + 3, "text-anchor": "end", "font-size": 9, "font-weight": 700, fill: en.col, class: "num" }, ch.svg).textContent = en.e.drv;
    });
    ch.chan = "d";
  }
  // x-axis footer
  {
    const div = document.createElement("div"); div.className = "chart"; stack.appendChild(div);
    const ch = Chart(div, { h: 34, xd, yd: [0, 1], ml: 64, mr: 14, mt: 0, mb: 22, yticksArr: [], xfmt: v => (v / 1000).toFixed(v >= 1000 ? 1 : 2) + " km", xlab: "" });
    charts.push(ch);
  }

  legend(c3, ents.map(en => ({ color: en.col, label: en.label + " — " + fmtLap(en.lap.t), dash: !!en.dash })));

  /* ---- shared crosshair + readout ---- */
  const readout = document.createElement("div");
  readout.style.cssText = "position:absolute;top:6px;right:10px;background:var(--surface);border:1px solid var(--line2);border-radius:8px;padding:6px 9px;font-size:11px;box-shadow:var(--shadow);display:none;z-index:5;pointer-events:none";
  c3.style.position = "relative"; c3.appendChild(readout);
  const vlines = charts.map(ch => svgEl("line", { y1: ch.mt, y2: ch.mt + ch.ih, stroke: "var(--ink2)", "stroke-width": 1, opacity: 0 }, ch.svg));
  stack.addEventListener("pointermove", e => {
    const ref0 = charts[0];
    const rect0 = ref0.svg.getBoundingClientRect();
    const fx = (e.clientX - rect0.left) / rect0.width * ref0.W;
    if (fx < ref0.ml || fx > ref0.ml + ref0.iw) { hideCross(); return; }
    const xm = xd[0] + (fx - ref0.ml) / ref0.iw * (xd[1] - xd[0]);
    const r = Math.max(0, Math.min(1, xm / L));
    charts.forEach((ch, i) => { vlines[i].setAttribute("x1", ch.x(xm)); vlines[i].setAttribute("x2", ch.x(xm)); vlines[i].setAttribute("opacity", .55); });
    readout.style.display = "block";
    readout.innerHTML = `<div style="color:var(--ink3);margin-bottom:2px" class="num">${(xm / 1000).toFixed(3)} km</div><table>` + ents.map((en, i) => {
      const v = telAt(en.tel.v, r).toFixed(0), th = telAt(en.tel.th, r).toFixed(0), gg = Math.round(telAt(en.tel.g, r));
      const dt = i === 0 ? "" : ` · Δ<b>${((telAt(en.tel.t, r) - telAt(ref.tel.t, r)) / 1000).toFixed(2)}s</b>`;
      return `<tr><td><span class="drv-cell" style="gap:4px"><span class="dot" style="background:${en.col};height:10px"></span>${en.e.drv}</span></td><td class="num" style="padding-left:7px">${v} km/h · ${th}% · G${gg}${dt}</td></tr>`;
    }).join("") + "</table>";
    if (mapAPI) mapAPI.moveDots(r);
  });
  stack.addEventListener("pointerleave", hideCross);
  function hideCross() { vlines.forEach(v => v.setAttribute("opacity", 0)); readout.style.display = "none"; if (mapAPI) mapAPI.hideDots(); }

  // drag zoom on all panels
  for (const ch of charts) dragZoom(ch, dom => {
    S.telZoom = dom ? [Math.max(0, dom[0] / L), Math.min(1, dom[1] / L)] : null;
    HUB.render();
  });

  /* map dominance colouring uses same winners */
  if (mapAPI && ents.length >= 2) mapAPI.dominance(domWinner);
}

/* ---- track map ---- */
function drawTrackMap(cardEl, map, ents, L) {
  const rot = (map.rot || 0) * Math.PI / 180;
  const cos = Math.cos(rot), sin = Math.sin(rot);
  const rx = (x, y) => x * cos - y * sin;
  const ry = (x, y) => x * sin + y * cos;
  const X = map.x.map((x, i) => rx(x, map.y[i]));
  const Y = map.y.map((y, i) => -ry(map.x[i], y));
  const pad = 700;
  const x0 = Math.min(...X) - pad, x1 = Math.max(...X) + pad, y0 = Math.min(...Y) - pad, y1 = Math.max(...Y) + pad;
  const div = document.createElement("div"); div.className = "chart"; cardEl.appendChild(div);
  const svg = svgEl("svg", { viewBox: `${x0.toFixed(0)} ${y0.toFixed(0)} ${(x1 - x0).toFixed(0)} ${(y1 - y0).toFixed(0)}`, role: "img", "aria-label": "Track map" }, div);
  svg.style.maxHeight = "440px";
  const sw = (x1 - x0) / 90;
  // base line
  svgEl("path", { d: X.map((x, i) => (i ? "L" : "M") + x.toFixed(0) + "," + Y[i].toFixed(0)).join("") + "Z", fill: "none", stroke: "var(--surface3)", "stroke-width": sw * 1.7, "stroke-linejoin": "round", "stroke-linecap": "round" }, svg);
  const segs = svgEl("g", {}, svg);
  const M = map.x.length;
  const ref = ents[0];

  function colorBy(colFn) {
    segs.innerHTML = "";
    const step = 2;
    for (let i = 0; i < M - step; i += step) {
      const col = colFn(i / (M - 1));
      svgEl("path", { d: `M${X[i].toFixed(0)},${Y[i].toFixed(0)}L${X[Math.min(i + step, M - 1)].toFixed(0)},${Y[Math.min(i + step, M - 1)].toFixed(0)}`, stroke: col, "stroke-width": sw, "stroke-linecap": "round", fill: "none" }, segs);
    }
  }
  // default: speed heat of reference lap (single-hue ramp)
  const vmin = Math.min(...ref.tel.v), vmax = Math.max(...ref.tel.v);
  colorBy(r => {
    const v = telAt(ref.tel.v, r), k = (v - vmin) / (vmax - vmin || 1);
    return `hsl(215 85% ${(30 + k * 42).toFixed(0)}%)`;
  });

  // corners
  for (const cn of map.corners) {
    const cxr = rx(cn.x, cn.y), cyr = -ry(cn.x, cn.y);
    const a = (cn.a || 0) * Math.PI / 180;
    const off = 780;
    const lx = rx(cn.x + off * Math.cos(a), cn.y + off * Math.sin(a));
    const ly = -ry(cn.x + off * Math.cos(a), cn.y + off * Math.sin(a));
    svgEl("line", { x1: cxr, y1: cyr, x2: lx, y2: ly, stroke: "var(--line2)", "stroke-width": sw / 6 }, svg);
    svgEl("circle", { cx: lx, cy: ly, r: sw * 1.05, fill: "var(--surface2)", stroke: "var(--line2)", "stroke-width": sw / 8 }, svg);
    svgEl("text", { x: lx, y: ly + sw * 0.42, "text-anchor": "middle", "font-size": sw * 1.15, "font-weight": 700, fill: "var(--ink2)", class: "num" }, svg).textContent = cn.n + (cn.l || "");
  }
  // start/finish
  svgEl("circle", { cx: X[0], cy: Y[0], r: sw * 0.7, fill: "var(--ink)", stroke: "var(--bg)", "stroke-width": sw / 5 }, svg);

  // hover dots per lap
  const dots = ents.map(en => svgEl("circle", { r: sw * 0.75, fill: en.col, stroke: "var(--bg)", "stroke-width": sw / 5, opacity: 0 }, svg));
  return {
    moveDots(r) {
      const f = r * (M - 1), i = Math.min(M - 2, Math.floor(f)), k = f - i;
      const px = X[i] + (X[i + 1] - X[i]) * k, py = Y[i] + (Y[i + 1] - Y[i]) * k;
      dots.forEach(d => { d.setAttribute("cx", px); d.setAttribute("cy", py); d.setAttribute("opacity", 1); });
    },
    hideDots() { dots.forEach(d => d.setAttribute("opacity", 0)); },
    dominance(domWinner) {
      const NSEG = domWinner.length;
      colorBy(r => ents[domWinner[Math.min(NSEG - 1, Math.floor(r * NSEG))]].col);
    },
  };
}

function viewWeather(root) {
  const s = HUB.session();
  if (!s.weather.length) { root.innerHTML = `<div class="empty">No weather data for this session.</div>`; return; }
  const W = s.weather;
  const t0 = W[0][0], mins = w => (w[0] - t0) / 60000;
  const xd = [0, mins(W.at(-1)) + 1];

  const stats = [
    { k: "Air temp", v: `${Math.min(...W.map(w => w[1]))}–${Math.max(...W.map(w => w[1]))} °C` },

  const sr = document.createElement("div"); sr.className = "stat-row";

  const mkW = (title, series, o = {}) => {

    const lo = o.lo ?? Math.min(...vals), hi = o.hi ?? Math.max(...vals);
    const padv = Math.max((hi - lo) * 0.15, 0.5);
    const ch = Chart(div, { h: 210, xd, yd: [lo - padv, hi + padv], xfmt: v => v + "m", xlab: "session time", yfmt: o.yfmt, label: title });
    // rain shading
    let rs = null;
    for (let i = 0; i <= W.length; i++) {
      const on = i < W.length && W[i][6];
      if (on && rs == null) rs = mins(W[i]);

    }
    for (const sr2 of series)
      svgEl("path", { d: linePath(sr2.pts, ch.x, ch.y), fill: "none", stroke: sr2.col, "stroke-width": 2 }, ch.plot);
    legend(div, series.map(sr2 => ({ color: sr2.col, label: sr2.label })).concat(rain ? [{ color: "var(--cmp-WET)", label: "rainfall", dot: true }] : []));
    return ch;
  };
  mkW("Temperature (°C)", [
    { label: "track", col: "#f59e0b", pts: W.map(w => [mins(w), w[2]]) },
    { label: "air", col: "#60a5fa", pts: W.map(w => [mins(w), w[1]]) },
  ]);
  mkW("Wind speed (m/s)", [{ label: "wind", col: "#10b981", pts: W.map(w => [mins(w), w[4]]) }]);
  mkW("Humidity (%)", [{ label: "humidity", col: "#8b5cf6", pts: W.map(w => [mins(w), w[3]]) }]);
  mkW("Pressure (mbar)", [{ label: "pressure", col: "var(--ink2)", pts: W.map(w => [mins(w), w[7]]) }]);
}

/* ============ view E: straights — end-of-straight speeds & ERS clipping ============ */
"use strict";

/* find the straights on the reference lap: stretches ending at a braking onset,
   long and fast enough to matter */
function detectStraights(tel, map) {
  const N = tel.v.length, L = tel.len;
  const out = [];
  let from = 0;
  const ends = [];
  for (let i = 2; i < N; i++) if (tel.b[i] && !tel.b[i - 1] && !tel.b[i - 2]) ends.push(i);
  ends.push(N - 1); // start/finish straight ends at the line
  for (const i of ends) {
    let vmax = -1, imax = from;
    for (let j = from; j <= i; j++) if (tel.v[j] > vmax) { vmax = tel.v[j]; imax = j; }
    const len = (i - from) / (N - 1) * L;
    if (len >= 400 && vmax >= 210) {
      // name it after the corner the braking zone leads into
      let name = "";
      if (map && map.corners.length) {
        const dEnd = i / (N - 1) * map.len;
        const next = map.corners.find(c => c.d >= dEnd - 40) || map.corners[0];
        name = "→ T" + next.n + (next.l || "");
      }
      out.push({ from, iEnd: i, iPeak: imax, vmax, len, name });
    }
    from = i;
  }
  // keep the significant ones, track order
  const best = Math.max(...out.map(s => s.vmax));
  return out.filter(s => s.vmax >= best * 0.82).slice(0, 7);
}

/* metres of "clipping" on one lap: full throttle but speed has stopped building
   well before the braking point — deployment has run out */
function clipMetres(tel, straights) {
  const N = tel.v.length, L = tel.len;
  let m = 0;
  for (const s of straights) {
    let runLen = 0;
    for (let j = Math.max(s.from + 3, 1); j < s.iEnd; j++) {
      const full = tel.th[j] >= 96 && !tel.b[j];
      const flat = (tel.v[j] - tel.v[j - 1]) <= 0.2;
      const nearTop = tel.v[j] >= tel.v[s.iPeak] - 10;
      if (full && flat && nearTop) runLen++;
      else { if (runLen >= 3) m += runLen / (N - 1) * L; runLen = 0; }
    }
    if (runLen >= 3) m += runLen / (N - 1) * L;
  }
  return m;
}

function viewStraights(root) {
  const s = HUB.session();
  const map = s.map;
  const refTel = map && s.tel[map.refLap];
  if (!refTel) { root.innerHTML = `<div class="empty">No telemetry in this session.</div>`; return; }
  const straights = detectStraights(refTel, map);
  if (!straights.length) { root.innerHTML = `<div class="empty">Could not identify straights here.</div>`; return; }
  const mainIdx = straights.indexOf(straights.reduce((a, b) => b.vmax > a.vmax ? b : a));

  const rows = [];
  for (const d of s.drivers) {
    const lapKeys = s.laps.filter(l => l.drv === d.abbr && s.tel[l.drv + "-" + l.lap] && !l.del);
    if (!lapKeys.length) continue;
    const tels = lapKeys.map(l => ({ l, tel: s.tel[l.drv + "-" + l.lap] }));
    // top speed per straight: max across the driver's laps in a window before the braking point
    const tops = straights.map(st => {
      let v = 0;
      for (const { tel } of tels) {
        for (let j = st.from; j <= Math.min(st.iEnd, tel.v.length - 1); j++) if (tel.v[j] > v) v = tel.v[j];
      }
      return Math.round(v);
    });
    // clipping: median over the driver's 5 fastest laps (push laps)
    const fastest = [...tels].sort((a, b) => a.l.t - b.l.t).slice(0, 5);
    const clip = Math.round(median(fastest.map(x => clipMetres(x.tel, straights))) || 0);
    rows.push({ d, tops, clip, n: tels.length });
  }
  if (!rows.length) { root.innerHTML = `<div class="empty">No usable laps.</div>`; return; }
  rows.sort((a, b) => b.tops[mainIdx] - a.tops[mainIdx]);
  const colBest = straights.map((_, i) => Math.max(...rows.map(r => r.tops[i])));
  const clipMax = Math.max(...rows.map(r => r.clip), 1);

  const c = card(root, "End-of-straight top speeds", `${SNAMES[s.id] || s.id} · session maximum per straight (best tow / engine mode across all laps)`);
  const w = document.createElement("div"); w.className = "tblwrap"; c.appendChild(w);
  w.innerHTML = `<table class="t"><thead><tr><th>Driver</th>` +
    straights.map((st, i) => `<th class="r" title="${Math.round(st.len)} m straight">${esc(st.name || "S" + (i + 1))}${i === mainIdx ? " ★" : ""}</th>`).join("") +
    `<th class="r">Clipping</th><th></th></tr></thead><tbody>` +
    rows.map(r => `<tr><td>${drvCell(r.d)}</td>` +
      r.tops.map((v, i) => `<td class="r num ${v === colBest[i] ? "best" : ""}">${v}</td>`).join("") +
      `<td class="r num">${r.clip} m</td>
       <td style="min-width:90px"><div style="height:5px;border-radius:3px;background:var(--surface3);overflow:hidden"><div style="height:100%;width:${(r.clip / clipMax * 100).toFixed(0)}%;background:${r.clip > clipMax * 0.65 ? "var(--yellow)" : teamCol(r.d.color)}"></div></div></td></tr>`).join("") +
    `</tbody></table>`;
  c.insertAdjacentHTML("beforeend", `<p class="note"><b>★</b> = fastest straight (rows sorted by it) · speeds in km/h · <b>Clipping</b> = metres per push lap spent at full throttle with speed no longer building before the braking point — the signature of electrical deployment running out. Median over each driver's 5 fastest laps.</p>
  <p class="note">⚠ Read with care: top speeds mix engine modes, tows and wing levels — a car can be "fast" here because it ran a monster mode for one lap or caught a tow. And a plateau can be genuine deployment clipping <i>or</i> a car simply hitting terminal velocity on a long straight — compare cars on the <i>same</i> straight: if one keeps building speed where another flatlines at a lower number, that one is clipping. High clipping + low top speed = energy-limited; low clipping + low top speed = draggy / big wing.</p>`);

  const most = [...rows].sort((a, b) => b.clip - a.clip)[0];
  const least = [...rows].filter(r => r.clip < 40).length;
  insights(root, [
    `Overall fastest: <b>${rows[0].d.abbr}</b> ${rows[0].tops[mainIdx]} km/h on the ${esc(straights[mainIdx].name || "main straight")}`,
    most && most.clip > 80 ? `Clipping the most: <b>${most.d.abbr}</b> (~${most.clip} m per push lap flat-out without accelerating — deployment running dry)` : "",
    least ? `${least} car${least > 1 ? "s" : ""} showing essentially no clipping` : "",
  ].filter(Boolean));
  root.insertBefore(root.lastChild, root.firstChild);
}

/* ============ app shell & boot ============ */
"use strict";

/* tabs are contextual: only the ones that make sense for the current session show up */
const TABS = [
  ["overview", "Overview", viewOverview, () => true],
  ["pace", "Pace", viewPace, () => true],
  ["deg", "Tyres & Deg", viewDeg, sid => ["R", "S", "FP1", "FP2", "FP3"].includes(sid)],
  ["longruns", "Long Runs", viewLongRuns, sid => sid.startsWith("FP")],
  ["quali", "Qualifying", viewQuali, sid => sid === "Q" || sid === "SQ"],
  ["race", "Race", viewRace, sid => sid === "R" || sid === "S"],
  ["straights", "Straights", viewStraights, () => true],
  ["tel", "Telemetry", viewTel, () => true],
  ["weather", "Weather", viewWeather, () => true],
];
const MODE = typeof HUB_MODE !== "undefined" ? HUB_MODE : "embedded";

function renderTabs() {
  const S = HUB.S, nav = document.getElementById("tabs");
  if (!nav) return;
  const avail = TABS.filter(t => t[3](S.sid));
  if (!avail.some(t => t[0] === S.tab)) S.tab = "overview";
  nav.innerHTML = avail.map(t =>
    `<button data-tab="${t[0]}" class="${t[0] === S.tab ? "on" : ""}">${t[1]}${t[0] === "tel" && S.compare.length ? ` <span class="cnt">${S.compare.length}</span>` : ""}</button>`).join("");
  nav.querySelectorAll("button").forEach(b =>
    b.addEventListener("click", () => { S.tab = b.dataset.tab; HUB.render(); }));
}

HUB.render = function render() {
  const S = HUB.S;
  document.querySelectorAll("#sessions button").forEach(b => b.classList.toggle("on", b.dataset.sid === S.sid));
  renderTabs();
  const main = document.getElementById("view");
  if (!main) return;
  main.innerHTML = "";
  tipHide();
  const tab = TABS.find(t => t[0] === S.tab) || TABS[0];
  try { tab[2](main); }
  catch (err) {
    main.innerHTML = `<div class="empty">Something broke rendering this view: <b>${esc(err.message)}</b></div>`;
    console.error(err);
  }
};

function showLoading(msg) {
  document.getElementById("app").innerHTML =
    `<div id="loading"><div style="font-size:15px;font-weight:700;letter-spacing:.12em;text-transform:uppercase">Mini<span style="color:var(--accent)">sector</span></div><div class="bar"><i></i></div><div style="font-size:12px" id="loadmsg">${esc(msg)}</div></div>`;
}
function showError(msg) {
  document.getElementById("app").innerHTML = `<div id="loading"><div class="empty"><b>Could not load data.</b><br>${esc(msg)}</div></div>`;
}

function buildShell() {
  const d = HUB.data;
  const root = document.getElementById("app");
  const dates = d.sessions.length ? new Date(d.sessions[0].date).toLocaleDateString(undefined, { day: "numeric", month: "short" }) + " – " + new Date(d.sessions.at(-1).date).toLocaleDateString(undefined, { day: "numeric", month: "short", year: "numeric" }) : "";

  let titleHtml;
  if (MODE === "site" && HUB.manifest) {
    const years = Object.keys(HUB.manifest.years).sort();
    titleHtml = `<span class="picker">
      <button id="homeBtn" class="btn" title="All weekends">≡</button>
      <select id="pyear">${years.map(y => `<option ${+y === d.year ? "selected" : ""}>${y}</option>`).join("")}</select>
      <select id="pevent">${HUB.manifest.years[String(d.year)].map(e => `<option value="${e.round}" ${e.round === d.round ? "selected" : ""}>R${e.round} · ${esc(e.event)}</option>`).join("")}</select>
    </span>`;
  } else {
    titleHtml = `<span class="gp">${esc(d.event)} ${d.year}</span>`;
  }

  root.innerHTML = `
  <header class="top"><div class="top-inner">
    <div class="title-row">
      ${titleHtml}
      <span class="meta">Round ${d.round} · ${esc(d.location)}, ${esc(d.country)} · ${esc(dates)}${String(d.format).includes("sprint") ? " · Sprint weekend" : ""}</span>
      <span class="brand">Mini<b>sector</b> · F1 analysis</span>
    </div>
    <div class="ctrl-row">
      <div class="seg" id="sessions">${d.sessions.map(s => `<button data-sid="${s.id}">${SNAMES[s.id] || s.id}</button>`).join("")}</div>
      <nav class="tabs" id="tabs"></nav>
    </div>
  </div></header>
  <main id="view"></main>
  <footer>Data: F1 live timing via <span class="mono">FastF1</span> · lap telemetry resampled to 280 points/lap · times are official classification where available.
  ${MODE === "site" && HUB.manifest ? `Data updated <span class="num">${esc((HUB.manifest.generated || "").slice(0, 16).replace("T", " "))} UTC</span> · ` : ""}Unofficial analysis tool for personal use — not associated with Formula 1.</footer>`;

  document.querySelectorAll("#sessions button").forEach(b =>
    b.addEventListener("click", () => { HUB.S.sid = b.dataset.sid; HUB.S.lrSel = null; HUB.render(); }));

  if (MODE === "site" && HUB.manifest) {
    const py = document.getElementById("pyear"), pe = document.getElementById("pevent");
    py.addEventListener("change", () => {
      const list = HUB.manifest.years[py.value];
      selectWeekend(+py.value, list.at(-1).round);
    });
    pe.addEventListener("change", () => selectWeekend(d.year, +pe.value));
    document.getElementById("homeBtn").addEventListener("click", showPicker);
  }
}

/* landing screen: choose a weekend */
function showPicker() {
  const m = HUB.manifest;
  const root = document.getElementById("app");
  const years = Object.keys(m.years).sort().reverse();
  root.innerHTML = `<div class="pick-screen">
    <div class="pick-brand">Mini<b>sector</b></div>
    <div class="pick-sub">F1 race-weekend analysis — pick a Grand Prix</div>
    ${years.map(y => `<div class="pick-year">${y} <span>${m.years[y].length} weekend${m.years[y].length > 1 ? "s" : ""}</span></div>
      <div class="pick-grid">${[...m.years[y]].reverse().map(e => `
        <button class="pick-card" data-y="${y}" data-r="${e.round}">
          <span class="pc-top"><span class="pc-round">R${e.round}</span>${String(e.format).includes("sprint") ? '<span class="pc-sprint">SPRINT</span>' : ""}</span>
          <span class="pc-name">${esc(e.event)}</span>
          <span class="pc-meta">${esc(e.location)}, ${esc(e.country)}${e.date ? " · " + new Date(e.date).toLocaleDateString(undefined, { day: "numeric", month: "short" }) : ""}</span>
          <span class="pc-sess">${Object.keys(e.sessions).map(sid => `<i>${SNAMES[sid] || sid}</i>`).join("")}</span>
        </button>`).join("")}</div>`).join("")}
    <div class="pick-foot">Data via FastF1 · new sessions appear automatically ~1–3 h after they end · unofficial, not associated with Formula 1</div>
  </div>`;
  root.querySelectorAll(".pick-card").forEach(b =>
    b.addEventListener("click", () => selectWeekend(+b.dataset.y, +b.dataset.r)));
  try { history.replaceState(null, "", location.pathname + location.search); } catch (e) { }
}

function initState() {
  const S = HUB.S;
  const last = HUB.data.sessions.at(-1);
  S.sid = last ? last.id : HUB.data.sessions[0].id;
  // phones start with the top 10 selected — 22 lines on a small screen is soup
  const order = [...HUB.session().drivers].sort((a, b) => (a.pos ?? 99) - (b.pos ?? 99));
  S.sel = new Set((innerWidth < 700 ? order.slice(0, 10) : order).map(dd => dd.abbr));
  S.compare = []; S.telZoom = null; S.lrSel = null; S.degCmp = null; S.qseg = 3;
  HUB.restore();
}

async function selectWeekend(year, round) {
  const entry = (HUB.manifest.years[String(year)] || []).find(e => e.round === round);
  if (!entry) return;
  showLoading(`fetching ${entry.event} ${year}…`);
  try {
    const sids = Object.keys(entry.sessions);
    const loaded = await Promise.all(sids.map(sid => fetchSession(entry.sessions[sid].file)));
    HUB.data = {
      year: +year, round: entry.round, event: entry.event, location: entry.location,
      country: entry.country, format: entry.format, sessions: loaded,
    };
  } catch (err) {
    showError(err.message);
    return;
  }
  initState();
  buildShell();
  HUB.render();
  try { history.replaceState(null, "", `#${year}/${round}`); } catch (e) { }
}

let listenersArmed = false;
function armGlobalListeners() {
  if (listenersArmed) return;
  listenersArmed = true;
  // re-render on width change only — mobile URL-bar show/hide fires height-only
  // resizes on every scroll, and re-rendering there yanks the page back to the top
  let rT, lastW = innerWidth;
  addEventListener("resize", () => {
    clearTimeout(rT);
    rT = setTimeout(() => {
      if (innerWidth === lastW) return;
      lastW = innerWidth;
      if (HUB.data) HUB.render();
    }, 220);
  });
  addEventListener("hashchange", () => {
    if (MODE !== "site" || !HUB.manifest) return;
    const m = location.hash.match(/^#(\d{4})\/(\d+)$/);
    if (!m && !location.hash) { showPicker(); return; }
    if (m && HUB.data && !(+m[1] === HUB.data.year && +m[2] === HUB.data.round)
        && (HUB.manifest.years[m[1]] || []).some(e => e.round === +m[2]))
      selectWeekend(+m[1], +m[2]);
  });
  new MutationObserver(() => HUB.data && HUB.render()).observe(document.documentElement, { attributes: true, attributeFilter: ["data-theme"] });
  matchMedia("(prefers-color-scheme: dark)").addEventListener?.("change", () => HUB.data && HUB.render());
}

(async function boot() {
  armGlobalListeners();
  if (MODE === "site") {
    let manifest;
    try {
      const r = await fetch("manifest.json", { cache: "no-cache" });
      if (!r.ok) throw new Error("manifest.json: HTTP " + r.status);
      manifest = await r.json();
    } catch (err) { showError(err.message); return; }
    HUB.manifest = manifest;
    const years = Object.keys(manifest.years).sort();
    if (!years.length) { showError("No weekends in the data set yet — run the data updater."); return; }
    // deep link #year/round goes straight in; otherwise show the weekend chooser
    const m = location.hash.match(/^#(\d{4})\/(\d+)$/);
    if (m && manifest.years[m[1]] && manifest.years[m[1]].some(e => e.round === +m[2]))
      await selectWeekend(+m[1], +m[2]);
    else
      showPicker();
  } else {
    try { HUB.data = await decodeBundle(); }
    catch (err) { showError("Failed to decode data bundle: " + err.message); return; }
    initState();
    buildShell();
    HUB.render();
  }
})();

</script>
