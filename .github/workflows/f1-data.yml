# Auto-updates data/ + manifest.json with newly published F1 sessions.
# Copy this file to .github/workflows/f1-data.yml in your hub repository.
name: F1 data updater

on:
  schedule:
    # every 30 min — a finished session lands on the site shortly after
    # FastF1 publishes it (runs are cheap no-ops when nothing is new)
    - cron: "7,37 * * * *"
  push:
    # editing the backfill queue kickstarts a run immediately (data commits
    # made by the workflow itself use GITHUB_TOKEN and never re-trigger)
    paths: ["backfill.txt"]
  workflow_dispatch:
    inputs:
      year:
        description: "Backfill season (e.g. 2024). Blank = auto (recent sessions only)"
        required: false
      round:
        description: "Round number (blank = whole season)"
        required: false
      force:
        description: "Re-extract files that already exist"
        type: boolean
        default: false

permissions:
  contents: write
  actions: write   # lets a finished run re-dispatch itself while the backfill queue has work

concurrency:
  group: f1-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install fastf1 numpy pandas

      - name: Restore FastF1 API cache
        uses: actions/cache@v4
        with:
          path: tools/f1cache
          key: f1cache-${{ github.run_id }}
          restore-keys: f1cache-

      - name: Update data
        working-directory: tools
        run: |
          ARGS=""
          if [ -n "${{ inputs.year }}" ] && [ -n "${{ inputs.round }}" ]; then
            ARGS="--year ${{ inputs.year }} --round ${{ inputs.round }}"
          elif [ -n "${{ inputs.year }}" ]; then
            ARGS="--year ${{ inputs.year }} --all"
          fi
          if [ "${{ inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          # never let a transient FastF1 error abort the job: whatever WAS
          # extracted still needs to reach the commit step below
          python update_data.py $ARGS | tee /tmp/update.log || echo "update_data exited non-zero (continuing to commit what was extracted)"

      - name: Rebuild team profiles
        run: |
          python tools/build_profiles.py || echo "profiles build failed (non-fatal)"

      - name: Fetch new driver faces / team logos
        run: |
          python tools/fetch_media.py || echo "media fetch failed (non-fatal)"

      - name: Commit & push
        run: |
          git config user.name "f1hub-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data manifest.json media
          if git diff --cached --quiet; then
            echo "no new sessions"
          else
            git commit -m "data: $(git diff --cached --name-only | grep -c 'json.gz$') new session file(s)"
            git pull --rebase origin ${{ github.ref_name }}
            git push
          fi

      - name: Keep the backfill rolling
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if grep -q BACKFILL_REMAINING /tmp/update.log; then
            echo "queue not empty — dispatching the next run"
            curl -sf -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/f1-data.yml/dispatches" \
              -d '{"ref":"${{ github.ref_name }}"}' || echo "dispatch failed — cron will pick it up"
          else
            echo "backfill queue empty"
          fi

      # During a live race weekend, GitHub drops most of our 30-min cron slots
      # (observed real gaps of 80–190 min), so a finished session can sit
      # unpublished for hours. While the window is active we re-dispatch
      # ourselves every few minutes — even if the run above failed — so data
      # lands within minutes of FastF1 publishing it. Runs unlimited-free on
      # this public repo. The marker clears itself once the weekend is over.
      - name: Keep the live weekend rolling
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f /tmp/update.log ] && grep -q LIVE_WINDOW_ACTIVE /tmp/update.log; then
            echo "live race weekend — re-dispatching in ~4 min"
            sleep 240
            curl -sf -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/f1-data.yml/dispatches" \
              -d '{"ref":"${{ github.ref_name }}"}' || echo "dispatch failed — cron will pick it up"
          else
            echo "no live weekend window"
          fi
